<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🎁 幸运盲盒 · 惊喜开启</title>
<style>
/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  background: #1a0000;
  user-select: none; -webkit-user-select: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ============================================
   BACKGROUND
   ============================================ */
.bg-layer {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 50% 0%, #8B0000 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, #4a0000 0%, transparent 50%),
    radial-gradient(ellipse at 20% 100%, #3a0000 0%, transparent 50%),
    linear-gradient(180deg, #1a0000 0%, #2d0000 30%, #1f0000 60%, #0d0000 100%);
}
.bg-pattern {
  position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.08;
  background-image:
    repeating-linear-gradient(45deg, gold 0px, gold 1px, transparent 1px, transparent 60px),
    repeating-linear-gradient(-45deg, gold 0px, gold 1px, transparent 1px, transparent 60px);
}

/* Floating gold particles */
.particles-container { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
.particle {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, #FFD700, #B8860B);
  animation: floatUp var(--dur) var(--delay) infinite ease-in; opacity: 0;
  box-shadow: 0 0 6px 2px rgba(255,215,0,0.5);
}
@keyframes floatUp {
  0%   { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
  10%  { opacity: 0.8; transform: translateY(-10vh) translateX(0) scale(1); }
  90%  { opacity: 0.2; transform: translateY(-85vh) translateX(var(--drift)) scale(0.6); }
  100% { opacity: 0; transform: translateY(-100vh) translateX(var(--drift)) scale(0); }
}

/* ============================================
   DECORATIVE LANTERNS
   ============================================ */
.lantern-left, .lantern-right {
  position: fixed; z-index: 5; pointer-events: none;
  display: flex; flex-direction: column; align-items: center;
  animation: lanternSway 4s ease-in-out infinite;
}
.lantern-left  { top: -20px; left: calc(5% + 40px); }
.lantern-right { top: -20px; right: calc(5% + 40px); animation-delay: -2s; }
@keyframes lanternSway {
  0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}
}
.lantern-rope { width: 2px; height: 40px; background: linear-gradient(180deg, #8B4513, #DAA520); }
.lantern-top { width: 28px; height: 10px; background: linear-gradient(180deg, #DAA520, #B8860B); border-radius: 3px 3px 0 0; box-shadow: 0 2px 8px rgba(255,215,0,0.4); }
.lantern-body {
  width: 70px; height: 85px;
  background: radial-gradient(ellipse at 50% 40%, #FF3333 0%, #CC0000 50%, #8B0000 100%);
  border-radius: 50%; position: relative;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 30px rgba(255,50,50,0.5), 0 0 60px rgba(255,0,0,0.2), inset 0 -20px 30px rgba(0,0,0,0.2);
}
.lantern-body::before { content:''; position:absolute; width:80%; height:2px; background:rgba(255,215,0,0.5); top:48%; }
.lantern-char { font-size:32px; color:#FFD700; font-weight:900; text-shadow:0 0 15px rgba(255,215,0,0.8),0 2px 4px rgba(0,0,0,0.5); z-index:1; }
.lantern-bottom { width: 28px; height: 10px; background: linear-gradient(180deg, #B8860B, #DAA520); border-radius: 0 0 3px 3px; }
.lantern-tassel { width: 2px; height: 30px; background: linear-gradient(180deg, #DAA520, #FFD700); position: relative; }
.lantern-tassel::after { content:''; position:absolute; bottom:-8px; left:-5px; width:12px; height:14px; background:radial-gradient(ellipse, #FFD700, #B8860B); border-radius:50%; }

/* Decorative borders */
.decorative-border-top, .decorative-border-bottom {
  position: fixed; left: 0; right: 0; height: 6px; z-index: 6; pointer-events: none;
  background: linear-gradient(90deg, transparent 0%, #8B0000 5%, #DAA520 15%, #FFD700 25%, #DAA520 35%, #8B0000 50%, #DAA520 65%, #FFD700 75%, #DAA520 85%, #8B0000 95%, transparent 100%);
}
.decorative-border-top { top: 0; }
.decorative-border-bottom { bottom: 0; }

/* ============================================
   TITLE AREA
   ============================================ */
.title-area { position: relative; z-index: 10; text-align: center; padding: 2vh 0 0; }
.title-glow {
  display: inline-block; font-size: clamp(28px, 5vh, 52px); font-weight: 900; letter-spacing: 0.15em;
  background: linear-gradient(180deg, #FFE082 0%, #FFD700 30%, #DAA520 60%, #B8860B 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 20px rgba(255,215,0,0.6)) drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  position: relative;
}
.title-glow::after {
  content: '🎁  幸运盲盒  ·  惊喜开启  🎁'; position: absolute; left: 0; top: 0;
  background: none; -webkit-text-fill-color: transparent; text-shadow: 0 0 40px rgba(255,215,0,0.4);
}
.title-sub { color: #FFD700; font-size: clamp(12px, 2vh, 18px); letter-spacing: 0.3em; opacity: 0.8; margin-top: 0.3vh; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
.remaining-count { text-align: center; z-index: 10; position: relative; color: #FFD700; font-size: clamp(13px, 2.2vh, 18px); margin-top: 1vh; letter-spacing: 0.1em; opacity: 0.85; }
.remaining-count span { font-size: 1.4em; font-weight: 900; color: #FFE082; text-shadow: 0 0 12px rgba(255,215,0,0.6); }
.mode-badge {
  display: inline-block; font-size: 11px; padding: 3px 12px; border-radius: 20px;
  border: 1px solid rgba(255,215,0,0.3); margin-left: 8px; letter-spacing: 0.05em;
  vertical-align: middle; opacity: 0.7;
}

/* ============================================
   BOX GRID
   ============================================ */
.boxes-grid {
  position: relative; z-index: 10;
  display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr);
  gap: clamp(12px, 2vw, 28px); padding: 3vh 6vw 4vh;
  max-width: 1400px; margin: 0 auto;
  height: calc(100vh - 28vh); min-height: 55vh;
}

/* ============================================
   INDIVIDUAL BLIND BOX
   ============================================ */
.box-cell { display: flex; align-items: center; justify-content: center; perspective: 800px; }
.blind-box {
  position: relative; width: 100%; max-width: 260px; aspect-ratio: 1 / 1.05;
  cursor: pointer; transition: filter 0.3s;
}
.blind-box.disabled { pointer-events: none; cursor: default; }
.blind-box.opened    { cursor: default; }

.box-glow {
  position: absolute; inset: -10%; border-radius: 18px;
  background: radial-gradient(ellipse, rgba(255,180,0,0.25) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 0;
}
.blind-box:not(.disabled):not(.opened):hover .box-glow,
.blind-box:not(.disabled):not(.opened):active .box-glow { opacity: 1; }

.box-body {
  position: absolute; inset: 15% 5% 5% 5%;
  background: linear-gradient(180deg, #D42121 0%, #B51515 20%, #8B0000 50%, #7A0000 80%, #5C0000 100%);
  border-radius: 14px; border: 3px solid #C0A060;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3), inset 0 2px 0 rgba(255,255,255,0.1), inset 0 -4px 8px rgba(0,0,0,0.3);
  z-index: 2; display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.box-body::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.06) 50%, transparent 60%);
  border-radius: 12px; z-index: 3; pointer-events: none;
}

.box-ribbon-h {
  position: absolute; left: 5%; right: 5%; height: 14%; top: 43%;
  background: linear-gradient(180deg, #8B6914 0%, #DAA520 20%, #FFD700 40%, #FFE082 50%, #FFD700 60%, #DAA520 80%, #8B6914 100%);
  z-index: 4; border-radius: 2px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.box-ribbon-v {
  position: absolute; top: 15%; bottom: 5%; width: 14%; left: 43%;
  background: linear-gradient(90deg, #8B6914 0%, #DAA520 20%, #FFD700 40%, #FFE082 50%, #FFD700 60%, #DAA520 80%, #8B6914 100%);
  z-index: 4; border-radius: 2px; box-shadow: 2px 0 6px rgba(0,0,0,0.3);
}

.box-question {
  font-size: clamp(32px, 5.5vw, 70px); font-weight: 900; color: #FFD700;
  text-shadow: 0 0 20px rgba(255,215,0,0.7), 0 0 40px rgba(255,215,0,0.3), 0 4px 8px rgba(0,0,0,0.4);
  z-index: 5; position: relative; transition: all 0.3s;
}

.box-lid {
  position: absolute; top: 0; left: 2%; right: 2%; height: 26%;
  background: linear-gradient(180deg, #E83030 0%, #C42020 40%, #A01515 100%);
  border-radius: 14px 14px 6px 6px; border: 3px solid #C0A060; border-bottom: none;
  z-index: 6; transform-origin: bottom center;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 -4px 16px rgba(0,0,0,0.4), 0 -1px 2px rgba(255,255,255,0.1);
}
.box-lid::after { content: ''; position: absolute; bottom: 0; left: 10%; right: 10%; height: 2px; background: rgba(255,215,0,0.4); }
.box-lid-ribbon { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 7; pointer-events: none; }
.box-lid-ribbon::before {
  content: ''; position: absolute; top: 30%; left: 30%; right: 30%; height: 30%;
  background: radial-gradient(ellipse, #FFD700 0%, #DAA520 60%, #B8860B 100%);
  border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 8;
}
.box-number { position: absolute; bottom: 8px; right: 12px; font-size: 11px; color: rgba(255,255,255,0.3); z-index: 5; pointer-events: none; }

/* ============================================
   BOX ANIMATIONS
   ============================================ */
@keyframes boxBreathe {
  0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.02)}
}
.blind-box:not(.shaking):not(.opening):not(.opened):not(.disabled) {
  animation: boxBreathe var(--breathe-dur, 3s) var(--breathe-delay, 0s) ease-in-out infinite;
}

@keyframes boxShake {
  0%{transform:translateX(0) rotate(0deg)}10%{transform:translateX(-8px) rotate(-3deg)}
  20%{transform:translateX(8px) rotate(3deg)}30%{transform:translateX(-10px) rotate(-4deg)}
  40%{transform:translateX(10px) rotate(4deg)}50%{transform:translateX(-6px) rotate(-2deg)}
  60%{transform:translateX(6px) rotate(2deg)}70%{transform:translateX(-3px) rotate(-1deg)}
  80%{transform:translateX(3px) rotate(1deg)}90%{transform:translateX(-1px) rotate(0deg)}
  100%{transform:translateX(0) rotate(0deg)}
}
.blind-box.shaking { animation: boxShake 0.7s ease-in-out !important; }
.blind-box.shaking .box-glow { opacity: 1; background: radial-gradient(ellipse, rgba(255,220,0,0.5) 0%, transparent 70%); }

/* Lid open */
.blind-box.opening .box-lid { transform: translateY(-130%) rotateX(-55deg); transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
.blind-box.opening .box-glow { opacity: 1; background: radial-gradient(ellipse, rgba(255,220,0,0.7) 0%, rgba(255,180,0,0.3) 50%, transparent 80%); }
.blind-box.opening .box-body::after {
  content: ''; position: absolute; top: -5%; left: 20%; right: 20%; height: 60%;
  background: linear-gradient(180deg, rgba(255,240,150,0.9) 0%, rgba(255,200,50,0.5) 40%, transparent 100%);
  z-index: 10; pointer-events: none; animation: lightBeam 0.6s ease-out; border-radius: 50%;
}
@keyframes lightBeam {
  0%{opacity:0;transform:scaleY(0)}50%{opacity:1;transform:scaleY(1.2)}100%{opacity:0.6;transform:scaleY(1)}
}

/* Opened state */
.blind-box.opened .box-question { opacity: 0; }
.blind-box.opened .box-ribbon-h { opacity: 0.3; }
.blind-box.opened .box-ribbon-v { opacity: 0.3; }
.blind-box.opened .box-lid { transform: translateY(-130%) rotateX(-55deg); opacity: 0.5; }
.box-prize-icon {
  position: absolute; z-index: 5; font-size: clamp(28px, 4.5vw, 56px);
  opacity: 0; transform: scale(0); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none;
}
.blind-box.opened .box-prize-icon { opacity: 1; transform: scale(1); }
.box-prize-badge {
  position: absolute; bottom: 12%; left: 10%; right: 10%; z-index: 5; text-align: center;
  font-size: clamp(9px, 1.4vw, 13px); font-weight: 700;
  opacity: 0; transform: translateY(10px); transition: all 0.5s 0.2s; pointer-events: none;
}
.blind-box.opened .box-prize-badge { opacity: 1; transform: translateY(0); }
.blind-box.opened::before {
  content: ''; position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.35) 100%);
  border-radius: 16px; pointer-events: none;
}

/* Active tap */
.blind-box:not(.disabled):not(.opened):active { transform: scale(0.96); transition: transform 0.1s; }
.blind-box:not(.disabled):not(.opened):active .box-question { text-shadow: 0 0 35px rgba(255,215,0,1), 0 0 60px rgba(255,215,0,0.6); }

/* Sparkle burst */
.sparkle-burst {
  position: absolute; z-index: 20; pointer-events: none;
  width: 8px; height: 8px; border-radius: 50%; background: #FFD700;
  box-shadow: 0 0 10px 4px rgba(255,215,0,0.8);
  animation: sparkleFly 0.8s ease-out forwards;
}
@keyframes sparkleFly {
  0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0}
}

/* ============================================
   PRIZE REVEAL OVERLAY
   ============================================ */
.prize-overlay {
  position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0);
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; transition: background 0.5s;
}
.prize-overlay.active { background: rgba(0,0,0,0.75); pointer-events: auto; }

.prize-card {
  background: linear-gradient(160deg, #1a0000 0%, #2d0000 30%, #1a0000 70%, #0d0000 100%);
  border: 3px solid #DAA520; border-radius: 24px;
  padding: clamp(30px, 6vh, 50px) clamp(40px, 8vw, 80px);
  text-align: center;
  box-shadow: 0 0 60px rgba(255,180,0,0.3), 0 0 120px rgba(255,0,0,0.15), 0 20px 60px rgba(0,0,0,0.6);
  transform: scale(0) rotateY(90deg);
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative; overflow: hidden; max-width: 90vw;
}
.prize-overlay.active .prize-card { transform: scale(1) rotateY(0deg); }
.prize-card::before { content: ''; position: absolute; inset: 10px; border: 1px solid rgba(218,165,32,0.3); border-radius: 18px; pointer-events: none; }
.prize-card::after {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(255,215,0,0.06), transparent, rgba(255,215,0,0.04), transparent);
  animation: prizeShine 3s linear infinite; pointer-events: none;
}
@keyframes prizeShine { 0%{transform:rotate(0deg)}100%{transform:rotate(360deg)} }

.prize-tier-icon { font-size: clamp(50px, 10vh, 90px); animation: prizeIconBounce 0.8s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both; display: block; }
@keyframes prizeIconBounce {
  0%{transform:scale(0) rotate(-30deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0deg);opacity:1}
}
.prize-tier-name {
  font-size: clamp(26px, 5vh, 42px); font-weight: 900; letter-spacing: 0.15em; margin: 0.5em 0;
  background: linear-gradient(180deg, #FFE082, #DAA520);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 12px rgba(255,215,0,0.5));
}
.prize-name { font-size: clamp(20px, 3.5vh, 32px); color: #fff; font-weight: 700; letter-spacing: 0.08em; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
.prize-confirm {
  margin-top: 1.5em; display: inline-block; padding: 14px 60px;
  font-size: clamp(18px, 3vh, 26px); font-weight: 700; letter-spacing: 0.15em;
  color: #1a0000; background: linear-gradient(180deg, #FFE082 0%, #FFD700 40%, #DAA520 100%);
  border: none; border-radius: 50px; cursor: pointer;
  box-shadow: 0 6px 24px rgba(255,180,0,0.4), 0 2px 0 rgba(139,105,20,0.5);
  transition: all 0.2s; position: relative; z-index: 2;
}
.prize-confirm:active { transform: translateY(2px); box-shadow: 0 2px 8px rgba(255,180,0,0.3); }

/* ============================================
   CONFETTI CANVAS
   ============================================ */
#confetti-canvas { position: fixed; inset: 0; z-index: 150; pointer-events: none; }

/* ============================================
   ADMIN TRIGGER
   ============================================ */
.admin-trigger {
  position: fixed; bottom: 20px; right: 20px; z-index: 200;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.4); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.3s; backdrop-filter: blur(8px);
}
.admin-trigger:hover, .admin-trigger:active { color: #FFD700; border-color: rgba(255,215,0,0.5); }

/* ============================================
   ADMIN PANEL
   ============================================ */
.admin-overlay {
  position: fixed; inset: 0; z-index: 290; background: rgba(0,0,0,0.6);
  display: none; backdrop-filter: blur(4px);
}
.admin-overlay.open { display: block; }

.admin-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(480px, 92vw); z-index: 300;
  background: linear-gradient(180deg, rgba(20,0,0,0.98) 0%, rgba(10,0,0,0.98) 100%);
  border-left: 2px solid #DAA520;
  transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 28px 24px; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column; gap: 18px;
}
.admin-panel.open { transform: translateX(0); }

.admin-panel h2 { color: #FFD700; font-size: 22px; letter-spacing: 0.1em; text-align: center; margin: 0; }
.admin-panel h3 { color: #DAA520; font-size: 13px; font-weight: 400; text-align: center; margin: 0 0 6px; opacity: 0.7; }

.admin-close {
  position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3);
  color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.3s;
}
.admin-close:hover, .admin-close:active { border-color: #FFD700; color: #FFD700; }

/* ---- Mode Toggle ---- */
.mode-toggle-group {
  display: flex; background: rgba(255,255,255,0.04); border-radius: 12px;
  padding: 4px; border: 1px solid rgba(255,255,255,0.08);
}
.mode-toggle-btn {
  flex: 1; padding: 10px 8px; border: none; border-radius: 10px;
  background: transparent; color: #999; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.3s; letter-spacing: 0.05em;
}
.mode-toggle-btn.active {
  background: rgba(218,165,32,0.2); color: #FFD700;
  box-shadow: 0 2px 8px rgba(218,165,32,0.2);
}
.mode-toggle-btn:hover:not(.active) { color: #ccc; }

/* ---- Pool Size Row ---- */
.pool-size-row {
  display: flex; align-items: center; gap: 10px; margin-top: 4px;
}
.pool-size-row label { color: #DAA520; font-size: 13px; white-space: nowrap; letter-spacing: 0.05em; }
.pool-size-row input {
  width: 70px; padding: 8px 10px; text-align: center; font-size: 16px; font-weight: 700;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(218,165,32,0.3);
  border-radius: 8px; color: #FFE082; outline: none;
}
.pool-size-row input:focus { border-color: #FFD700; }

/* ---- Tier Config Table ---- */
.tier-config-table {
  width: 100%; border-collapse: collapse;
}
.tier-config-table th {
  color: #888; font-size: 11px; font-weight: 400; text-align: center;
  padding: 6px 4px; border-bottom: 1px solid rgba(255,255,255,0.08); letter-spacing: 0.05em;
}
.tier-config-table td {
  padding: 8px 4px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: middle;
}
.tier-dot {
  display: inline-block; width: 10px; height: 10px; border-radius: 50%;
  box-shadow: 0 0 8px currentColor;
}
.tier-label { font-size: 13px; color: #eee; font-weight: 600; }
.tier-percent { font-size: 12px; color: #FFB800; font-weight: 700; min-width: 45px; display: inline-block; }

.tier-input {
  width: 58px; padding: 7px 4px; text-align: center; font-size: 14px; font-weight: 600;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; color: #FFE082; outline: none;
  transition: border-color 0.3s;
}
.tier-input:focus { border-color: #FFD700; }
.tier-input.prize-name-input { width: auto; min-width: 100px; font-size: 12px; text-align: left; padding: 7px 8px; }

.tier-input.weight-mode { border-color: rgba(100,180,255,0.4); }
.tier-input.cap-mode { width: 52px; border-color: rgba(255,150,100,0.4); font-size: 12px; }

.prob-mode-only { display: none; }
.prob-mode-only.show { display: table-cell; }
.pool-mode-only { display: table-cell; }
.pool-mode-only.hide { display: none; }

/* ---- Pool Visualization ---- */
.pool-viz {
  display: flex; flex-wrap: wrap; gap: 5px; justify-content: center;
  padding: 8px; background: rgba(255,255,255,0.02); border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.05);
}
.pool-dot {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04);
  transition: all 0.3s; position: relative;
}
.pool-dot.drawn { border-color: transparent; }
.pool-dot.drawn.tier-1 { background: #FF3333; box-shadow: 0 0 8px rgba(255,51,51,0.6); }
.pool-dot.drawn.tier-2 { background: #FF8800; box-shadow: 0 0 8px rgba(255,136,0,0.6); }
.pool-dot.drawn.tier-3 { background: #FFB800; box-shadow: 0 0 8px rgba(255,184,0,0.6); }
.pool-dot.drawn.tier-4 { background: #4CAF50; box-shadow: 0 0 8px rgba(76,175,80,0.6); }
.pool-dot.drawn.tier-5 { background: #888; box-shadow: 0 0 8px rgba(136,136,136,0.4); }

.pool-legend {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  font-size: 11px; color: #999;
}
.pool-legend span { display: flex; align-items: center; gap: 4px; }
.pool-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

/* ---- Draw History ---- */
.draw-history {
  max-height: 120px; overflow-y: auto;

}
.draw-history .history-item {
  padding: 5px 8px; border-bottom: 1px solid rgba(255,255,255,0.03);

}

/* ---- Buttons ---- */
.admin-btn {
  display: block; width: 100%; padding: 11px; border: 1px solid #DAA520; border-radius: 10px;
  background: rgba(218,165,32,0.1); color: #FFD700; font-size: 15px; font-weight: 700;

}
.admin-btn:hover, .admin-btn:active { background: rgba(218,165,32,0.25); }

.admin-btn.danger:hover, .admin-btn.danger:active { background: rgba(255,68,68,0.15); }
.admin-btn.warn { border-color: #FF8800; color: #FFAA44; }

/* ---- Section Divider ---- */

/* ---- Password Modal ---- */
.password-modal {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
.password-box {
  background: #1a0000; border: 2px solid #DAA520; border-radius: 20px; padding: 36px 32px; text-align: center;
}
.password-box h3 { color: #FFD700; margin-bottom: 6px; letter-spacing: 0.1em; }
.password-box .pw-input {
  width: 200px; padding: 12px; font-size: 24px; text-align: center; letter-spacing: 0.3em;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(218,165,32,0.4);

}
.password-box .pw-input:focus { border-color: #FFD700; }
.pw-numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 220px; margin: 0 auto; }
.pw-key {

}

.pw-key.clear { color: #FF6666; }

/* ============================================
   RESPONSIVE

@media (max-width: 1024px) {

  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>

<script>
// ============================================
// DEFAULT PRIZE CONFIG
// ============================================
const DEFAULT_TIERS = [
  { id:'t1', tier:1, name:'一等奖', prize:'iPhone 16 Pro',   icon:'👑', color:'#FF3333', cssClass:'tier-1', count:1, weight:5,  cap:1  },
  { id:'t2', tier:2, name:'二等奖', prize:'AirPods Pro 2',   icon:'💎', color:'#FF8800', cssClass:'tier-2', count:2, weight:15, cap:2  },
  { id:'t3', tier:3, name:'三等奖', prize:'京东购物卡 200元', icon:'🎁', color:'#FFB800', cssClass:'tier-3', count:3, weight:25, cap:3  },
  { id:'t4', tier:4, name:'四等奖', prize:'精美礼品一份',     icon:'🎈', color:'#4CAF50', cssClass:'tier-4', count:4, weight:35, cap:4  },
  { id:'t5', tier:5, name:'参与奖', prize:'下次好运',         icon:'🍀', color:'#AAAAAA', cssClass:'tier-5', count:2, weight:20, cap:99 },
];

// ============================================
// STATE
// ============================================
let tierConfig = JSON.parse(JSON.stringify(DEFAULT_TIERS));  // current tier config (editable)
let gameMode = 'pool';          // 'pool' | 'prob'
let poolSize = 12;             // total pool size (for pool mode)
let prizePool = [];            // [tierIndex, tierIndex, ...] — the draw pool
let drawHistory = [];          // [{idx, tier, timestamp}]
let boxes = [];                // [{id, tierIndex, status}]
let isAnimating = false;

// ============================================
// DOM REFS
// ============================================
const $grid          = document.getElementById('boxesGrid');
const $remaining     = document.getElementById('remaining');
const $poolTotal     = document.getElementById('poolTotal');
const $modeBadge     = document.getElementById('modeBadge');
const $prizeOverlay  = document.getElementById('prizeOverlay');
const $prizeIcon     = document.getElementById('prizeIcon');
const $prizeTier     = document.getElementById('prizeTier');
const $prizeName     = document.getElementById('prizeName');
const $prizeConfirm  = document.getElementById('prizeConfirm');
const $confettiCanvas = document.getElementById('confetti-canvas');
const $adminTrigger  = document.getElementById('adminTrigger');
const $adminPanel    = document.getElementById('adminPanel');
const $adminOverlay  = document.getElementById('adminOverlay');
const $adminClose    = document.getElementById('adminClose');
const $pwModal       = document.getElementById('pwModal');
const $pwInput       = document.getElementById('pwInput');
const $pwError       = document.getElementById('pwError');
const $tierConfigBody = document.getElementById('tierConfigBody');
const $poolViz       = document.getElementById('poolViz');
const $poolLegend    = document.getElementById('poolLegend');
const $drawHistory   = document.getElementById('drawHistory');
const $poolSizeInput = document.getElementById('poolSizeInput');
const $poolSizeRow   = document.getElementById('poolSizeRow');
const $poolVizSection = document.getElementById('poolVizSection');

const confettiCtx = $confettiCanvas.getContext('2d');

// ============================================
// PARTICLES
// ============================================
function createParticles() {
  const container = document.getElementById('particles');
  container.innerHTML = '';
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = (60 + Math.random() * 40) + '%';
    p.style.width = p.style.height = (2 + Math.random() * 5) + 'px';
    p.style.setProperty('--dur', (4 + Math.random() * 8) + 's');
    p.style.setProperty('--delay', Math.random() * 8 + 's');
    p.style.setProperty('--drift', (Math.random() * 40 - 20) + 'px');
    container.appendChild(p);
  }
}

// ============================================
// UTILS
// ============================================
function shuffleArray(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function countPoolRemaining() {
  return boxes.filter(b => b.status === 'closed').length;
}
function getOpenCount() {
  return boxes.filter(b => b.status === 'opened').length;
}

// ============================================
// POOL BUILDING
// ============================================
function buildFixedPool() {
  const pool = [];
  tierConfig.forEach((t, idx) => {
    for (let i = 0; i < t.count; i++) pool.push(idx);
  });
  // Trim or pad to poolSize
  while (pool.length < poolSize) {
    // Pad with last tier (participation)
    pool.push(tierConfig.length - 1);
  }
  return shuffleArray(pool.slice(0, poolSize));
}

function calcProbabilities() {
  const totalWeight = tierConfig.reduce((s, t) => s + t.weight, 0);
  return tierConfig.map(t => ({
    ...t,
    probability: totalWeight > 0 ? (t.weight / totalWeight * 100) : 0,
  }));
}

// ============================================
// DRAW LOGIC
// ============================================
function drawPrize() {
  if (gameMode === 'pool') {
    // Fixed pool: pop from shuffled pool
    if (prizePool.length === 0) return null;
    const tierIdx = prizePool.shift();
    return tierIdx;
  } else {
    // Probability mode: weighted random from available tiers
    const openedCounts = {};
    boxes.forEach(b => {
      if (b.status === 'opened') {
        openedCounts[b.tierIndex] = (openedCounts[b.tierIndex] || 0) + 1;
      }
    });

    // Filter tiers that haven't hit cap
    const available = tierConfig.map((t, idx) => {
      const drawn = openedCounts[idx] || 0;
      if (drawn >= t.cap) return { ...t, weight: 0, idx };
      return { ...t, idx };
    });

    const totalWeight = available.reduce((s, t) => s + t.weight, 0);
    if (totalWeight <= 0) {
      // All caps reached — return last tier as fallback
      return tierConfig.length - 1;
    }

    let roll = Math.random() * totalWeight;
    for (const t of available) {
      roll -= t.weight;
      if (roll <= 0) return t.idx;
    }
    return available[available.length - 1].idx;
  }
}

// ============================================
// BOX INIT
// ============================================
function initBoxes(keepOpened = false) {
  if (gameMode === 'pool') {
    // Build full pool, then deduct already-opened boxes
    const fullPool = buildFixedPool();

    if (keepOpened) {
      // Remove from pool the tiers that have already been opened
      const openedTiers = [];
      boxes.forEach((b, i) => {
        if (b.status === 'opened') openedTiers.push({ idx: i, tierIndex: b.tierIndex });
      });
      // Rebuild boxes: keep opened ones, regenerate closed ones from pool
      const newBoxes = [];
      const poolCopy = [...fullPool];
      boxes.forEach((b) => {
        if (b.status === 'opened') {
          newBoxes.push({ ...b });
        } else {
          if (poolCopy.length > 0) {
            newBoxes.push({ id: newBoxes.length, tierIndex: poolCopy.shift(), status: 'closed' });
          } else {
            newBoxes.push({ id: newBoxes.length, tierIndex: tierConfig.length - 1, status: 'closed' });
          }
        }
      });
      // Append extra boxes from pool
      while (poolCopy.length > 0) {
        newBoxes.push({ id: newBoxes.length, tierIndex: poolCopy.shift(), status: 'closed' });
      }
      boxes = newBoxes;
      prizePool = poolCopy; // remaining pool
    } else {
      prizePool = [...fullPool];
      boxes = fullPool.map((tierIdx, i) => ({
        id: i, tierIndex: tierIdx, status: 'closed',
      }));
    }
  } else {
    // Probability mode: all boxes are closed, no pre-assignment
    if (keepOpened) {
      boxes.forEach(b => { if (b.status !== 'opened') b.status = 'closed'; });
    } else {
      boxes = Array.from({ length: poolSize }, (_, i) => ({
        id: i, tierIndex: null, status: 'closed',
      }));
    }
    prizePool = [];
  }

  drawHistory = [];
  isAnimating = false;
  $prizeOverlay.classList.remove('active');
  renderAllBoxes();
  updateRemaining();
  updateAdminUI();
}

function renderAllBoxes() {
  $grid.innerHTML = '';
  boxes.forEach((box, idx) => {
    const cell = document.createElement('div');
    cell.className = 'box-cell';
    const boxEl = document.createElement('div');
    boxEl.className = 'blind-box';
    boxEl.dataset.index = idx;
    if (box.status === 'opened') boxEl.classList.add('opened');
    else if (box.status !== 'closed') boxEl.classList.add(box.status);

    const breatheDur = 2.5 + (idx % 4) * 0.3 + Math.floor(idx / 4) * 0.2;
    const breatheDelay = (idx * 0.15) % 3;
    boxEl.style.setProperty('--breathe-dur', breatheDur + 's');
    boxEl.style.setProperty('--breathe-delay', breatheDelay + 's');

    // Determine display tier
    let displayTier;
    if (box.status === 'opened' && box.tierIndex !== null) {
      displayTier = tierConfig[box.tierIndex];
    } else if (gameMode === 'pool' && box.status === 'closed') {
      // Show the assigned (but still hidden) tier
      displayTier = tierConfig[box.tierIndex];
    } else {
      displayTier = null;
    }

    const iconHtml = displayTier ? displayTier.icon : '?';
    const badgeHtml = displayTier && box.status === 'opened'
      ? `<span class="box-prize-badge" style="color:${displayTier.color}">${displayTier.name}</span>`
      : '';

    boxEl.innerHTML = `
      <div class="box-glow"></div>
      <div class="box-lid"><div class="box-lid-ribbon"></div></div>
      <div class="box-body">
        <div class="box-ribbon-h"></div>
        <div class="box-ribbon-v"></div>
        <span class="box-question">?</span>
        <span class="box-prize-icon">${displayTier ? displayTier.icon : ''}</span>
        ${badgeHtml}
      </div>
      <div class="box-number">${idx + 1}</div>
    `;

    if (box.status === 'closed' && !isAnimating) {
      boxEl.addEventListener('click', () => onBoxClick(idx, boxEl));
      boxEl.addEventListener('touchend', (e) => { e.preventDefault(); onBoxClick(idx, boxEl); });
    }

    cell.appendChild(boxEl);
    $grid.appendChild(cell);
  });
}

function updateRemaining() {
  const rem = countPoolRemaining();
  $remaining.textContent = rem;
  $poolTotal.textContent = boxes.length;
  $modeBadge.textContent = gameMode === 'pool' ? '固定池' : '概率权重';
}

// ============================================
// BOX CLICK
// ============================================
async function onBoxClick(idx, boxEl) {
  if (isAnimating) return;
  if (boxes[idx].status !== 'closed') return;
  if (gameMode === 'pool' && prizePool.length === 0 && countPoolRemaining() === 0) return;

  isAnimating = true;
  document.querySelectorAll('.blind-box').forEach(el => el.classList.add('disabled'));

  // Draw prize
  let tierIdx;
  if (gameMode === 'pool') {
    if (prizePool.length === 0) {
      // All pool tickets used — rebuild or bail
      tierIdx = tierConfig.length - 1; // fallback
    } else {
      tierIdx = prizePool.shift();
    }
  } else {
    tierIdx = drawPrize();
  }

  // PHASE 1: Shake
  boxEl.classList.add('shaking');
  await sleep(700);

  // PHASE 2: Open lid
  boxEl.classList.remove('shaking');
  boxEl.classList.add('opening');
  spawnSparkles(boxEl);
  await sleep(550);

  // PHASE 3: Reveal
  boxes[idx].status = 'opened';
  boxes[idx].tierIndex = tierIdx;
  boxEl.classList.remove('opening');
  boxEl.classList.add('opened');
  drawHistory.push({ idx, tierIndex: tierIdx, time: new Date().toLocaleTimeString() });

  await sleep(400);

  // PHASE 4: Prize overlay
  await showPrizeOverlay(tierIdx);

  // PHASE 5: Confetti
  launchConfetti();

  document.querySelectorAll('.blind-box').forEach(el => el.classList.remove('disabled'));
  updateRemaining();
  updateAdminUI();
  isAnimating = false;
  renderAllBoxes();
}

// ============================================
// SPARKLES
// ============================================
function spawnSparkles(boxEl) {
  const rect = boxEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height * 0.3;
  for (let i = 0; i < 18; i++) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle-burst';
    sparkle.style.position = 'fixed';
    sparkle.style.left = cx + 'px';
    sparkle.style.top = cy + 'px';
    const angle = Math.random() * Math.PI * 2;
    const dist = 40 + Math.random() * 100;
    sparkle.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
    sparkle.style.setProperty('--sy', Math.sin(angle) * dist - 30 + 'px');
    sparkle.style.width = sparkle.style.height = (3 + Math.random() * 7) + 'px';
    document.body.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 800);
  }
}

// ============================================
// PRIZE OVERLAY
// ============================================
async function showPrizeOverlay(tierIdx) {
  const tier = tierConfig[tierIdx];
  $prizeIcon.textContent = tier.icon;
  $prizeTier.textContent = tier.name;
  $prizeName.textContent = tier.prize;
  $prizeOverlay.classList.add('active');
  return new Promise(resolve => {
    const handler = () => {
      $prizeConfirm.removeEventListener('click', handler);
      $prizeOverlay.classList.remove('active');
      resolve();
    };
    $prizeConfirm.addEventListener('click', handler);
  });
}

// ============================================
// CONFETTI
// ============================================
let confettiPieces = [], confettiRAF = null;
const CONFETTI_COLORS = [
  '#FF3333','#FFD700','#FF8800','#FF4444','#FFB800',
  '#FFE082','#FF6666','#DAA520','#FFAAAA','#FFCC00',
  '#FF5555','#FFE4B5','#FF0000','#FFA500','#FFDAB9',
];
function resizeConfettiCanvas() {
  $confettiCanvas.width = window.innerWidth;
  $confettiCanvas.height = window.innerHeight;
}
function launchConfetti() {
  resizeConfettiCanvas();
  const now = Date.now();
  confettiPieces = [];
  for (let i = 0; i < 150; i++) {
    confettiPieces.push({
      x: window.innerWidth/2 + (Math.random()-0.5)*400,
      y: window.innerHeight/2 - 100,
      w: 6+Math.random()*12, h: 4+Math.random()*8,
      color: CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)],
      vx: (Math.random()-0.5)*18, vy: -(8+Math.random()*18),
      rotation: Math.random()*360, rotSpeed: (Math.random()-0.5)*25,
      gravity: 0.35+Math.random()*0.5, drag: 0.98+Math.random()*0.015,
      opacity: 1, fadeStart: now+1500+Math.random()*2000,
    });
  }
  if (!confettiRAF) animateConfetti(now);
}
function animateConfetti(ts) {
  confettiCtx.clearRect(0, 0, $confettiCanvas.width, $confettiCanvas.height);
  let alive = 0;
  for (const p of confettiPieces) {
    const age = ts - p.fadeStart;
    if (age > 0) p.opacity = Math.max(0, 1 - age/2000);
    if (p.opacity <= 0) continue;
    alive++;
    p.vy += p.gravity; p.vx *= p.drag;
    p.x += p.vx; p.y += p.vy; p.rotation += p.rotSpeed;
    confettiCtx.save();
    confettiCtx.globalAlpha = p.opacity;
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rotation * Math.PI / 180);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    confettiCtx.restore();
  }
  if (alive>0) { confettiRAF = requestAnimationFrame(animateConfetti); }
  else { confettiCtx.clearRect(0,0,$confettiCanvas.width,$confettiCanvas.height); confettiRAF = null; }
}

// ============================================
// ADMIN PANEL — UI Rendering
// ============================================
function updateAdminUI() {
  renderTierConfigTable();
  renderPoolViz();
  renderDrawHistory();
  $poolSizeInput.value = poolSize;
}

function renderTierConfigTable() {
  $tierConfigBody.innerHTML = '';
  const probs = calcProbabilities();

  tierConfig.forEach((t, idx) => {
    const tr = document.createElement('tr');
    const prob = probs[idx].probability;
    tr.innerHTML = `
      <td>
        <span class="tier-dot" style="background:${t.color};color:${t.color};"></span>
        <span class="tier-label">${t.icon} ${t.name}</span>
      </td>
      <td>
        <input class="tier-input prize-name-input" data-idx="${idx}" data-field="prize" value="${escapeHtml(t.prize)}">
      </td>
      <td class="pool-mode-only${gameMode==='prob'?' hide':''}">
        <input class="tier-input" data-idx="${idx}" data-field="count" type="number" value="${t.count}" min="0" max="${poolSize}">
      </td>
      <td class="pool-mode-only${gameMode==='prob'?' hide':''}">
        <span class="tier-percent">${prob.toFixed(1)}%</span>
      </td>
      <td class="prob-mode-only${gameMode==='pool'?'':' show'}">
        <input class="tier-input weight-mode" data-idx="${idx}" data-field="weight" type="number" value="${t.weight}" min="0" max="1000">
      </td>
      <td class="prob-mode-only${gameMode==='pool'?'':' show'}">
        <input class="tier-input cap-mode" data-idx="${idx}" data-field="cap" type="number" value="${t.cap}" min="0" max="999">
      </td>
    `;
    $tierConfigBody.appendChild(tr);
  });

  // Bind input events
  $tierConfigBody.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('change', () => {
      const idx = parseInt(inp.dataset.idx);
      const field = inp.dataset.field;
      const val = inp.type === 'number' ? parseInt(inp.value) || 0 : inp.value;
      tierConfig[idx][field] = val;
      // Clamp
      if (field === 'count') tierConfig[idx].count = Math.max(0, Math.min(poolSize, tierConfig[idx].count));
      if (field === 'weight') tierConfig[idx].weight = Math.max(0, Math.min(1000, tierConfig[idx].weight));
      if (field === 'cap') tierConfig[idx].cap = Math.max(0, Math.min(999, tierConfig[idx].cap));
      renderTierConfigTable();
      renderPoolViz();
    });
  });

  // Update column visibility
  document.querySelectorAll('.pool-mode-only').forEach(el => {
    el.classList.toggle('hide', gameMode === 'prob');
  });
  document.querySelectorAll('.prob-mode-only').forEach(el => {
    el.classList.toggle('show', gameMode === 'prob');
  });
  document.getElementById('thCount')?.classList.toggle('hide', gameMode === 'prob');
  document.getElementById('thPercent')?.classList.toggle('hide', gameMode === 'prob');
  document.getElementById('thWeight')?.classList.toggle('show', gameMode === 'prob');
  document.getElementById('thCap')?.classList.toggle('show', gameMode === 'prob');

  // Show/hide pool size row & viz
  $poolSizeRow.style.display = gameMode === 'pool' ? 'flex' : 'none';
  $poolVizSection.style.display = gameMode === 'pool' ? 'block' : 'none';
}

function renderPoolViz() {
  if (gameMode !== 'pool') { $poolViz.innerHTML = ''; $poolLegend.innerHTML = ''; return; }

  // Build full pool representation
  const fullPool = [];
  tierConfig.forEach((t, idx) => {
    for (let i = 0; i < t.count; i++) fullPool.push(idx);
  });
  while (fullPool.length < poolSize) fullPool.push(tierConfig.length - 1);
  const trimmed = fullPool.slice(0, poolSize);

  // Track which have been drawn
  const drawnCount = getOpenCount();
  const drawnTiers = [];
  boxes.forEach(b => {
    if (b.status === 'opened' && b.tierIndex !== null) drawnTiers.push(b.tierIndex);
  });

  $poolViz.innerHTML = '';
  // Show trimmed pool visually — mark first N as drawn
  trimmed.forEach((tierIdx, i) => {
    const dot = document.createElement('div');
    dot.className = 'pool-dot';
    if (i < drawnTiers.length) {
      dot.classList.add('drawn', tierConfig[drawnTiers[i]].cssClass);
    }
    $poolViz.appendChild(dot);
  });

  // Legend
  $poolLegend.innerHTML = tierConfig.map(t =>
    `<span><span class="dot" style="background:${t.color}"></span>${t.name}: ${t.count}</span>`
  ).join('');
}

function renderDrawHistory() {
  if (drawHistory.length === 0) {
    $drawHistory.innerHTML = '<div style="text-align:center;color:#555;padding:12px;">暂无记录</div>';
    return;
  }
  $drawHistory.innerHTML = drawHistory.slice().reverse().map((h, i) => {
    const t = tierConfig[h.tierIndex];
    return `<div class="history-item">
      <span>#${drawHistory.length - i} — 盒子 ${h.idx + 1}</span>
      <span style="color:${t.color}">${t.icon} ${t.name} — ${t.prize}</span>
      <span style="color:#666">${h.time}</span>
    </div>`;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================
// ADMIN PANEL — Event Handlers
// ============================================
function openAdminPanel() {
  updateAdminUI();
  $adminPanel.classList.add('open');
  $adminOverlay.classList.add('open');
}
function closeAdminPanel() {
  // Save config from inputs
  saveConfigFromInputs();
  $adminPanel.classList.remove('open');
  $adminOverlay.classList.remove('open');
  // Apply
  initBoxes(true);
  renderAllBoxes();
  updateRemaining();
  updateAdminUI();
}

function saveConfigFromInputs() {
  // Already saved via input change events, but force a final save
  $tierConfigBody.querySelectorAll('input').forEach(inp => {
    const idx = parseInt(inp.dataset.idx);
    const field = inp.dataset.field;
    const val = inp.type === 'number' ? (parseInt(inp.value) || 0) : inp.value;
    if (idx >= 0 && idx < tierConfig.length) {
      tierConfig[idx][field] = val;
    }
  });
  poolSize = parseInt($poolSizeInput.value) || 12;
  poolSize = Math.max(1, Math.min(200, poolSize));
}

// Mode toggle
document.getElementById('modeToggle').addEventListener('click', (e) => {
  const btn = e.target.closest('.mode-toggle-btn');
  if (!btn) return;
  const mode = btn.dataset.mode;
  if (mode === gameMode) return;

  gameMode = mode;
  document.querySelectorAll('.mode-toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  saveConfigFromInputs();
  initBoxes(false); // full reset when switching modes
  renderAllBoxes();
  updateRemaining();
  updateAdminUI();
});

// Pool size change
$poolSizeInput.addEventListener('change', () => {
  poolSize = parseInt($poolSizeInput.value) || 12;
  poolSize = Math.max(1, Math.min(200, poolSize));
  // Adjust tier counts so total <= poolSize
  let totalCount = tierConfig.reduce((s, t) => s + t.count, 0);
  if (totalCount > poolSize) {
    // Scale down proportionally
    const lastTier = tierConfig[tierConfig.length - 1];
    const others = tierConfig.slice(0, -1);
    let othersTotal = others.reduce((s, t) => s + t.count, 0);
    if (othersTotal >= poolSize) {
      // Scale all non-last tiers
      const scale = (poolSize - 0) / othersTotal;
      others.forEach(t => { t.count = Math.max(0, Math.floor(t.count * scale)); });
      lastTier.count = 0;
    } else {
      lastTier.count = poolSize - othersTotal;
    }
  }
  renderTierConfigTable();
  renderPoolViz();
});

// Admin close
$adminClose.addEventListener('click', closeAdminPanel);
$adminOverlay.addEventListener('click', closeAdminPanel);

// Action buttons
document.getElementById('btnApply').addEventListener('click', () => {
  saveConfigFromInputs();
  initBoxes(false);
  renderAllBoxes();
  updateRemaining();
  updateAdminUI();
});

document.getElementById('btnShuffle').addEventListener('click', () => {
  saveConfigFromInputs();
  if (gameMode === 'pool') {
    const unopened = boxes.filter(b => b.status === 'closed').length;
    prizePool = buildFixedPool();
    // Reassign unopened boxes from pool
    let pi = 0;
    boxes.forEach(b => {
      if (b.status === 'closed' && pi < prizePool.length) {
        b.tierIndex = prizePool[pi++];
      }
    });
    prizePool = prizePool.slice(pi);
  }
  renderAllBoxes();
  updateAdminUI();
});

document.getElementById('btnReset').addEventListener('click', () => {
  saveConfigFromInputs();
  boxes.forEach(b => { b.status = 'closed'; b.tierIndex = null; });
  drawHistory = [];
  initBoxes(false);
  renderAllBoxes();
  updateRemaining();
  updateAdminUI();
});

document.getElementById('btnResetAll').addEventListener('click', () => {
  tierConfig = JSON.parse(JSON.stringify(DEFAULT_TIERS));
  gameMode = 'pool';
  poolSize = 12;
  $poolSizeInput.value = 12;
  document.querySelectorAll('.mode-toggle-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-mode="pool"]').classList.add('active');
  initBoxes(false);
  renderAllBoxes();
  updateRemaining();
  updateAdminUI();
});

// ============================================
// PASSWORD MODAL
// ============================================
const ADMIN_PASSWORD = '8888';
let pwBuffer = '';

function buildNumpad() {
  const pad = document.getElementById('pwNumpad');
  const keys = ['1','2','3','4','5','6','7','8','9','清除','0','确认'];
  pad.innerHTML = '';
  keys.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'pw-key';
    if (k === '清除') { btn.classList.add('clear'); btn.textContent = '清除'; }
    else if (k === '确认') { btn.classList.add('confirm'); btn.textContent = '确认'; }
    else { btn.textContent = k; }
    btn.addEventListener('click', () => handleNumpadKey(k));
    btn.addEventListener('touchend', (e) => { e.preventDefault(); handleNumpadKey(k); });
    pad.appendChild(btn);
  });
}

function handleNumpadKey(key) {
  if (key === '清除') { pwBuffer = ''; $pwInput.value = ''; $pwError.textContent = ''; }
  else if (key === '确认') {
    if (pwBuffer === ADMIN_PASSWORD) {
      $pwModal.style.display = 'none';
      pwBuffer = ''; $pwInput.value = ''; $pwError.textContent = '';
      openAdminPanel();
    } else {
      $pwError.textContent = '密码错误，请重试';
      pwBuffer = ''; $pwInput.value = '';
    }
  } else {
    if (pwBuffer.length < 6) { pwBuffer += key; $pwInput.value = '●'.repeat(pwBuffer.length); $pwError.textContent = ''; }
  }
}

// ============================================
// GLOBAL EVENT LISTENERS
// ============================================
$adminTrigger.addEventListener('click', () => {
  pwBuffer = ''; $pwInput.value = ''; $pwError.textContent = '';
  $pwModal.style.display = 'flex';
});

$pwModal.addEventListener('click', (e) => {
  if (e.target === $pwModal) { $pwModal.style.display = 'none'; pwBuffer = ''; $pwInput.value = ''; $pwError.textContent = ''; }
});

$prizeOverlay.addEventListener('click', (e) => {
  if (e.target === $prizeOverlay && !isAnimating) { $prizeOverlay.classList.remove('active'); }
});

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.shiftKey && e.key === 'A') {
    e.preventDefault();
    if ($adminPanel.classList.contains('open')) closeAdminPanel();
    else { updateAdminUI(); openAdminPanel(); }
  }
  if (e.key === 'Escape') {
    if ($adminPanel.classList.contains('open')) closeAdminPanel();
    $pwModal.style.display = 'none';
    if ($prizeOverlay.classList.contains('active') && !isAnimating) $prizeOverlay.classList.remove('active');
  }
});

window.addEventListener('resize', resizeConfettiCanvas);
