<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RCB Anchor Drift</title>
  <style>
    :root {
      --ui-ink: #121820;
      --ui-panel: rgba(16, 22, 28, 0.88);
      --ui-panel-strong: rgba(12, 17, 22, 0.94);
      --ui-line: rgba(255, 255, 255, 0.16);
      --ui-line-hot: rgba(255, 216, 77, 0.78);
      --ui-yellow: #ffd84d;
      --ui-orange: #ff8a2a;
      --ui-red: #ff4d42;
      --ui-green: #4ee083;
      --ui-blue: #5db7ff;
      --ui-white: #f8fbff;
      --ui-muted: rgba(248, 251, 255, 0.72);
      --ui-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      --ui-font: "Arial", "Microsoft YaHei", sans-serif;
      --ui-mono: "Consolas", "Fira Code", "Share Tech Mono", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #58b866;
      font-family: var(--ui-font);
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #58b866;
    }

    .hint {
      display: none;
    }

    .leaderboard {
      position: fixed;
      left: 18px;
      top: 18px;
      width: 250px;
      padding: 8px 8px 9px;
      border-radius: 2px 8px 8px 2px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-left: 5px solid #ffffff;
      background: linear-gradient(180deg, rgba(7, 9, 11, 0.94), rgba(9, 12, 14, 0.88));
      color: var(--ui-white);
      font-size: 13px;
      line-height: 1.25;
      pointer-events: none;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    .leaderboard::before {
      content: "RCB";
      display: inline-block;
      margin: 0 0 5px;
      padding: 2px 9px 2px 7px;
      background: #ffffff;
      color: #080b0d;
      font: 900 12px/1 var(--ui-mono);
      letter-spacing: 0;
      transform: skewX(-10deg);
    }

    .leaderboard::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 29px;
      height: 3px;
      background: linear-gradient(90deg, #e91e24, transparent 72%);
    }

    .leaderboard strong {
      display: block;
      margin: 0 0 6px;
      padding: 2px 2px 5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      color: #ffffff;
      font: 900 12px/1 var(--ui-font);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .rank-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 6px;
      padding: 2px 2px 5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      color: #ffffff;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .lap-counter {
      padding: 2px 5px;
      background: #ffffff;
      color: #101418;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .leaderboard .player {
      color: #111820;
      font-weight: 700;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 24px 1fr 42px 58px;
      align-items: center;
      min-height: 24px;
      margin-top: 2px;
      padding: 0 5px 0 0;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.08);
      transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease, color 0.18s ease;
    }

    .rank-position {
      align-self: stretch;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.94);
      color: #111820;
      font: 900 13px/1 var(--ui-mono);
    }

    .rank-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-left: 8px;
      font-weight: 900;
    }

    .rank-change {
      text-align: right;
      font-size: 12px;
      font-weight: 900;
      font-family: var(--ui-mono);
    }

    .rank-gap {
      text-align: right;
      color: rgba(255, 255, 255, 0.82);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0;
      font-family: var(--ui-mono);
    }

    .rank-gap.leader {
      color: #111820;
      background: var(--ui-yellow);
      padding: 2px 3px;
      font-size: 9px;
      text-align: center;
    }

    .rank-up {
      background: rgba(78, 224, 131, 0.22);
      color: var(--ui-green);
      transform: translateX(6px);
      box-shadow: inset 4px 0 0 var(--ui-green);
    }

    .rank-down {
      background: rgba(255, 77, 66, 0.24);
      color: #ff8b83;
      transform: translateX(-6px);
      box-shadow: inset 4px 0 0 var(--ui-red);
    }

    .rank-steady .rank-change {
      color: rgba(255, 255, 255, 0.34);
    }

    .rank-row.player {
      background: linear-gradient(90deg, var(--ui-yellow), #f6b93b);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.18);
    }

    .rank-row.player .rank-position {
      background: #111820;
      color: var(--ui-yellow);
    }

    .rank-row.player .rank-gap,
    .rank-row.player .rank-change {
      color: #111820;
    }

    .speedometer {
      position: fixed;
      right: 24px;
      bottom: 22px;
      width: 150px;
      height: 150px;
      --speed-ring-inset: 5px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 48%, rgba(64, 78, 76, 0.72) 0 22%, rgba(19, 28, 31, 0.96) 23% 47%, rgba(7, 10, 13, 0.98) 48% 100%);
      box-shadow:
        0 16px 34px rgba(0, 0, 0, 0.34),
        0 0 0 4px rgba(248, 251, 255, 0.92),
        inset 0 0 0 10px rgba(0, 0, 0, 0.55),
        inset 0 0 0 21px rgba(20, 28, 31, 0.96);
      color: var(--ui-white);
      overflow: hidden;
      pointer-events: none;
      z-index: 2;
    }

    .speedometer.hidden {
      display: none;
    }

    .speedometer *::before,
    .speedometer *::after,
    .speed-center,
    .speed-dot,
    .dial-center {
      display: none !important;
      content: none !important;
      width: 0 !important;
      height: 0 !important;
      opacity: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
    }

    .speedometer::before {
      content: "";
      position: absolute;
      inset: var(--speed-ring-inset);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(14, 20, 23, 0.98) 0 56%, rgba(14, 20, 23, 0.92) 57%, transparent 58%),
        var(--rpm-arc, conic-gradient(from -135deg, rgba(255, 255, 255, 0.12) 0 360deg));
      box-shadow: 0 0 16px rgba(255, 216, 77, 0.24);
      z-index: 0;
    }

    .speedometer::after {
      content: "RCB";
      position: absolute;
      top: 25px;
      left: 50%;
      padding: 2px 8px;
      border-radius: 2px;
      background: #ffffff;
      color: #111820;
      font: 900 10px/1 var(--ui-mono);
      transform: translateX(-50%);
      z-index: 2;
    }

    .speed-readout {
      position: relative;
      text-align: center;
      transform: translateY(10px);
      z-index: 3;
      font-family: var(--ui-mono);
    }

    .speed-value {
      display: block;
      color: var(--ui-yellow);
      font-size: 44px;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.42);
    }

    .speed-unit {
      display: block;
      margin-top: 4px;
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 5vw, 64px);
      background:
        linear-gradient(rgba(255, 216, 77, 0.12) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255, 216, 77, 0.12) 2px, transparent 2px),
        linear-gradient(135deg, rgba(20, 25, 32, 0.98), rgba(32, 57, 48, 0.96) 55%, rgba(16, 21, 29, 0.98)),
        #111820;
      background-size: 32px 32px, 32px 32px, auto, auto;
      color: var(--ui-white);
      z-index: 5;
    }

    .start-screen::before {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.035) 0 2px,
          transparent 2px 6px
        );
      content: "";
      opacity: 0.55;
      pointer-events: none;
    }

    .start-screen.hidden {
      display: none;
    }

    .menu-panel {
      position: relative;
      width: min(420px, 100%);
      max-height: calc(100vh - 56px);
      overflow-y: auto;
      padding: 28px;
      border: 4px solid #f8fbff;
      border-radius: 0;
      background:
        linear-gradient(180deg, rgba(24, 31, 41, 0.98), rgba(11, 16, 23, 0.98));
      box-shadow:
        0 0 0 4px #101820,
        12px 12px 0 rgba(0, 0, 0, 0.72),
        0 0 0 8px rgba(255, 216, 77, 0.72);
      image-rendering: pixelated;
    }

    .menu-panel::before {
      display: block;
      width: fit-content;
      margin: 0 auto 18px;
      padding: 7px 14px;
      border: 3px solid #101820;
      background: var(--ui-yellow);
      color: #101820;
      content: "MAIN MENU";
      font: 900 14px var(--ui-mono);
      box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.72);
    }

    .menu-panel:has(#settingsMenu:not(.hidden))::before {
      content: "OPTIONS";
    }

    .menu-panel h1 {
      margin: 0 0 8px;
      color: var(--ui-yellow);
      font-size: clamp(30px, 7vw, 44px);
      font-family: var(--ui-mono);
      font-weight: 900;
      text-align: center;
      letter-spacing: 0;
      text-shadow:
        3px 3px 0 #101820,
        5px 5px 0 rgba(255, 138, 42, 0.75);
    }

    .menu-panel p {
      margin: 0 0 18px;
      color: var(--ui-muted);
      font: 800 13px/1.55 var(--ui-mono);
      text-align: center;
    }

    .menu-view.hidden {
      display: none;
    }

    .menu-section {
      margin-top: 16px;
      padding: 12px;
      border: 3px solid rgba(248, 251, 255, 0.2);
      background: rgba(255, 255, 255, 0.045);
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.26);
    }

    .menu-section strong {
      display: block;
      margin-bottom: 8px;
      color: var(--ui-white);
      font: 900 13px var(--ui-mono);
      font-weight: 900;
      text-align: center;
    }

    .difficulty-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .language-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .map-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .map-buttons .menu-button {
      width: 100%;
      min-height: 52px;
      font-size: 15px;
      text-align: center;
      justify-self: stretch;
    }

    .controller-status {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .controller-dock {
      position: absolute;
      left: clamp(18px, 3vw, 34px);
      bottom: clamp(18px, 3vw, 34px);
      width: min(340px, calc(100vw - 36px));
      padding: 12px;
      border: 3px solid rgba(248, 251, 255, 0.22);
      background: rgba(8, 12, 16, 0.72);
      box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    .controller-dock strong {
      display: block;
      margin-bottom: 8px;
      color: var(--ui-yellow);
      font: 900 12px var(--ui-mono);
    }

    .controller-readout {
      min-width: 0;
      padding: 9px 10px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      background: rgba(8, 12, 16, 0.58);
      color: rgba(248, 251, 255, 0.78);
      font: 900 12px/1.35 var(--ui-mono);
    }

    .controller-name {
      display: block;
      color: var(--ui-white);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .controller-state {
      display: block;
      margin-top: 3px;
      color: #ff8b83;
    }

    .controller-force {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 8px;
      margin-top: 7px;
      color: rgba(248, 251, 255, 0.78);
      font-size: 11px;
      letter-spacing: 0;
    }

    .controller-force-track {
      height: 10px;
      overflow: hidden;
      border: 1px solid rgba(248, 251, 255, 0.32);
      background: rgba(248, 251, 255, 0.12);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.34);
    }

    .controller-force-fill {
      display: block;
      width: 100%;
      height: 100%;
      transform: scaleX(0);
      transform-origin: left center;
      background: linear-gradient(90deg, var(--ui-green), var(--ui-yellow), #ff645f);
      transition: transform 90ms linear;
    }

    .controller-readout.connected {
      border-color: rgba(78, 224, 131, 0.76);
      box-shadow: inset 4px 0 0 var(--ui-green);
    }

    .controller-readout.connected .controller-state {
      color: var(--ui-green);
    }

    .controller-readout.checking .controller-state {
      color: var(--ui-yellow);
    }

    .controller-scan {
      min-width: 76px;
      min-height: 44px;
      padding-inline: 10px;
    }

    .menu-button {
      min-height: 44px;
      border: 3px solid #f8fbff;
      border-radius: 0;
      background: #18212b;
      color: var(--ui-white);
      font: 900 13px var(--ui-mono);
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.78);
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }

    .menu-button.active,
    .menu-button.primary {
      border-color: #101820;
      background: var(--ui-yellow);
      color: var(--ui-ink);
      box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.78);
    }

    .menu-button:hover,
    .autopilot-button:hover,
    .autopilot-toggle:hover,
    .pause-button:hover {
      border-color: var(--ui-yellow);
      background: #263342;
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 rgba(0, 0, 0, 0.78);
    }

    .menu-button.primary:hover,
    .menu-button.active:hover,
    .autopilot-button.active:hover,
    .pause-button.active:hover {
      border-color: #101820;
      background: #fff0a3;
      color: var(--ui-ink);
    }

    .menu-button:focus-visible,
    .autopilot-button:focus-visible,
    .autopilot-toggle:focus-visible,
    .pause-button:focus-visible,
    .menu-slider:focus-visible,
    .autopilot-slider:focus-visible {
      outline: 3px solid rgba(93, 183, 255, 0.86);
      outline-offset: 3px;
    }

    .menu-slider {
      width: 100%;
      accent-color: var(--ui-yellow);
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      color: var(--ui-muted);
      font: 800 13px var(--ui-mono);
    }

    .start-action {
      width: 100%;
      margin-top: 8px;
      min-height: 52px;
      font-size: 16px;
    }

    #startButton,
    #raceButton {
      min-height: 52px;
      font-size: 16px;
    }

    .menu-actions {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .game-over {
      position: fixed;
      left: 50%;
      top: 50%;
      display: none;
      width: min(430px, calc(100vw - 40px));
      min-width: 300px;
      padding: 28px;
      border: 4px solid #f8fbff;
      border-radius: 0;
      background: linear-gradient(180deg, rgba(24, 31, 41, 0.98), rgba(11, 16, 23, 0.98));
      color: var(--ui-white);
      text-align: center;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      z-index: 6;
      font-size: 0;
      box-shadow:
        0 0 0 4px #101820,
        12px 12px 0 rgba(0, 0, 0, 0.72),
        0 0 0 8px rgba(255, 216, 77, 0.72);
      image-rendering: pixelated;
    }

    .game-over::before {
      display: block;
      width: fit-content;
      margin: -45px auto 16px;
      padding: 7px 14px;
      border: 3px solid #101820;
      background: var(--ui-yellow);
      color: #101820;
      content: "RESULT";
      font: 900 14px var(--ui-mono);
      box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.72);
    }

    .game-over.visible {
      display: block;
    }

    .game-over strong {
      display: block;
      margin: 0 0 12px;
      color: var(--ui-yellow);
      font-size: clamp(28px, 7vw, 42px);
      font-family: var(--ui-mono);
      font-weight: 900;
      text-shadow:
        3px 3px 0 #101820,
        5px 5px 0 rgba(255, 77, 66, 0.75);
    }

    .game-over > strong:not(:first-child) {
      display: none;
    }

    .game-over div {
      color: var(--ui-muted);
      font: 900 14px/1.55 var(--ui-mono);
    }

    .game-over-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .respawn-banner {
      position: fixed;
      left: 50%;
      top: 86px;
      min-width: 220px;
      padding: 12px 18px;
      border: 2px solid var(--ui-line-hot);
      border-radius: 8px;
      background: var(--ui-panel);
      color: var(--ui-white);
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 3;
      box-shadow: var(--ui-shadow);
      backdrop-filter: blur(10px);
    }

    .respawn-banner.hidden {
      display: none;
    }

    .respawn-time {
      color: var(--ui-yellow);
      font-size: 22px;
      font-family: var(--ui-mono);
    }

    .race-timer {
      position: fixed;
      right: 24px;
      top: 214px;
      min-width: 130px;
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 3px;
      border-left: 4px solid var(--ui-yellow);
      background: rgba(7, 10, 12, 0.86);
      color: var(--ui-white);
      font: 900 11px var(--ui-font);
      font-weight: 800;
      text-align: center;
      pointer-events: none;
      z-index: 2;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(10px);
    }

    .race-timer.hidden {
      display: none;
    }

    .race-timer span {
      color: var(--ui-yellow);
      font-size: 19px;
      font-family: var(--ui-mono);
    }

    .race-notice {
      position: fixed;
      left: 50%;
      top: 18px;
      min-width: 188px;
      padding: 5px 14px 6px;
      border: 0;
      border-radius: 2px;
      background: #ffffff;
      color: #090d10;
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      transform: translateX(-50%);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25), inset 0 -3px 0 #111820;
      pointer-events: none;
      z-index: 4;
      animation: raceNoticePulse 0.8s ease-out infinite alternate;
      font-family: var(--ui-font);
      text-transform: uppercase;
    }

    .race-notice::before {
      content: "RCB FLAG";
      display: inline-block;
      margin-right: 8px;
      padding-right: 8px;
      border-right: 2px solid #111820;
      color: #111820;
      font: 900 10px var(--ui-mono);
    }

    .race-notice.hidden {
      display: none;
    }

    @keyframes raceNoticePulse {
      from {
        transform: translateX(-50%) scale(1);
      }

      to {
        transform: translateX(-50%) scale(1.04);
      }
    }

    .track-preview {
      position: fixed;
      right: 24px;
      top: 22px;
      width: 176px;
      height: 176px;
      border: 5px solid rgba(255, 216, 77, 0.94);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(22, 30, 38, 0.84), rgba(9, 13, 18, 0.82));
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28), inset 0 0 0 8px rgba(255, 255, 255, 0.05);
      pointer-events: none;
      z-index: 2;
      backdrop-filter: blur(6px);
    }

    .track-preview.hidden {
      display: none;
    }

    .full-map {
      position: fixed;
      left: 50%;
      bottom: 10px;
      width: 300px;
      height: 178px;
      border: 0;
      background: transparent;
      box-shadow: none;
      opacity: 0.68;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 1;
    }

    .full-map.hidden {
      display: none;
    }

    .tutorial-overlay {
      position: fixed;
      display: none;
      width: min(560px, calc(100vw - 36px));
      min-height: 74px;
      padding: 17px 18px 12px;
      border: 3px solid var(--ui-yellow);
      border-radius: 10px;
      background: rgba(10, 16, 22, 0.9);
      color: var(--ui-yellow);
      text-align: center;
      pointer-events: none;
      z-index: 5;
      box-shadow: var(--ui-shadow);
      backdrop-filter: blur(8px);
    }

    .tutorial-overlay.visible {
      display: block;
    }

    .tutorial-title {
      font: 900 20px var(--ui-font);
      line-height: 1.1;
    }

    function getStartGridProgress(slotIndex) {
      if (selectedMap === "fixed") {
        return fixedStartProgress - slotIndex * 56;
      }
      return 188 - slotIndex * 44;
    }

    function getStartGridLaneOffset(slotIndex) {
      return slotIndex % 2 === 0 ? -42 : 42;
    }

    function getStartGridSlot(slotIndex) {
      const progress = getStartGridProgress(slotIndex);
      const laneOffset = getStartGridLaneOffset(slotIndex);
      const point = getTrackPointAtProgress(progress);
      return {
        progress,
        laneOffset,
        x: point.x + point.normal.x * laneOffset,
        y: point.y + point.normal.y * laneOffset,
        angle: Math.atan2(point.tangent.y, point.tangent.x),
        tangent: point.tangent,
        normal: point.normal
      };
    }

    function invalidateTrackGeometryCache() {
      cachedWorldTrackPoints = null;
      cachedTrackMetrics = null;
      cachedCurbGeometry = null;
      tracksideLogoPoseCache.clear();
    }

    function buildFixedCircuitTrack() {
      const points = fixedMapPoints.map(toFixedMapWorldPoint);
      const corners = points.map((point, index) => getFixedCorner(points, index));

      for (let step = 0; step < corners.length; step += 1) {
        const i = (step + 1) % corners.length;
        const previous = corners[(i - 1 + corners.length) % corners.length];
        const current = corners[i];
        appendFixedLine(previous.arcEnd, current.arcStart);

        if (current.radius > 0 && current.turnAbs > 0.18) {
          trackSegments.push({
            type: "arc",
            center: current.center,
            radius: current.radius,
            start: current.start,
            end: current.end,
            dir: current.dir,
            turnAbs: current.turnAbs
          });

          if (current.turnAbs > 0.26) {
            anchors.push({
              x: current.center.x,
              y: current.center.y,
              r: current.radius,
              turnAbs: current.turnAbs,
              turnDir: current.dir,
              fixedIndex: i,
              trackX: current.midPoint.x,
              trackY: current.midPoint.y,
              exitX: current.arcEnd.x,
              exitY: current.arcEnd.y
            });
          }
        }
      }

      invalidateTrackGeometryCache();
      pruneFixedHairpinAnchors();
      assignFixedAnchorProgress();
      numberFixedAnchors();
      fixedStartProgress = getFixedStartProgress();
      addFixedMapBoostPads();
      addFixedBoostPadAfterTurn(14, 90);
    }

    function toFixedMapWorldPoint(point) {
      return {
        x: (point.x - fixedMapOrigin.x) * fixedMapScale + fixedMapStart.x,
        y: (point.y - fixedMapOrigin.y) * fixedMapScale + fixedMapStart.y
      };
    }

    function getFixedStartProgress() {
      const start = fixedMapPoints[0];
      const next = fixedMapPoints[1];
      const startGridPoint = toFixedMapWorldPoint({
        x: start.x + (next.x - start.x) * 0.16,
        y: start.y + (next.y - start.y) * 0.16
      });
      return getTrackProgressAtPoint(startGridPoint.x, startGridPoint.y);
    }

    function getFixedStartFinishProgress() {
      return getStartGridProgress(0) + 76;
    }

    function getFixedRaceFinishProgress() {
      const metrics = buildTrackMetrics();
      return getFixedStartFinishProgress() + metrics.total;
    }

    function getFixedCorner(points, index) {
      const previous = points[(index - 1 + points.length) % points.length];
      const current = points[index];
      const next = points[(index + 1) % points.length];
      const inVector = normalizeVector(current.x - previous.x, current.y - previous.y);
      const outVector = normalizeVector(next.x - current.x, next.y - current.y);
      const turn = shortAngle(Math.atan2(outVector.y, outVector.x) - Math.atan2(inVector.y, inVector.x));
      const turnAbs = Math.abs(turn);

      if (turnAbs < 0.08) {
        return {
          arcStart: current,
          arcEnd: current,
          radius: 0,
          turnAbs: 0
        };
      }

      const inLength = Math.hypot(current.x - previous.x, current.y - previous.y);
      const outLength = Math.hypot(next.x - current.x, next.y - current.y);
      const maxTangent = Math.min(inLength, outLength) * (index === 31 ? 0.52 : 0.48);
      const tangentFactor = Math.max(0.12, Math.tan(turnAbs / 2));
      const maxRadius = index === 31 ? fixedMapCornerRadius * 1.28 : fixedMapCornerRadius;
      const minRadius = index === 31 ? 180 : 140;
      const radius = Math.max(minRadius, Math.min(maxRadius, maxTangent / tangentFactor));
      const tangentDistance = radius * tangentFactor;
      const arcStart = {
        x: current.x - inVector.x * tangentDistance,
        y: current.y - inVector.y * tangentDistance
      };
      const arcEnd = {
        x: current.x + outVector.x * tangentDistance,
        y: current.y + outVector.y * tangentDistance
      };
      const dir = turn > 0 ? 1 : -1;
      const center = {
        x: arcStart.x - inVector.y * radius * dir,
        y: arcStart.y + inVector.x * radius * dir
      };

      return {
        arcStart,
        arcEnd,
        center,
        radius,
        start: Math.atan2(arcStart.y - center.y, arcStart.x - center.x),
        end: Math.atan2(arcEnd.y - center.y, arcEnd.x - center.x),
        midPoint: getArcMidPoint(center, radius, Math.atan2(arcStart.y - center.y, arcStart.x - center.x), Math.atan2(arcEnd.y - center.y, arcEnd.x - center.x), dir),
        dir,
        turnAbs,
      };
    }

    function getArcMidPoint(center, radius, start, end, dir) {
      let total = end - start;
      if (dir > 0 && total < 0) total += Math.PI * 2;
      if (dir < 0 && total > 0) total -= Math.PI * 2;
      const angle = start + total * 0.5;
      return {
        x: center.x + Math.cos(angle) * radius,
        y: center.y + Math.sin(angle) * radius
      };
    }

    function appendFixedLine(from, to) {
      const length = Math.hypot(to.x - from.x, to.y - from.y);
      if (length < 6) return;
      trackSegments.push({ type: "line", from, to, long: length >= 520 });
    }

    function assignFixedAnchorProgress() {
      anchors.forEach((anchor) => {
        anchor.progress = getTrackProgressAtPoint(anchor.trackX, anchor.trackY);
        if (Number.isFinite(anchor.exitX) && Number.isFinite(anchor.exitY)) {
          anchor.exitProgress = getTrackProgressAtPoint(anchor.exitX, anchor.exitY);
        }
      });
      anchors.sort((a, b) => a.progress - b.progress);
    }

    function numberFixedAnchors() {
      anchors.forEach((anchor, index) => {
        anchor.turnNumber = index + 1;
      });
    }

    function pruneFixedHairpinAnchors() {
      const hairpinThreshold = 120 * Math.PI / 180;
      const minorTurnThreshold = 45 * Math.PI / 180;
      const clusterDistance = road.width;
      const keep = anchors.map(() => true);

      anchors.forEach((mainAnchor, mainIndex) => {
        if (mainAnchor.turnAbs < hairpinThreshold) return;

        anchors.forEach((anchor, index) => {
          if (index === mainIndex || anchor.turnAbs >= minorTurnThreshold) return;

          const distance = Math.hypot(anchor.x - mainAnchor.x, anchor.y - mainAnchor.y);
          const pointDelta = getFixedPointIndexDelta(anchor.fixedIndex, mainAnchor.fixedIndex);
          if (distance <= clusterDistance && pointDelta <= 2) {
            keep[index] = false;
          }
        });
      });

      anchors = anchors.filter((_, index) => keep[index]);
    }

    function getFixedPointIndexDelta(a, b) {
      if (!Number.isFinite(a) || !Number.isFinite(b)) return Infinity;
      const count = fixedMapPoints.length;
      const delta = Math.abs(a - b);
      return Math.min(delta, count - delta);
    }

    function addFixedMapBoostPads() {
      for (const segment of trackSegments) {
        if (segment.type !== "line" || !segment.long) continue;
        const heading = Math.atan2(segment.to.y - segment.from.y, segment.to.x - segment.from.x);
        const length = Math.hypot(segment.to.x - segment.from.x, segment.to.y - segment.from.y);
        addFixedBoostPadsOnStraight(segment.from, segment.to, heading, length);
      }
    }

    function addFixedBoostPadAfterTurn(turnNumber, exitDistance) {
      const anchor = anchors.find((item) => item.turnNumber === turnNumber);
      if (!anchor || !Number.isFinite(anchor.progress)) return;

      const baseProgress = Number.isFinite(anchor.exitProgress) ? anchor.exitProgress : anchor.progress;
      const point = getTrackPointAtProgress(baseProgress + exitDistance);
      boostPads.push({
        x: point.x,
        y: point.y,
        angle: Math.atan2(point.tangent.y, point.tangent.x),
        used: false,
        cooldown: 0,
        source: `turn-${turnNumber}-exit`
      });
    }

    function addFixedBoostPadsOnStraight(from, to, heading, length) {
      if (length < 520) return;

      const count = Math.max(1, Math.min(4, Math.floor(length / 560)));
      for (let i = 0; i < count; i += 1) {
        const t = count === 1 ? 0.5 : 0.22 + (i / (count - 1)) * 0.56;
        boostPads.push({
          x: from.x + (to.x - from.x) * t,
          y: from.y + (to.y - from.y) * t,
          angle: heading,
          used: false,
          cooldown: 0
        });
      }
    }

    function generateNextTrackSection() {
      const straightLength = generator.section === 0 ? 780 : 620 + (generator.section % 3) * 110;
      let bestCandidate = null;
      let bestScore = -Infinity;
      const candidates = buildTrackSectionCandidates(straightLength);
      const safeClearance = road.width * 1.35;

      for (const candidate of candidates) {
        const score = scoreTrackCandidate(candidate);

        if (score > bestScore) {
          bestCandidate = candidate;
          bestScore = score;
        }

        if (candidate.clearance >= safeClearance && candidate.forwardTravel >= -80) {
          break;
        }
      }

      appendTrackSection(bestCandidate);
      generator.section += 1;
      invalidateTrackGeometryCache();
    }

    function buildTrackSectionCandidates(baseStraightLength) {
      const lengths = generator.section === 0
        ? [baseStraightLength]
        : [baseStraightLength, baseStraightLength + 260, baseStraightLength + 520, baseStraightLength + 820];
      const angles = buildTurnAngleOptions();
      const directions = buildTurnDirectionOptions();
      const candidates = [];

      for (const length of lengths) {
        for (const turnAbs of angles) {
          for (const turnDir of directions) {
            candidates.push(buildTrackSectionCandidate(length, turnAbs, turnDir));
          }
        }
      }

      return candidates;
    }

    function buildTurnAngleOptions() {
      const angles = [Math.PI / 2, Math.PI / 4];
      const normalized = normalizeAngle(generator.heading);
      const horizontal = Math.abs(Math.sin(normalized)) < 0.2;
      if (horizontal && generator.section > 1 && generator.section >= generator.nextHairpinSection) {
        angles.unshift(Math.PI);
      }
      return angles;
    }

    function buildTurnDirectionOptions() {
      const normalized = normalizeAngle(generator.heading);
      const horizontal = Math.abs(Math.sin(normalized)) < 0.2;
      if (horizontal) {
        const preferred = Math.cos(normalized) > 0 ? -1 : 1;
        return [preferred, -preferred];
      }

      const preferred = generator.section % 2 === 0 ? 1 : -1;
      return [preferred, -preferred];
    }

    function buildTrackSectionCandidate(straightLength, turnAbs, turnDir) {
      const from = { ...generator.point };
      const to = {
        x: from.x + Math.cos(generator.heading) * straightLength,
        y: from.y + Math.sin(generator.heading) * straightLength
      };
      const radius = 160;
      const leftX = -Math.sin(generator.heading);
      const leftY = Math.cos(generator.heading);
      const center = {
        x: to.x + leftX * radius * turnDir,
        y: to.y + leftY * radius * turnDir
      };
      const start = Math.atan2(to.y - center.y, to.x - center.x);
      const end = start + turnDir * turnAbs;
      const exit = {
        x: center.x + Math.cos(end) * radius,
        y: center.y + Math.sin(end) * radius
      };
      const exitHeading = generator.heading + turnDir * turnAbs;
      const forwardTravel = generator.point.y - exit.y;
      const centerDrift = Math.abs(exit.x);

      return { from, to, center, radius, start, end, exit, exitHeading, turnDir, turnAbs, straightLength, forwardTravel, centerDrift };
    }

    function scoreTrackCandidate(candidate) {
      candidate.clearance = getTrackCandidateClearance(candidate);
      const forwardScore = candidate.forwardTravel * 0.45;
      const driftPenalty = Math.max(0, candidate.centerDrift - 1200) * 0.65;
      const backwardPenalty = candidate.forwardTravel < -80 ? Math.abs(candidate.forwardTravel) * 3.2 : 0;
      const downwardHeadingPenalty = Math.sin(candidate.exitHeading) > 0.35 ? 420 : 0;
      const angleBonus = candidate.turnAbs === Math.PI / 4 ? 70 : 0;
      return candidate.clearance * 3 + forwardScore + angleBonus - driftPenalty - backwardPenalty - downwardHeadingPenalty;
    }

    function appendTrackSection(candidate) {
      trackSegments.push({ type: "line", from: candidate.from, to: candidate.to, long: candidate.straightLength >= 620 });
      addBoostPadsOnStraight(candidate.from, candidate.to, generator.heading, candidate.straightLength);
      trackSegments.push({
        type: "arc",
        center: candidate.center,
        radius: candidate.radius,
        start: candidate.start,
        end: candidate.end,
        dir: candidate.turnDir,
        turnAbs: candidate.turnAbs
      });
      anchors.push({
        x: candidate.center.x,
        y: candidate.center.y,
        r: candidate.radius,
        turnAbs: candidate.turnAbs,
        turnDir: candidate.turnDir,
        turnNumber: generator.section + 1
      });
      generator.point = candidate.exit;
      generator.heading += candidate.turnDir * candidate.turnAbs;

      if (candidate.turnAbs === Math.PI) {
        generator.nextHairpinSection = generator.section + 3 + Math.floor(Math.random() * 4);
      }
    }

    function getTrackCandidateClearance(candidate) {
      const existingPoints = buildWorldTrackPoints();
      if (existingPoints.length < 8) return Infinity;

      const candidatePoints = [];
      addLinePoints(candidatePoints, candidate.from, candidate.to, 18);
      addArcPoints(candidatePoints, candidate.center, candidate.radius, candidate.start, candidate.end, candidate.turnDir, candidate.turnAbs > Math.PI / 2 ? 36 : 18);

      const compareLimit = getRecentTrackCutoffIndex(existingPoints, 620);
      if (compareLimit < 2) return Infinity;

      let nearest = Infinity;
      for (let i = 3; i < candidatePoints.length; i += 2) {
        const point = candidatePoints[i];
        for (let j = 0; j < compareLimit - 1; j += 2) {
          const distance = distanceToSegment(point.x, point.y, existingPoints[j], existingPoints[j + 1]);
          if (distance < nearest) nearest = distance;
        }
      }
      return nearest;
    }

    function getRecentTrackCutoffIndex(points, ignoredDistance) {
      let remaining = ignoredDistance;
      for (let i = points.length - 1; i > 0; i -= 1) {
        remaining -= Math.hypot(points[i].x - points[i - 1].x, points[i].y - points[i - 1].y);
        if (remaining <= 0) return i;
      }
      return 0;
    }

    function addBoostPadsOnStraight(from, to, heading, length) {
      if (length < 620) return;

      const count = length > 760 ? 2 : 1;
      for (let i = 0; i < count; i += 1) {
        const t = count === 1 ? 0.48 : 0.36 + i * 0.22;
      boostPads.push({
        x: from.x + (to.x - from.x) * t,
        y: from.y + (to.y - from.y) * t,
        angle: heading,
        used: false,
        cooldown: 0
      });
      }
    }

    function ensureTrackAhead() {
      if (selectedMap === "fixed") return;
      while (anchors.length - activeAnchorIndex < 5) {
        generateNextTrackSection();
      }
    }

    function ensureTrackToProgress(progress) {
      if (selectedMap === "fixed") return;
      let metrics = buildTrackMetrics();
      while (metrics.total < progress) {
        generateNextTrackSection();
        metrics = buildTrackMetrics();
      }
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const width = Math.floor(window.innerWidth * dpr);
      const height = Math.floor(window.innerHeight * dpr);
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function worldToScreen(x, y) {
      return {
        x: (x - camera.x) * view.zoom + window.innerWidth / 2,
        y: (y - camera.y) * view.zoom + window.innerHeight * 0.68
      };
    }

    function screenToWorld(x, y) {
      return {
        x: (x - window.innerWidth / 2) / view.zoom + camera.x,
        y: (y - window.innerHeight * 0.68) / view.zoom + camera.y
      };
    }

    function scaled(value) {
      return value * view.zoom;
    }

    function getNearestAnchor() {
      syncActiveAnchorToCar();
      if (selectedMap === "fixed") {
        const reachableAnchor = getReachableFixedAnchor();
        if (reachableAnchor) return reachableAnchor;
      }
      const anchor = anchors[activeAnchorIndex];
      if (!anchor) return null;

      const dx = anchor.x - car.x;
      const dy = anchor.y - car.y;
      const distance = Math.hypot(dx, dy);
      if (distance <= rope.maxReach) return anchor;
      return null;
    }

    function getReachableFixedAnchor() {
      const metrics = buildTrackMetrics();
      const progress = getTrackProgressAt(car.x, car.y);
      const maxForwardDelta = Math.max(1400, rope.maxReach * 2.4);
      const maxReconnectDelta = Math.max(620, rope.maxReach * 1.15);
      let best = null;
      let bestScore = Infinity;
      let bestIndex = activeAnchorIndex;

      anchors.forEach((anchor, index) => {
        const forwardDelta = getFixedAnchorForwardDelta(anchor, progress, metrics.total);
        const backwardDelta = getFixedAnchorBackwardDelta(anchor, progress, metrics.total);
        const recentlyPassed = backwardDelta <= maxReconnectDelta;
        if (forwardDelta > maxForwardDelta && !recentlyPassed) return;

        const distance = Math.hypot(anchor.x - car.x, anchor.y - car.y);
        if (distance > rope.maxReach) return;

        const score = recentlyPassed
          ? backwardDelta * 0.45 + distance * 0.16
          : forwardDelta + distance * 0.08;

        if (score < bestScore) {
          best = anchor;
          bestScore = score;
          bestIndex = index;
        }
      });

      if (best) activeAnchorIndex = bestIndex;
      return best;
    }

    function getFixedAnchorForwardDelta(anchor, progress, trackTotal) {
      if (!trackTotal) return Infinity;
      return (anchor.progress - progress + trackTotal) % trackTotal;
    }

    function getFixedAnchorBackwardDelta(anchor, progress, trackTotal) {
      if (!trackTotal) return Infinity;
      return (progress - anchor.progress + trackTotal) % trackTotal;
    }

    function attachToAnchor(anchor) {
      car.attached = true;
      car.anchor = anchor;
      car.speed = Math.max(getPlayerBaseSpeed(), Math.hypot(car.vx, car.vy));
      car.visualAngle = car.angle;
      showExpoFeedback(selectedLanguage === "zh" ? "保持刹车" : "Hold brake", 0.9);
    }

    function detachFromAnchor() {
      if (!car.attached) return;

      const currentSpeed = Math.max(1, Math.hypot(car.vx, car.vy));
      const releaseSpeed = Math.min(car.maxFreeSpeed, currentSpeed * 1.04);
      car.vx = (car.vx / currentSpeed) * releaseSpeed;
      car.vy = (car.vy / currentSpeed) * releaseSpeed;
      car.speed = releaseSpeed;
      const heading = Math.atan2(car.vy, car.vx);
      car.angle = Math.atan2(car.vy, car.vx);
      car.visualAngle = heading - shortAngle(heading - car.visualAngle) * 0.34;
      car.attached = false;
      car.anchor = null;
      car.detachedFlash = 0.22;
      car.slideTimer = 0.78;
      registerCornerExit(releaseSpeed);
    }

    function registerCornerExit(releaseSpeed) {
      const displaySpeed = releaseSpeed * 0.38;
      expo.bestExitSpeed = Math.max(expo.bestExitSpeed, displaySpeed);
      expo.combo += 1;
      expo.tutorialComplete = true;
      expo.tutorialActive = false;

      const perfect = displaySpeed >= 145 || expo.combo >= 3;
      const text = selectedLanguage === "zh"
        ? `${perfect ? "完美出弯" : "漂亮出弯"} x${expo.combo}`
        : `${perfect ? "PERFECT EXIT" : "GOOD EXIT"} x${expo.combo}`;
      showExpoFeedback(text, perfect ? 1.8 : 1.3);
    }

    function showExpoFeedback(text, duration = 1.2) {
      expo.feedbackText = text;
      expo.feedbackTimer = duration;
    }

    function update(dt) {
      updateExpoState(dt);
      if (car.crashed) {
        ensureTrackAhead();
        updateDifficulty(dt);
        updateRespawnPenalty(dt);
        updateSkidMarks(dt);
        updateAiOpponents(dt);
        resolveVehicleCollisions(dt);
        updateRaceState(dt);
        camera.x += (car.x - camera.x) * Math.min(1, dt * 5);
        camera.y += (car.y - camera.y) * Math.min(1, dt * 5);
        updateLeaderboardPanelF1();
        return;
      }

      ensureTrackAhead();
      updateDifficulty(dt);
      syncActiveAnchorToCar();

      if (autopilot.enabled) {
        clearBrakeInput();
        applyAutopilot(dt);
      } else {
        if (input.space && !car.attached) {
          const anchor = getNearestAnchor();
          if (anchor) attachToAnchor(anchor);
        }

        if (!input.space && car.attached) {
          detachFromAnchor();
        }

        if (car.attached && car.anchor) {
          applyRopePull(dt);
        } else {
          applyStraightCentering(dt);
        }

        applyEngineAssist(dt);
      }

      car.x += car.vx * dt;
      car.y += car.vy * dt;
      applyBoostPads(dt);
      car.vx *= car.attached ? 0.998 : 0.999;
      car.vy *= car.attached ? 0.998 : 0.999;
      car.speed = Math.hypot(car.vx, car.vy);
      expo.maxSpeed = Math.max(expo.maxSpeed, car.speed * 0.38);
      car.angle = Math.atan2(car.vy, car.vx);

      if (car.attached) {
        car.visualAngle += shortAngle(car.angle - car.visualAngle) * Math.min(1, dt * 7);
      } else if (car.slideTimer > 0) {
        car.visualAngle += shortAngle(car.angle - car.visualAngle) * dt * 2.4;
        addSkidMark();
      } else {
        car.visualAngle += shortAngle(car.angle - car.visualAngle) * Math.min(1, dt * 10);
      }

      car.detachedFlash = Math.max(0, car.detachedFlash - dt);
      car.slideTimer = Math.max(0, car.slideTimer - dt);
      car.boostTimer = Math.max(0, car.boostTimer - dt);
      updatePracticeLapCounter();
      updateSkidMarks(dt);
      updateAiOpponents(dt);
      resolveVehicleCollisions(dt);
      updateRaceState(dt);
      if (race.finished) return;
      advanceActiveAnchor();

      if (isOutsideRoad()) {
        startRespawnPenalty();
      }

      camera.x += (car.x - camera.x) * Math.min(1, dt * 5);
      camera.y += (car.y - camera.y) * Math.min(1, dt * 5);
      updateLeaderboardPanelF1();
    }

    function updateRespawnPenalty(dt) {
      car.respawnTimer = Math.max(0, car.respawnTimer - dt);
      updateRespawnBanner();

      if (car.respawnTimer > 0) return;
      finishRespawn();
    }

    function updateExpoState(dt) {
      if (!gameStarted || race.finished || gameOverEl.classList.contains("visible")) return;

      expo.elapsed += dt;
      expo.feedbackTimer = Math.max(0, expo.feedbackTimer - dt);
      if (expo.tutorialActive && (expo.tutorialComplete || expo.elapsed >= expo.tutorialDuration)) {
        expo.tutorialActive = false;
      }
    }

    function getExpoEaseScale() {
      if (!gameStarted) return 1;
      if (expo.elapsed >= expo.friendlyDuration) return 1;
      return 0.82 + 0.18 * (expo.elapsed / expo.friendlyDuration);
    }

    function resetPracticeLapCounter() {
      const progress = selectedMap === "fixed" ? getTrackProgressAt(car.x, car.y) : 0;
      practiceLap.completed = 0;
      practiceLap.lastProgress = progress;
      practiceLap.totalProgress = progress;
    }

    function updatePracticeLapCounter() {
      if (selectedMap !== "fixed") return;

      const metrics = buildTrackMetrics();
      if (!metrics.total) return;

      const progress = getTrackProgressAt(car.x, car.y);
      const crossedForward = practiceLap.lastProgress > metrics.total * 0.72 && progress < metrics.total * 0.28;
      const crossedBackward = practiceLap.lastProgress < metrics.total * 0.18 && progress > metrics.total * 0.82;

      if (crossedForward) {
        practiceLap.completed += 1;
      } else if (crossedBackward && practiceLap.completed > 0) {
        practiceLap.completed -= 1;
      }

      practiceLap.lastProgress = progress;
      practiceLap.totalProgress = practiceLap.completed * metrics.total + progress;
    }

    function getPlayerRaceProgress() {
      return selectedMap === "fixed" ? practiceLap.totalProgress : getTrackProgressAt(car.x, car.y);
    }

    function updateRaceState(dt) {
      if (currentMode !== "race" || race.finished) {
        updateRaceTimer();
        updateRaceNotice(dt);
        return;
      }

      race.elapsed += dt;
      const playerProgress = getPlayerRaceProgress();

      if (selectedMap !== "fixed" && race.finishProgress === null && race.elapsed >= race.duration - race.finishLeadTime) {
        race.finishProgress = playerProgress + race.finishAheadDistance;
        ensureTrackToProgress(race.finishProgress + 900);
      }

      if (race.finishProgress !== null) {
        ensureTrackToProgress(race.finishProgress + 900);
        if (!car.crashed && playerProgress >= race.finishProgress) {
          finishRace();
        }
      }

      updateRaceTimer();
      updateRaceNotice(dt);
    }

    function updateRaceTimer() {
      raceTimerEl.classList.add("hidden");
      const playerProgress = gameStarted ? getPlayerRaceProgress() : 0;
      const remainingMeters = getRaceRemainingMeters(playerProgress);
      raceTimeEl.textContent = String(remainingMeters);
    }

    function getRaceRemainingMeters(playerProgress = getPlayerRaceProgress()) {
      const estimatedFinish = race.finishProgress ?? playerProgress + race.finishAheadDistance + Math.max(0, race.duration - race.finishLeadTime - race.elapsed) * 310;
      return Math.max(0, Math.round((estimatedFinish - playerProgress) / 10));
    }

    function updateRaceNotice(dt) {
      race.noticeTimer = 0;
      raceNoticeEl.classList.add("hidden");
    }

    function finishRace() {
      race.finished = true;
      gameStarted = false;
      isPaused = false;
      car.attached = false;
      car.anchor = null;
      clearBrakeInput();
      updateRaceTimer();
      updateRespawnBanner();
      updateRaceNotice(0);
      updatePauseDisplay();

      const entries = getRankingEntries();
      const playerIndex = entries.findIndex((entry) => entry.player);
      const playerPosition = playerIndex + 1;

      resultTitleEl.textContent = `P${playerPosition} ${t("finish")}`;
      const bestExitLabel = selectedLanguage === "zh" ? "最佳出弯" : "Best Exit";
      const topSpeedLabel = selectedLanguage === "zh" ? "最高速度" : "Top Speed";
      const crashCountLabel = selectedLanguage === "zh" ? "撞墙次数" : "Crashes";
      resultBodyEl.innerHTML = `
        <div>${t("finished", { position: formatOrdinalText(playerPosition), time: race.elapsed.toFixed(1) })}</div>
        <div class="result-list stats">
          <div class="result-row player"><span>${bestExitLabel}</span><span>${Math.round(expo.bestExitSpeed)}</span><span>km/h</span></div>
          <div class="result-row"><span>${topSpeedLabel}</span><span>${Math.round(expo.maxSpeed)}</span><span>km/h</span></div>
          <div class="result-row"><span>${crashCountLabel}</span><span>${expo.crashCount}</span><span></span></div>
        </div>
        <div class="result-list">
          ${entries
            .map((entry, index) => {
              const gap = Math.max(0, (entries[0].progress - entry.progress) / 115);
              const gapText = index === 0 ? t("winner") : `+${gap.toFixed(1)}s`;
              const playerClass = entry.player ? " player" : "";
              return `<div class="result-row${playerClass}">
                <span>P${index + 1}</span>
                <span>${entry.name}</span>
                <span>${gapText}</span>
              </div>`;
            })
            .join("")}
        </div>
      `;
      gameOverEl.classList.add("visible");
    }

    function getRankingEntries() {
      return [
        { id: "YOU", name: t("you"), progress: getPlayerRaceProgress(), player: true },
        ...aiOpponents.map((opponent) => ({
          id: opponent.name,
          name: opponent.name,
          progress: opponent.progress,
          player: false
        }))
      ].sort((a, b) => b.progress - a.progress);
    }

    function formatOrdinal(position) {
      if (position === 1) return "1st";
      if (position === 2) return "2nd";
      if (position === 3) return "3rd";
      return `${position}th`;
    }

    function updateDifficulty(dt) {
      car.runTime += dt;
      const friendlyScale = getExpoEaseScale();
      car.difficulty = Math.min(2.35, 1 + car.runTime / 75) * friendlyScale;
      car.maxFreeSpeed = (370 + (car.difficulty - 1) * 190) * getPlayerSpeedScale();
    }

    function applyEngineAssist(dt) {
      const speed = Math.max(1, Math.hypot(car.vx, car.vy));
      const speedScale = getPlayerSpeedScale();
      const targetSpeed = (car.boostTimer > 0 ? 455 : 300) * car.difficulty * speedScale;
      const accel = (car.boostTimer > 0 ? 260 : 58) * speedScale;
      if (speed >= targetSpeed) return;

      car.vx += (car.vx / speed) * accel * dt;
      car.vy += (car.vy / speed) * accel * dt;
    }

    function applyAutopilot(dt) {
      if (car.attached) {
        car.attached = false;
        car.anchor = null;
      }

      const info = nearestTrackCenterInfo(car.x, car.y);
      ensureTrackToProgress(info.progress + 1800);

      const currentSpeed = Math.max(1, Math.hypot(car.vx, car.vy));
      const targetSpeed = Math.min(car.maxFreeSpeed, (car.boostTimer > 0 ? 470 : 322) * car.difficulty * getPlayerSpeedScale());
      const lookAhead = Math.max(210, Math.min(620, currentSpeed * 0.62));
      const target = getTrackPointAtProgress(info.progress + lookAhead);
      const toTargetX = target.x - car.x;
      const toTargetY = target.y - car.y;
      const toTargetLength = Math.max(1, Math.hypot(toTargetX, toTargetY));
      let desiredX = toTargetX / toTargetLength + target.tangent.x * 0.42;
      let desiredY = toTargetY / toTargetLength + target.tangent.y * 0.42;
      const desiredLength = Math.max(1, Math.hypot(desiredX, desiredY));
      desiredX /= desiredLength;
      desiredY /= desiredLength;

      const blend = Math.min(1, dt * 5.4);
      car.vx += (desiredX * targetSpeed - car.vx) * blend;
      car.vy += (desiredY * targetSpeed - car.vy) * blend;

      const centerX = info.closest.x - car.x;
      const centerY = info.closest.y - car.y;
      car.vx += centerX * dt * 5.8;
      car.vy += centerY * dt * 5.8;

      if (info.distance > road.width * 0.32) {
        const snap = Math.min(1, dt * 4.2);
        car.x += centerX * snap;
        car.y += centerY * snap;
      }
    }

    function syncActiveAnchorToCar() {
      if (car.attached) return;
      if (selectedMap === "fixed") {
        syncFixedActiveAnchorToCar();
        return;
      }

      while (activeAnchorIndex < anchors.length - 1) {
        const current = anchors[activeAnchorIndex];
        const next = anchors[activeAnchorIndex + 1];
        const currentDistance = Math.hypot(current.x - car.x, current.y - car.y);
        const nextDistance = Math.hypot(next.x - car.x, next.y - car.y);
        const nextIsCloser = nextDistance < currentDistance - 28;
        const nextIsReady = nextDistance < rope.maxReach * 0.72;
        const currentIsOutdated = currentDistance > rope.maxReach * 0.9 && nextDistance < rope.maxReach * 1.2;

        if (!nextIsReady && !nextIsCloser && !currentIsOutdated) break;
        activeAnchorIndex += 1;
        ensureTrackAhead();
      }
    }

    function advanceActiveAnchor() {
      if (car.attached) return;

      if (selectedMap === "fixed") {
        syncFixedActiveAnchorToCar();
        return;
      }
      if (activeAnchorIndex >= anchors.length - 1) return;

      const current = anchors[activeAnchorIndex];
      const next = anchors[activeAnchorIndex + 1];
      const currentDistance = Math.hypot(current.x - car.x, current.y - car.y);
      const nextDistance = Math.hypot(next.x - car.x, next.y - car.y);

      if (currentDistance > rope.maxReach * 1.1 && nextDistance < rope.maxReach) {
        activeAnchorIndex += 1;
        ensureTrackAhead();
      }
    }

    function syncFixedActiveAnchorToCar() {
      if (!anchors.length) return;

      const metrics = buildTrackMetrics();
      const progress = getTrackProgressAt(car.x, car.y);
      const maxReconnectDelta = Math.max(620, rope.maxReach * 1.15);
      let bestIndex = 0;
      let bestScore = Infinity;

      anchors.forEach((anchor, index) => {
        const forwardDelta = getFixedAnchorForwardDelta(anchor, progress, metrics.total);
        const backwardDelta = getFixedAnchorBackwardDelta(anchor, progress, metrics.total);
        const distance = Math.hypot(anchor.x - car.x, anchor.y - car.y);
        const recentlyPassed = backwardDelta <= maxReconnectDelta && distance <= rope.maxReach;
        let score = forwardDelta;

        if (score < 50) score += metrics.total;
        if (recentlyPassed) score = backwardDelta * 0.45 + distance * 0.16;

        if (score < bestScore) {
          bestScore = score;
          bestIndex = index;
        }
      });

      activeAnchorIndex = bestIndex;
    }

    function applyRopePull(dt) {
      const dx = car.anchor.x - car.x;
      const dy = car.anchor.y - car.y;
      const distance = Math.max(1, Math.hypot(dx, dy));
      const nx = dx / distance;
      const ny = dy / distance;
      const radialVelocity = car.vx * nx + car.vy * ny;
      const pull = rope.pullStrength + distance * rope.distancePull - radialVelocity * rope.radialDamping;
      const ax = nx * pull;
      const ay = ny * pull;

      car.vx += ax * dt;
      car.vy += ay * dt;

      const speed = Math.hypot(car.vx, car.vy);
      if (speed > car.maxFreeSpeed) {
        car.vx = (car.vx / speed) * car.maxFreeSpeed;
        car.vy = (car.vy / speed) * car.maxFreeSpeed;
      }
    }

    function applyStraightCentering(dt) {
      if (selectedMap === "fixed") {
        applyFixedTrackCentering(dt);
        return;
      }

      const info = nearestLongStraightInfo(car.x, car.y);
      if (!info || info.distance > road.width * 0.42 || car.slideTimer > 0) return;

      const toCenterX = info.closest.x - car.x;
      const toCenterY = info.closest.y - car.y;
      const lateralVelocity = car.vx * info.normal.x + car.vy * info.normal.y;
      car.vx += (toCenterX * 3.2 * centeringStrengthScale - info.normal.x * lateralVelocity * 3.6 * centeringStrengthScale) * dt;
      car.vy += (toCenterY * 3.2 * centeringStrengthScale - info.normal.y * lateralVelocity * 3.6 * centeringStrengthScale) * dt;
    }

    function applyFixedTrackCentering(dt) {
      const info = nearestTrackCenterInfo(car.x, car.y);
      const centerRatio = info.distance / (road.width / 2);
      if (car.slideTimer > 0 && centerRatio < 0.7) return;
      if (centerRatio < 0.24) return;

      const toCenterX = info.closest.x - car.x;
      const toCenterY = info.closest.y - car.y;
      const lateralVelocity = car.vx * info.normal.x + car.vy * info.normal.y;
      const assist = (centerRatio > 0.68 ? 3.8 : 2.2) * centeringStrengthScale;
      const damping = (centerRatio > 0.68 ? 3.6 : 2.4) * centeringStrengthScale;

      car.vx += (toCenterX * assist - info.normal.x * lateralVelocity * damping) * dt;
      car.vy += (toCenterY * assist - info.normal.y * lateralVelocity * damping) * dt;

      if (centerRatio > 0.9) {
        const snap = Math.min(0.08, dt * 0.45 * centeringStrengthScale);
        car.x += toCenterX * snap;
        car.y += toCenterY * snap;
      }
    }

    function nearestLongStraightInfo(x, y) {
      let best = null;

      for (const segment of trackSegments) {
        if (segment.type !== "line" || !segment.long) continue;
        const info = projectPointToSegment(x, y, segment.from, segment.to);
        if (info.t < 0.08 || info.t > 0.92) continue;

        if (!best || info.distance < best.distance) {
          best = info;
        }
      }

      return best;
    }

    function applyBoostPads(dt) {
      for (const pad of boostPads) {
        pad.cooldown = Math.max(0, (pad.cooldown || 0) - dt);
        pad.aiFlash = Math.max(0, (pad.aiFlash || 0) - dt);
        pad.used = pad.cooldown > 0 || pad.aiFlash > 0;
        if (pad.cooldown > 0 || Math.abs(pad.y - car.y) > 900 || Math.abs(pad.x - car.x) > 900) continue;

        if (isOnBoostPad(pad, car.x, car.y)) {
          pad.used = true;
          pad.cooldown = 1.15;
          car.boostTimer = 1.05;
          const currentSpeed = Math.max(1, Math.hypot(car.vx, car.vy));
          const boostSpeed = Math.min(car.maxFreeSpeed * 1.12, Math.max(470, currentSpeed * 1.22));
          car.vx = (car.vx / currentSpeed) * boostSpeed;
          car.vy = (car.vy / currentSpeed) * boostSpeed;
        }
      }
    }

    function isOnBoostPad(pad, x, y, lateralScale = 0.3) {
      const dx = x - pad.x;
      const dy = y - pad.y;
      const forwardX = Math.cos(pad.angle);
      const forwardY = Math.sin(pad.angle);
      const sideX = -forwardY;
      const sideY = forwardX;
      const along = dx * forwardX + dy * forwardY;
      const lateral = dx * sideX + dy * sideY;
      return Math.abs(along) < 54 && Math.abs(lateral) < road.width * lateralScale;
    }

    function applyAiBoostPads(opponent, dt) {
      opponent.boostTimer = Math.max(0, (opponent.boostTimer || 0) - dt);

      for (const pad of boostPads) {
        const key = opponent.name;
        pad.aiCooldowns = pad.aiCooldowns || {};
        pad.aiCooldowns[key] = Math.max(0, (pad.aiCooldowns[key] || 0) - dt);
        if (Math.abs(pad.y - opponent.y) > 900 || Math.abs(pad.x - opponent.x) > 900) continue;
        if (pad.aiCooldowns[key] > 0) continue;

        if (isOnBoostPad(pad, opponent.x, opponent.y, 0.34)) {
          pad.aiCooldowns[key] = 1.15;
          pad.aiFlash = 0.35;
          pad.used = true;
          opponent.boostTimer = 1.0;
          opponent.speed = Math.min(opponent.targetSpeed * 1.42, Math.max(455, opponent.speed * 1.2));
          break;
        }
      }
    }

    function updateAiOpponents(dt) {
      const playerProgress = getTrackProgressAt(car.x, car.y);

      for (const opponent of aiOpponents) {
        while (selectedMap !== "fixed" && opponent.progress > buildTrackMetrics().total - 1200) {
          generateNextTrackSection();
        }

        const difficultyBonus = (car.difficulty - 1) * 170;
        const rubberBand = opponent.progress < playerProgress - 520 ? 120 : opponent.progress > playerProgress + 640 ? -18 : 0;
        const cornerBoost = Math.abs(Math.sin(opponent.progress * 0.004)) * 18;
        const expoAiScale = 0.86 + (getExpoEaseScale() - 0.82) * 0.78;
        const boostBonus = opponent.boostTimer > 0 ? 128 : 0;
        const targetSpeed = ((opponent.targetSpeed + difficultyBonus + rubberBand + cornerBoost + boostBonus) * aiStrength + Math.sin(car.runTime * 0.8 + opponent.lanePhase) * 14) * expoAiScale;
        opponent.speed += (targetSpeed - opponent.speed) * Math.min(1, dt * 2.5);
        opponent.progress += opponent.speed * dt;
        opponent.collisionOffsetTarget *= Math.max(0, 1 - dt * vehicleCollision.aiAvoidanceDecay);
        opponent.collisionOffset += (opponent.collisionOffsetTarget - opponent.collisionOffset) * Math.min(1, dt * vehicleCollision.aiAvoidanceFollow);

        const trackPoint = getTrackPointAtProgress(opponent.progress);
        const laneWander = Math.sin(opponent.progress * 0.008 + opponent.lanePhase) * 8;
        const offset = opponent.baseLaneOffset + laneWander + opponent.collisionOffset;
        opponent.x = trackPoint.x + trackPoint.normal.x * offset;
        opponent.y = trackPoint.y + trackPoint.normal.y * offset;
        opponent.angle = Math.atan2(trackPoint.tangent.y, trackPoint.tangent.x);
        applyAiBoostPads(opponent, dt);
      }
    }

    function resolveVehicleCollisions(dt) {
      const vehicles = [
        {
          type: "player",
          body: car,
          x: car.x,
          y: car.y,
          angle: car.angle,
          mass: 1.15,
          movable: !car.crashed,
        },
        ...aiOpponents.map((opponent) => ({
          type: "ai",
          body: opponent,
          x: opponent.x,
          y: opponent.y,
          angle: opponent.angle,
          mass: 1,
          movable: true,
        }))
      ];

      for (let pass = 0; pass < vehicleCollision.iterations; pass += 1) {
        for (let i = 0; i < vehicles.length; i += 1) {
          for (let j = i + 1; j < vehicles.length; j += 1) {
            separateVehiclePair(vehicles[i], vehicles[j]);
          }
        }
      }

      vehicles.forEach((vehicle) => {
        if (vehicle.type === "player") {
          vehicle.body.x = vehicle.x;
          vehicle.body.y = vehicle.y;
        }
      });
    }

    function separateVehiclePair(a, b) {
      const pointsA = getVehicleCollisionPoints(a);
      const pointsB = getVehicleCollisionPoints(b);
      const minDistance = vehicleCollision.radius * 2;

      for (const pointA of pointsA) {
        for (const pointB of pointsB) {
          const dx = pointB.x - pointA.x;
          const dy = pointB.y - pointA.y;
          const distance = Math.hypot(dx, dy) || 0.0001;
          if (distance >= minDistance) continue;

          const overlap = minDistance - distance;
          const nx = dx / distance;
          const ny = dy / distance;
          const totalMass = a.mass + b.mass;
          const softenedOverlap = Math.min(overlap * vehicleCollision.correction, vehicleCollision.maxPush);
          const pushA = a.movable ? (b.mass / totalMass) * softenedOverlap : 0;
          const pushB = b.movable ? (a.mass / totalMass) * softenedOverlap : 0;

          if (a.movable) {
            a.x -= nx * pushA;
            a.y -= ny * pushA;
            applyVehicleCollisionSpacing(a, -nx, -ny);
          }
          if (b.movable) {
            b.x += nx * pushB;
            b.y += ny * pushB;
            applyVehicleCollisionSpacing(b, nx, ny);
          }
        }
      }
    }

    function getVehicleCollisionPoints(vehicle) {
      const forwardX = Math.cos(vehicle.angle);
      const forwardY = Math.sin(vehicle.angle);
      return vehicleCollision.offsets.map((offset) => ({
        x: vehicle.x + forwardX * offset,
        y: vehicle.y + forwardY * offset
      }));
    }

    function applyVehicleCollisionSpacing(vehicle, nx, ny) {
      if (vehicle.type !== "ai") return;

      const info = nearestTrackCenterInfo(vehicle.x, vehicle.y);
      const sidePush = nx * info.normal.x + ny * info.normal.y;
      const target = vehicle.body.collisionOffsetTarget || 0;
      vehicle.body.collisionOffsetTarget = clamp(
        target + sidePush * vehicleCollision.aiAvoidancePush,
        -vehicleCollision.aiAvoidanceClamp,
        vehicleCollision.aiAvoidanceClamp
      );
    }

      entries.forEach((entry, index) => {

        const delta = previous ? previous - position : 0;

        .map((entry, index) => {

          const delta = effect && effect.until > now ? effect.delta : 0;
          const movementClass = delta > 0 ? "rank-up" : delta < 0 ? "rank-down" : "rank-steady";
          const playerClass = entry.player ? " player" : "";
          const changeText = delta > 0 ? `UP +${delta}` : delta < 0 ? `DN ${delta}` : "-";
          const gapSeconds = Math.max(0, (leaderProgress - entry.progress) / 115);

    function syncBrakeInput() {

    function clearBrakeInput() {
      input.keyboard = false;
      input.pointer = false;
      input.gamepad = false;
      input.gamepadAxisY = 0;

    function getBrakeGamepad() {
      if (typeof navigator.getGamepads !== "function") return null;
      const pads = Array.from(navigator.getGamepads()).filter(Boolean);
      return pads.find((pad) => isTargetControllerName(pad.id)) || pads.find((pad) => pad.axes && pad.axes.length > 1) || null;
    }

    function signedByte(value) {
      return value > 127 ? value - 256 : value;
    }

    function setControllerAxes(axes, deviceName, source) {
      input.gamepadAxes = axes;
      input.gamepadAxisY = Number.isFinite(axes[1]) ? axes[1] : 0;
      brakeController.connected = true;
      brakeController.deviceName = deviceName || brakeController.targetName;
      brakeController.source = source || "";
      updateControllerStatusDisplay();
    }

    function handleHidInputReport(event) {
      const data = event.data;
      if (!data || data.byteLength < 4) return;
      const x = signedByte(data.getUint8(2)) / 127;
      const y = signedByte(data.getUint8(3)) / 127;
      setControllerAxes([x, y], event.device.productName, "HID");
    }

    async function attachHidController(device) {
      if (!device) return false;
      brakeController.hidDevice = device;
      brakeController.deviceName = device.productName || brakeController.targetName;
      brakeController.source = "HID";
      brakeController.connected = true;
      if (!hidReportDevices.has(device)) {
        device.addEventListener("inputreport", handleHidInputReport);
        hidReportDevices.add(device);
      }
      try {
        if (!device.opened) await device.open();
      } catch (error) {
        // Status detection can still use the remembered HID permission even if opening is blocked.
      }
      updateControllerStatusDisplay();
      return true;
    }

    async function detectBrakeController(options = {}) {
      const request = Boolean(options.request);
      brakeController.checking = true;
      updateControllerStatusDisplay();

      let found = false;
      const gamepad = getBrakeGamepad();
      if (gamepad) {
        const axes = Array.from(gamepad.axes || []).map((axis) => Number.isFinite(axis) ? axis : 0);
        setControllerAxes(axes, gamepad.id, "GAMEPAD");
        found = true;
      }

      if (!found && navigator.hid && typeof navigator.hid.getDevices === "function") {
        try {
          const devices = await navigator.hid.getDevices();
          const device = devices.find((item) => isTargetControllerName(item.productName));
          found = await attachHidController(device);
        } catch (error) {
          // Browser HID permissions are best-effort here; Gamepad API remains the primary path.
        }
      }

      if (!found && request && navigator.hid && typeof navigator.hid.requestDevice === "function") {
        try {
          const devices = await navigator.hid.requestDevice({ filters: [] });
          const device = devices.find((item) => isTargetControllerName(item.productName));
          found = await attachHidController(device);
        } catch (error) {
          // User cancelled the picker or the browser blocked the request.
        }
      }

      brakeController.connected = Boolean(found);
      if (!found) {
        input.gamepadAxes = [];
        input.gamepadAxisY = 0;
        brakeController.deviceName = brakeController.targetName;
        brakeController.source = "";
        brakeController.hidDevice = null;
        brakeController.hidReportAttached = false;
      }
      brakeController.checking = false;
      updateControllerStatusDisplay();
    }

    function updateGamepadBrakeInput() {
      const pad = getBrakeGamepad();
      const axes = pad && pad.axes
        ? Array.from(pad.axes).map((axis) => Number.isFinite(axis) ? axis : 0)
        : [];
      if (pad && axes.length) {
        setControllerAxes(axes, pad.id, "GAMEPAD");
      } else if (!brakeController.hidDevice) {
        input.gamepadAxes = [];
        input.gamepadAxisY = 0;
        brakeController.connected = false;
        brakeController.deviceName = brakeController.targetName;
        brakeController.source = "";
      }
      const axisY = input.gamepadAxisY;
      if (!gameStarted || isPaused || race.finished || autopilot.enabled || gameOverEl.classList.contains("visible")) {
        setBrakeInputSource("gamepad", false);
        updateControllerStatusDisplay();
        return;
      }

      const pressThreshold = 0.45;
      const releaseThreshold = 0.25;
      const active = input.gamepad ? axisY > releaseThreshold : axisY > pressThreshold;
      setBrakeInputSource("gamepad", active);
      updateControllerStatusDisplay();
    }

    function getRpmArc(speed) {
      const sweep = clamp(speed / 220, 0, 1) * 240;
      const parts = [];
      const greenEnd = Math.min(sweep, 90);
      if (greenEnd > 0) parts.push(`#35ff88 0deg ${greenEnd.toFixed(1)}deg`);
      if (sweep > 90) {
        const yellowEnd = Math.min(sweep, 178);
        parts.push(`#ffe03f 90deg ${yellowEnd.toFixed(1)}deg`);
      }
      if (sweep > 178) {
        const redEnd = Math.min(sweep, 240);
        parts.push(`#ff2f2f 178deg ${redEnd.toFixed(1)}deg`);
      }
      parts.push(`rgba(248, 251, 255, 0.08) ${sweep.toFixed(1)}deg 240deg`);
      parts.push(`rgba(0, 0, 0, 0) 240deg 360deg`);
      return `conic-gradient(from -135deg, ${parts.join(", ")})`;
    }
