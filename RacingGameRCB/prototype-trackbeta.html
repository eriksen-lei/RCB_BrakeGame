      selectDifficulty(selectedDifficulty);
      reset();
      gameStarted = true;
      startScreenEl.classList.add("hidden");
      clearBrakeInput();
      lastTime = performance.now();
      updateAutopilotDisplay();
      updatePauseDisplay();
    }

    function startRespawnPenalty() {
      const target = expo.tutorialActive ? getTutorialRespawnTarget() : nearestTrackCenterInfo(car.x, car.y);
      expo.crashCount += 1;
      expo.combo = 0;
      showExpoFeedback(expo.tutorialActive
        ? (selectedLanguage === "zh" ? "再试一次" : "Try again")
        : (selectedLanguage === "zh" ? "继续挑战" : "Keep going"), 1.3);
      car.crashed = true;
      car.respawnTimer = expo.tutorialActive ? 0.25 : 0.5;
      car.respawnTarget = target;
      car.attached = false;
      car.anchor = null;
      car.vx = 0;
      car.vy = 0;
      car.speed = 0;
      car.boostTimer = 0;
      car.slideTimer = 0;
      clearBrakeInput();
      gameOverEl.classList.remove("visible");
      resultTitleEl.textContent = t("crashed");
      resultBodyEl.textContent = t("crashBody");
      updateRespawnBanner();
    }

    function getTutorialRespawnTarget() {
      const progress = Math.max(0, getTrackProgressAt(car.x, car.y) - 240);
      const point = getTrackPointAtProgress(progress);
      return {
        closest: { x: point.x, y: point.y },
        distance: 0,
        tangent: point.tangent,
        normal: point.normal,
        progress
      };
    }

    function finishRespawn() {
      const target = car.respawnTarget || nearestTrackCenterInfo(car.x, car.y);
      const speed = getPlayerBaseSpeed() * 0.92;
      car.x = target.closest.x;
      car.y = target.closest.y;
      car.vx = target.tangent.x * speed;
      car.vy = target.tangent.y * speed;
      car.angle = Math.atan2(car.vy, car.vx);
      car.visualAngle = car.angle;
      car.speed = speed;
      car.attached = false;
      car.anchor = null;
      car.detachedFlash = 0;
      car.boostTimer = 0;
      car.slideTimer = 0.18;
      car.crashed = false;
      car.respawnTimer = 0;
      car.respawnTarget = null;
      clearBrakeInput();
      if (selectedMap === "fixed") {
        practiceLap.lastProgress = getTrackProgressAt(car.x, car.y);
        practiceLap.totalProgress = practiceLap.completed * buildTrackMetrics().total + practiceLap.lastProgress;
      }
      syncActiveAnchorToCar();
      updateRespawnBanner();
    }

    function updateRespawnBanner() {
      if (!car.crashed || car.respawnTimer <= 0) {
        respawnBannerEl.classList.add("hidden");
        return;
      }

      respawnBannerEl.classList.remove("hidden");
      respawnTimeEl.textContent = car.respawnTimer.toFixed(1);
    }

    function restartRace() {
      gameOverEl.classList.remove("visible");
      startGame(currentMode);
    }

    function returnHome() {
      gameStarted = false;
      isPaused = false;
      clearBrakeInput();
      gameOverEl.classList.remove("visible");
      updateRespawnBanner();
      updateRaceTimer();
      updateAutopilotDisplay();
      updatePauseDisplay();
      reset();
      showMainMenu();
    }

    function draw() {
      resize();
      const width = window.innerWidth;
      const height = window.innerHeight;

      ctx.clearRect(0, 0, width, height);
      drawGrass(width, height);
      drawTrack();
      drawTracksideLogos();
      drawStartFinishLine();
      drawStartGrid();
      drawFinishLine();
      drawBoostPads();
      drawSkidMarks();
      drawAnchors();
      drawRope();
      drawAiOpponents();
      drawCar();
      drawTurnHint();
      drawExpoFeedbackOverlay();
      drawTrackPreview();
      drawFullMap();
    }

    function drawGrass(width, height) {
      ctx.fillStyle = "#58b866";
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.strokeStyle = "#84d37f";
      ctx.lineWidth = 2;
      for (let i = 0; i < 42; i += 1) {
        const p = screenToWorld((i * 97) % width, (i * 61) % height);
        const s = worldToScreen(p.x + Math.sin(i) * 20, p.y + (camera.y * 0.18) % 120);
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x + 80, s.y + 24);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawTracksideLogos() {
      if (!trackSegments.length) return;

      const metrics = buildTrackMetrics();
      if (!metrics.total) return;

      const spacing = selectedMap === "fixed" ? tracksideLogoConfig.spacing.fixed : tracksideLogoConfig.spacing.infinite;
      const playerProgress = gameStarted ? getTrackProgressAt(car.x, car.y) : 0;
      const start = selectedMap === "fixed" ? 520 : Math.max(0, Math.floor((playerProgress - 1300) / spacing) * spacing);
      const end = selectedMap === "fixed" ? metrics.total : playerProgress + 3600;

      for (let progress = start; progress <= end; progress += spacing) {
        if (selectedMap !== "fixed") ensureTrackToProgress(progress + 600);
        const index = Math.round(progress / spacing);
        drawTracksideLogoAtProgress(progress, index);
      }
    }

    function drawTracksideLogoAtProgress(progress, index) {
      const pose = getSafeTracksideLogoPose(progress, index);
      if (!pose) return;

      const screen = worldToScreen(pose.x, pose.y);
      const margin = 180;
      if (screen.x < -margin || screen.x > window.innerWidth + margin || screen.y < -margin || screen.y > window.innerHeight + margin) return;

      ctx.save();
      ctx.translate(screen.x, screen.y);
      ctx.rotate(pose.angle);
      ctx.scale(view.zoom, view.zoom);

      const boardW = tracksideLogoConfig.width;
      const boardH = tracksideLogoConfig.height;
      ctx.globalAlpha = 0.96;
      ctx.fillStyle = "rgba(0, 0, 0, 0.24)";
      roundRect(-boardW / 2 + 8, -boardH / 2 + 8, boardW, boardH, 8);
      ctx.fill();

      ctx.fillStyle = "#f8fbff";
      ctx.strokeStyle = "#20272b";
      ctx.lineWidth = 5;
      roundRect(-boardW / 2, -boardH / 2, boardW, boardH, 8);
      ctx.fill();
      ctx.stroke();

      ctx.strokeStyle = "#e33a32";
      ctx.lineWidth = 4;
      roundRect(-boardW / 2 + 8, -boardH / 2 + 8, boardW - 16, boardH - 16, 5);
      ctx.stroke();

      if (rcbLogoImage.complete && rcbLogoImage.naturalWidth) {
        const maxW = boardW - 28;
        const maxH = boardH - 24;
        const imageRatio = rcbLogoImage.naturalWidth / rcbLogoImage.naturalHeight;
        let drawW = maxW;
        let drawH = drawW / imageRatio;
        if (drawH > maxH) {
          drawH = maxH;
          drawW = drawH * imageRatio;
        }
        ctx.drawImage(rcbLogoImage, -drawW / 2, -drawH / 2, drawW, drawH);
      } else {
        ctx.fillStyle = "#e60012";
        ctx.font = "900 34px Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("RCB", 0, 2);
      }

      ctx.restore();
    }

    function getSafeTracksideLogoPose(progress, index) {
      const cacheKey = `${selectedMap}:${trackSegments.length}:${Math.round(progress)}:${index}:${road.width}`;
      if (tracksideLogoPoseCache.has(cacheKey)) return tracksideLogoPoseCache.get(cacheKey);

      const point = getTrackPointAtProgress(progress);
      const preferredSide = index % 2 === 0 ? 1 : -1;
      const sideOptions = [preferredSide, -preferredSide];
      const baseOffset = road.width / 2 + tracksideLogoConfig.baseGap + (index % 2) * 18;
      const metrics = buildTrackMetrics();

      for (const side of sideOptions) {
        for (let attempt = 0; attempt < tracksideLogoConfig.maxOffsetAttempts; attempt += 1) {
          const offset = baseOffset + attempt * tracksideLogoConfig.offsetStep;
          const pose = {
            x: point.x + point.normal.x * side * offset,
            y: point.y + point.normal.y * side * offset,
            angle: Math.atan2(point.tangent.y, point.tangent.x),
            tangent: point.tangent,
            normal: point.normal
          };

          if (isTracksideLogoPoseSafe(pose, metrics)) {
            tracksideLogoPoseCache.set(cacheKey, pose);
            return pose;
          }
        }
      }

      tracksideLogoPoseCache.set(cacheKey, null);
      return null;
    }

    function isTracksideLogoPoseSafe(pose, metrics) {
      const halfW = tracksideLogoConfig.width / 2;
      const halfH = tracksideLogoConfig.height / 2;
      const minDistance = road.width / 2 + tracksideLogoConfig.clearance;
      const samples = [];
      for (const y of [-halfH, 0, halfH]) {
        for (const x of [-halfW, -halfW * 0.5, 0, halfW * 0.5, halfW]) {
          samples.push({ x, y });
        }
      }

      for (const sample of samples) {
        const worldX = pose.x + pose.tangent.x * sample.x + pose.normal.x * sample.y;
        const worldY = pose.y + pose.tangent.y * sample.x + pose.normal.y * sample.y;
        if (distanceToTrackCenterInMetrics(worldX, worldY, metrics) < minDistance) return false;
      }

      return true;
    }

    function drawTrack() {
      const points = buildTrackPoints();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      ctx.strokeStyle = "#263036";
      ctx.lineWidth = scaled(road.width);
      drawPolyline(points);

      ctx.strokeStyle = "#3a444a";
      ctx.lineWidth = scaled(road.width - 24);
      drawPolyline(points);

      drawCurbs();

      ctx.strokeStyle = "rgba(255,255,255,0.82)";
      ctx.lineWidth = scaled(4);
      drawOffsetPolyline(points, scaled(-road.width / 2 + 10));
      drawOffsetPolyline(points, scaled(road.width / 2 - 10));

    }
    function drawTrackPreview() {
      const visible = gameStarted && !gameOverEl.classList.contains("visible");
      trackPreviewEl.classList.toggle("hidden", !visible);
      if (!visible) return;

      const cssSize = 176;
      const dpr = window.devicePixelRatio || 1;
      const pixelSize = Math.floor(cssSize * dpr);
      const needsResize = trackPreviewEl.width !== pixelSize || trackPreviewEl.height !== pixelSize;
      const now = performance.now();
      if (!needsResize && now - lastTrackPreviewDrawAt < 80) return;
      lastTrackPreviewDrawAt = now;

      if (needsResize) {
        trackPreviewEl.width = pixelSize;
        trackPreviewEl.height = pixelSize;
      }

      previewCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      previewCtx.clearRect(0, 0, cssSize, cssSize);
      previewCtx.save();
      previewCtx.beginPath();
      previewCtx.arc(cssSize / 2, cssSize / 2, cssSize / 2 - 5, 0, Math.PI * 2);
      previewCtx.clip();

      previewCtx.fillStyle = "rgba(28, 37, 42, 0.92)";
      previewCtx.fillRect(0, 0, cssSize, cssSize);

      const points = selectedMap === "fixed" ? buildWorldTrackPoints() : buildVisibleWorldTrackPoints();
      if (points.length > 1) {
        const bounds = getPointBounds(points);
        const padding = selectedMap === "fixed" ? 18 : 8;
        const mapScale = selectedMap === "fixed"
          ? Math.min(
            (cssSize - padding * 2) / Math.max(1, bounds.maxX - bounds.minX),
            (cssSize - padding * 2) / Math.max(1, bounds.maxY - bounds.minY)
          )
          : null;
        const offsetX = selectedMap === "fixed"
          ? (cssSize - (bounds.maxX - bounds.minX) * mapScale) / 2
          : 0;
        const offsetY = selectedMap === "fixed"
          ? (cssSize - (bounds.maxY - bounds.minY) * mapScale) / 2
          : 0;
        const mapPoint = (worldPoint) => {
          if (selectedMap === "fixed") {
            return {
              x: offsetX + (worldPoint.x - bounds.minX) * mapScale,
              y: offsetY + (worldPoint.y - bounds.minY) * mapScale
            };
          }
          const screen = worldToScreen(worldPoint.x, worldPoint.y);
          return {
            x: (screen.x / window.innerWidth) * cssSize,
            y: (screen.y / window.innerHeight) * cssSize
          };
        };

        previewCtx.lineCap = "round";
        previewCtx.lineJoin = "round";
        previewCtx.strokeStyle = "rgba(238, 243, 244, 0.95)";
        previewCtx.lineWidth = selectedMap === "fixed" ? 8 : 14;
        previewCtx.beginPath();
        points.forEach((point, index) => {
          const mapped = mapPoint(point);
          if (index === 0) previewCtx.moveTo(mapped.x, mapped.y);
          else previewCtx.lineTo(mapped.x, mapped.y);
        });
        previewCtx.stroke();

        previewCtx.strokeStyle = "rgba(58, 68, 74, 0.95)";
        previewCtx.lineWidth = selectedMap === "fixed" ? 5 : 9;
        previewCtx.stroke();

        drawPreviewDot(mapPoint({ x: car.x, y: car.y }), "#f2c12f", selectedMap === "fixed" ? 5 : 5.8);
        aiOpponents.forEach((opponent) => {
          drawPreviewDot(mapPoint({ x: opponent.x, y: opponent.y }), opponent.color, selectedMap === "fixed" ? 3.8 : 4.7);
        });
      }

      previewCtx.restore();
    }

    function drawPreviewDot(point, color, radius) {
      const size = 176;
      if (point.x < -12 || point.x > size + 12 || point.y < -12 || point.y > size + 12) return;

      previewCtx.save();
      previewCtx.fillStyle = color;
      previewCtx.strokeStyle = "#11181b";
      previewCtx.lineWidth = 2;
      previewCtx.beginPath();
      previewCtx.arc(point.x, point.y, radius, 0, Math.PI * 2);
      previewCtx.fill();
      previewCtx.stroke();
      previewCtx.restore();
    }

    function drawFullMap() {
      fullMapEl.classList.add("hidden");
    }

    function getPointBounds(points) {
      return points.reduce((bounds, point) => ({
        minX: Math.min(bounds.minX, point.x),
        minY: Math.min(bounds.minY, point.y),
        maxX: Math.max(bounds.maxX, point.x),
        maxY: Math.max(bounds.maxY, point.y)
      }), {
        minX: Infinity,
        minY: Infinity,
        maxX: -Infinity,
        maxY: -Infinity
      });
    }

    function drawStartGrid() {
      for (let i = 0; i < 5; i += 1) {
        const slot = getStartGridSlot(i);
        const p = worldToScreen(slot.x, slot.y);
        if (p.x < -120 || p.x > window.innerWidth + 120 || p.y < -120 || p.y > window.innerHeight + 120) continue;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(slot.angle + Math.PI / 2);
        ctx.fillStyle = i === 0 ? "rgba(255, 216, 77, 0.16)" : "rgba(255, 255, 255, 0.12)";
        ctx.strokeStyle = i === 0 ? "rgba(255, 216, 77, 0.82)" : "rgba(255, 255, 255, 0.58)";
        ctx.lineWidth = scaled(3);
        roundRect(scaled(-24), scaled(-34), scaled(48), scaled(68), scaled(6));
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawStartFinishLine() {
      if (selectedMap !== "fixed") return;
      drawCheckeredLineAtProgress(getFixedStartFinishProgress(), "#ffd84d");
    }

    function drawFinishLine() {
      if (currentMode !== "race" || race.finishProgress === null) return;
      if (selectedMap === "fixed") return;
      drawCheckeredLineAtProgress(race.finishProgress, "#ffd84d");
    }

    function drawCheckeredLineAtProgress(progress, accentColor) {
      const point = getTrackPointAtProgress(progress);
      const p = worldToScreen(point.x, point.y);
      if (p.x < -220 || p.x > window.innerWidth + 220 || p.y < -220 || p.y > window.innerHeight + 220) return;

      const angle = Math.atan2(point.tangent.y, point.tangent.x);
      const depth = 70;
      const width = road.width - 36;
      const rows = 3;
      const cols = 8;
      const cellW = depth / rows;
      const cellH = width / cols;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      ctx.scale(view.zoom, view.zoom);

      ctx.fillStyle = "rgba(15, 20, 24, 0.22)";
      ctx.fillRect(-depth / 2 - 6, -width / 2 - 6, depth + 12, width + 12);

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          ctx.fillStyle = (row + col) % 2 === 0 ? "#f4f4f0" : "#171b1e";
          ctx.fillRect(-depth / 2 + row * cellW, -width / 2 + col * cellH, cellW + 0.5, cellH + 0.5);
        }
      }

      ctx.strokeStyle = accentColor;
      ctx.lineWidth = 4;
      ctx.strokeRect(-depth / 2, -width / 2, depth, width);
      ctx.restore();
    }

    function buildTrackPoints() {
      return buildVisibleWorldTrackPoints().map((p) => worldToScreen(p.x, p.y));
    }

    function buildVisibleWorldTrackPoints() {
      const points = buildWorldTrackPoints();
      const margin = 260;
      let first = -1;
      let last = -1;

      for (let i = 0; i < points.length; i += 1) {
        const p = points[i];
        const s = worldToScreen(p.x, p.y);
        const onScreen =
          s.x >= -margin &&
          s.x <= window.innerWidth + margin &&
          s.y >= -margin &&
          s.y <= window.innerHeight + margin;

        if (onScreen) {
          if (first === -1) first = i;
          last = i;
        }
      }

      if (first === -1) return points;
      return points.slice(Math.max(0, first - 1), Math.min(points.length, last + 2));
    }

    function buildWorldTrackPoints() {
      if (cachedWorldTrackPoints) return cachedWorldTrackPoints;

      const points = [];

      for (const segment of trackSegments) {
        if (segment.type === "line") {
          addLinePoints(points, segment.from, segment.to, 28);
        } else {
          const arcSteps = segment.turnAbs > Math.PI / 2 ? 72 : 36;
          addArcPoints(points, segment.center, segment.radius, segment.start, segment.end, segment.dir, arcSteps);
        }
      }

      cachedWorldTrackPoints = points;
      return points;
    }

    function buildTrackMetrics() {
      if (cachedTrackMetrics) return cachedTrackMetrics;

      const points = buildWorldTrackPoints();
      const cumulative = [0];
      for (let i = 0; i < points.length - 1; i += 1) {
        cumulative.push(cumulative[i] + Math.hypot(points[i + 1].x - points[i].x, points[i + 1].y - points[i].y));
      }

      cachedTrackMetrics = {
        points,
        cumulative,
        total: cumulative[cumulative.length - 1] || 0
      };
      return cachedTrackMetrics;
    }

    function getTrackPointAtProgress(progress) {
      let metrics = buildTrackMetrics();
      while (selectedMap !== "fixed" && progress > metrics.total - 1200) {
        generateNextTrackSection();
        metrics = buildTrackMetrics();
      }

      const points = metrics.points;
      const cumulative = metrics.cumulative;
      const target = selectedMap === "fixed"
        ? ((progress % metrics.total) + metrics.total) % metrics.total
        : Math.max(0, Math.min(progress, metrics.total));
      let low = 0;
      let high = cumulative.length - 1;

      while (low < high) {
        const mid = Math.floor((low + high) / 2);
        if (cumulative[mid] < target) low = mid + 1;
        else high = mid;
      }

      const index = Math.max(0, low - 1);
      const a = points[index];
      const b = points[Math.min(points.length - 1, index + 1)];
      const segmentLength = Math.max(1, cumulative[index + 1] - cumulative[index]);
      const t = Math.max(0, Math.min(1, (target - cumulative[index]) / segmentLength));
      const x = a.x + (b.x - a.x) * t;
      const y = a.y + (b.y - a.y) * t;
      const angle = Math.atan2(b.y - a.y, b.x - a.x);

      return {
        x,
        y,
        tangent: { x: Math.cos(angle), y: Math.sin(angle) },
        normal: { x: Math.cos(angle + Math.PI / 2), y: Math.sin(angle + Math.PI / 2) }
      };
    }

    function addLinePoints(points, from, to, steps) {
      for (let i = points.length ? 1 : 0; i <= steps; i += 1) {
        const t = i / steps;
        points.push({
          x: from.x + (to.x - from.x) * t,
          y: from.y + (to.y - from.y) * t
        });
      }
    }

    function addArcPoints(points, center, radius, start, end, dir, steps) {
      let total = end - start;
      if (dir > 0 && total < 0) total += Math.PI * 2;
      if (dir < 0 && total > 0) total -= Math.PI * 2;

      for (let i = points.length ? 1 : 0; i <= steps; i += 1) {
        const t = i / steps;
        const angle = start + total * t;
        points.push({
          x: center.x + Math.cos(angle) * radius,
          y: center.y + Math.sin(angle) * radius
        });
      }
    }

    function isOutsideRoad() {
      const nearest = distanceToTrackCenter(car.x, car.y);
      const carRadius = 18;
      return nearest > road.width / 2 - carRadius;
    }

    function distanceToTrackCenter(x, y) {
      return nearestTrackCenterInfo(x, y).distance;
    }

    function distanceToTrackCenterInMetrics(x, y, metrics) {
      const points = metrics.points;
      let bestDistance = Infinity;

      for (let i = 0; i < points.length - 1; i += 1) {
        const distance = distanceToSegment(x, y, points[i], points[i + 1]);
        if (distance < bestDistance) bestDistance = distance;
        if (bestDistance <= road.width / 2) break;
      }

      return bestDistance;
    }

    function nearestTrackCenterInfo(x, y) {
      const points = buildWorldTrackPoints();
      let bestInfo = null;
      let bestProgress = 0;
      let progress = 0;

      for (let i = 0; i < points.length - 1; i += 1) {
        const a = points[i];
        const b = points[i + 1];
        const segmentLength = Math.hypot(b.x - a.x, b.y - a.y);
        const info = projectPointToSegment(x, y, a, b);

        if (!bestInfo || info.distance < bestInfo.distance) {
          bestInfo = info;
          bestProgress = progress + info.t * segmentLength;
        }

        progress += segmentLength;
      }

      if (bestInfo) {
        return {
          ...bestInfo,
          progress: bestProgress
        };
      }

      return {
        t: 0,
        closest: { x: car.x, y: car.y },
        distance: 0,
        tangent: { x: Math.cos(car.angle), y: Math.sin(car.angle) },
        normal: { x: -Math.sin(car.angle), y: Math.cos(car.angle) },
        progress: 0
      };
    }

    function getTrackProgressAt(x, y) {
      return getTrackProgressAtPoint(x, y);
    }

    function getTrackProgressAtPoint(x, y) {
      const metrics = buildTrackMetrics();
      const points = metrics.points;
      let bestDistance = Infinity;
      let bestProgress = 0;

      for (let i = 0; i < points.length - 1; i += 1) {
        const info = projectPointToSegment(x, y, points[i], points[i + 1]);
        if (info.distance < bestDistance) {
          bestDistance = info.distance;
          bestProgress = metrics.cumulative[i] + info.t * Math.hypot(points[i + 1].x - points[i].x, points[i + 1].y - points[i].y);
        }
      }

      return bestProgress;
    }

    function distanceToSegment(x, y, a, b) {
      return projectPointToSegment(x, y, a, b).distance;
    }

    function projectPointToSegment(x, y, a, b) {
      const abx = b.x - a.x;
      const aby = b.y - a.y;
      const apx = x - a.x;
      const apy = y - a.y;
      const lengthSq = abx * abx + aby * aby || 1;
      const t = Math.max(0, Math.min(1, (apx * abx + apy * aby) / lengthSq));
      const px = a.x + abx * t;
      const py = a.y + aby * t;
      const length = Math.sqrt(lengthSq);
      return {
        t,
        closest: { x: px, y: py },
        distance: Math.hypot(x - px, y - py),
        tangent: { x: abx / length, y: aby / length },
        normal: { x: -aby / length, y: abx / length }
      };
    }

    function drawPolyline(points) {
      ctx.beginPath();
      points.forEach((point, index) => {
        if (index === 0) ctx.moveTo(point.x, point.y);
        else ctx.lineTo(point.x, point.y);
      });
      ctx.stroke();
    }

    function drawOffsetPolyline(points, offset) {
      ctx.beginPath();
      points.forEach((point, index) => {
        const prev = points[Math.max(0, index - 1)];
        const next = points[Math.min(points.length - 1, index + 1)];
        const angle = Math.atan2(next.y - prev.y, next.x - prev.x) + Math.PI / 2;
        const x = point.x + Math.cos(angle) * offset;
        const y = point.y + Math.sin(angle) * offset;
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
    }

    function drawCurbs() {
      const curbWidth = 18;
      const geometry = getCurbGeometry();

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = scaled(curbWidth);

      ctx.strokeStyle = "#f5f0e8";
      drawWorldPolyline(geometry.left, geometry.closed);
      drawWorldPolyline(geometry.right, geometry.closed);

      ctx.lineCap = "square";
      drawCurbStripeSegments(geometry.leftStripes);
      drawCurbStripeSegments(geometry.rightStripes);

      ctx.restore();
    }

    function getCurbGeometry() {
      if (cachedCurbGeometry) return cachedCurbGeometry;

      const worldPoints = buildWorldTrackPoints();
      const edgeOffset = road.width / 2 - 14;
      const closed = selectedMap === "fixed";
      const left = buildOffsetTrackPoints(worldPoints, edgeOffset, closed);
      const right = buildOffsetTrackPoints(worldPoints, -edgeOffset, closed);

      cachedCurbGeometry = {
        closed,
        left,
        right,
        leftStripes: buildCurbStripeSegments(left, closed),
        rightStripes: buildCurbStripeSegments(right, closed)
      };
      return cachedCurbGeometry;
    }

    function drawWorldPolyline(points, closed = false) {
      const maxSegmentLength = closed ? road.width * 0.95 : Infinity;
      ctx.beginPath();
      let drawing = false;
      points.forEach((point, index) => {
        const screen = worldToScreen(point.x, point.y);
        const previous = points[index - 1];
        const tooLong =
          previous &&
          Math.hypot(point.x - previous.x, point.y - previous.y) > maxSegmentLength;

        if (index === 0 || tooLong || !drawing) {
          ctx.moveTo(screen.x, screen.y);
          drawing = true;
        } else {
          ctx.lineTo(screen.x, screen.y);
        }
      });
      ctx.stroke();
    }

    function buildOffsetTrackPoints(points, offset, closed = false) {
      const count = points.length;
      return points.map((point, index) => {
        const prev = closed ? points[(index - 1 + count) % count] : points[Math.max(0, index - 1)];
        const next = closed ? points[(index + 1) % count] : points[Math.min(count - 1, index + 1)];
        const angle = Math.atan2(next.y - prev.y, next.x - prev.x) + Math.PI / 2;
        return {
          x: point.x + Math.cos(angle) * offset,
          y: point.y + Math.sin(angle) * offset
        };
      });
    }

    function buildCurbStripeSegments(points, closed = false) {
      const stripeLength = 38;
      const maxSegmentLength = closed ? road.width * 0.95 : Infinity;
      const stripes = [];
      let traveled = 0;

      for (let i = 0; i < points.length - 1; i += 1) {
        const a = points[i];
        const b = points[i + 1];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const length = Math.hypot(dx, dy);
        if (length < 1 || length > maxSegmentLength) {
          traveled = 0;
          continue;
        }

        const tangentX = dx / length;
        const tangentY = dy / length;
        const segmentStart = traveled;
        const segmentEnd = traveled + length;
        let stripeStart = Math.floor(segmentStart / stripeLength) * stripeLength;

        while (stripeStart < segmentEnd) {
          const stripeEnd = stripeStart + stripeLength;
          const start = Math.max(segmentStart, stripeStart);
          const end = Math.min(segmentEnd, stripeEnd);
          const stripeIndex = Math.floor(stripeStart / stripeLength);
          const localStart = start - segmentStart;
          const localEnd = end - segmentStart;

          stripes.push({
            ax: a.x + tangentX * localStart,
            ay: a.y + tangentY * localStart,
            bx: a.x + tangentX * localEnd,
            by: a.y + tangentY * localEnd,
            color: stripeIndex % 2 === 0 ? "#f5f0e8" : "#d94132"
          });

          stripeStart += stripeLength;
        }

        traveled = segmentEnd;
      }

      return stripes;
    }

    function drawCurbStripeSegments(stripes) {
      for (const stripe of stripes) {
        drawCurbStripe(stripe.ax, stripe.ay, stripe.bx, stripe.by, stripe.color);
      }
    }

    function drawStripedCurb(points, closed = false) {
      const stripeLength = 38;
      const maxSegmentLength = closed ? road.width * 0.95 : Infinity;
      let traveled = 0;

      for (let i = 0; i < points.length - 1; i += 1) {
        const a = points[i];
        const b = points[i + 1];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const length = Math.hypot(dx, dy);
        if (length < 1 || length > maxSegmentLength) {
          traveled = 0;
          continue;
        }

        const tangentX = dx / length;
        const tangentY = dy / length;
        const segmentStart = traveled;
        const segmentEnd = traveled + length;
        let stripeStart = Math.floor(segmentStart / stripeLength) * stripeLength;

        while (stripeStart < segmentEnd) {
          const stripeEnd = stripeStart + stripeLength;
          const start = Math.max(segmentStart, stripeStart);
          const end = Math.min(segmentEnd, stripeEnd);
          const stripeIndex = Math.floor(stripeStart / stripeLength);
          const color = stripeIndex % 2 === 0 ? "#f5f0e8" : "#d94132";
          const localStart = start - segmentStart;
          const localEnd = end - segmentStart;

          drawCurbStripe(
            a.x + tangentX * localStart,
            a.y + tangentY * localStart,
            a.x + tangentX * localEnd,
            a.y + tangentY * localEnd,
            color
          );

          stripeStart += stripeLength;
        }

        traveled = segmentEnd;
      }
    }

    function drawCurbStripe(ax, ay, bx, by, color) {
      const start = worldToScreen(ax, ay);
      const end = worldToScreen(bx, by);
      const margin = 80;
      const offscreen =
        (start.x < -margin && end.x < -margin) ||
        (start.x > window.innerWidth + margin && end.x > window.innerWidth + margin) ||
        (start.y < -margin && end.y < -margin) ||
        (start.y > window.innerHeight + margin && end.y > window.innerHeight + margin);

      if (offscreen) return;

      ctx.strokeStyle = color;
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();
    }

    function drawAnchors() {
      const anchor = car.attached && car.anchor ? car.anchor : anchors[activeAnchorIndex];
      if (!anchor || car.crashed) return;

      const p = worldToScreen(anchor.x, anchor.y);
      if (p.y < -80 || p.y > window.innerHeight + 80) return;

      const active = car.anchor === anchor;
      const distance = Math.hypot(anchor.x - car.x, anchor.y - car.y);
      const nearRatio = Math.max(0, Math.min(1, 1 - distance / rope.maxReach));
      const pulse = (Math.sin(performance.now() * 0.012) + 1) * 0.5;
      const radius = scaled(active ? 15 : 11 + nearRatio * (5 + pulse * 5));
      const ringRadius = radius + scaled(9 + nearRatio * pulse * 10);

      ctx.save();
      if (nearRatio > 0) {
        ctx.globalAlpha = 0.18 + nearRatio * 0.34;
        ctx.strokeStyle = "#ffdd48";
        ctx.lineWidth = scaled(4 + nearRatio * 3);
        ctx.beginPath();
        ctx.arc(p.x, p.y, ringRadius, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
      ctx.fillStyle = active || nearRatio > 0.25 ? "#ffdd48" : "#ffffff";
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.globalAlpha = 0.65 + nearRatio * 0.25;
      ctx.beginPath();
      ctx.arc(p.x - radius * 0.28, p.y - radius * 0.28, Math.max(3, radius * 0.28), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawTurnHint() {
      const hint = getTurnHintInfo();
      if (!hint) return;

      const width = window.innerWidth;
      const notes = getUpcomingTurnHints(hint, 3);
      if (!notes.length) return;

      const alpha = 1;
      const scale = width < 720 ? 0.9 : 1.08;
      const now = performance.now();
      if (pacenoteHintState.anchor !== notes[0].anchor) {
        pacenoteHintState = {
          anchor: notes[0].anchor,
          startedAt: now,
          previousNotes: pacenoteHintState.previousNotes?.length ? pacenoteHintState.previousNotes : notes,
        };
      }
      const transition = clamp((now - pacenoteHintState.startedAt) / 360, 0, 1);
      const ease = transition < 0.5 ? 4 * transition * transition * transition : 1 - Math.pow(-2 * transition + 2, 3) / 2;
      const bigW = 168 * scale;
      const bigH = 118 * scale;
      const smallW = 82 * scale;
      const smallH = 72 * scale;
      const gap = 12 * scale;
      const totalW = bigW + smallW * Math.max(0, notes.length - 1) + gap * (notes.length - 1);
      const x = width / 2 - totalW / 2;
      const y = 24;
      const slots = buildPacenoteSlots(x, y, notes.length, bigW, bigH, smallW, smallH, gap);
      const previousSlots = buildPacenoteSlots(x, y, pacenoteHintState.previousNotes.length, bigW, bigH, smallW, smallH, gap);

      ctx.save();
      ctx.shadowColor = "rgba(0, 0, 0, 0.28)";
      ctx.shadowBlur = 12;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 8;

      if (transition < 1 && pacenoteHintState.previousNotes?.length) {
        const oldCurrent = pacenoteHintState.previousNotes[0];
        if (oldCurrent && oldCurrent.anchor !== notes[0].anchor) {
          const oldSlot = previousSlots[0];
          ctx.save();
          ctx.beginPath();
          ctx.rect(0, 0, oldSlot.x + oldSlot.w + 2 * scale, window.innerHeight);
          ctx.clip();
          drawWrcTurnCard(oldSlot.x - (oldSlot.w + gap) * ease, oldSlot.y, oldSlot.w, oldSlot.h, oldCurrent.side >= 0 ? 1 : -1, scale, oldCurrent, 0, alpha);
          ctx.restore();
        }
      }

      notes.forEach((note, index) => {
        const target = slots[index];
        const previousIndex = pacenoteHintState.previousNotes?.findIndex((previous) => previous.anchor === note.anchor) ?? -1;
        const previous = previousIndex >= 0 ? previousSlots[previousIndex] : null;
        const start = previous || {
          x: x + totalW + gap,
          y: target.y,
          w: target.w,
          h: target.h,
        };
        const animated = transition < 1 ? interpolatePacenoteSlot(start, target, ease) : target;
        drawWrcTurnCard(animated.x, animated.y, animated.w, animated.h, note.side >= 0 ? 1 : -1, scale, note, index, alpha);
      });

      if (shouldShowCornerActionBanner(hint)) {
        drawCornerActionBanner(width / 2, y + bigH + 12 * scale, Math.min(520, width - 34), 44 * scale, hint, scale);
      }

      ctx.shadowColor = "transparent";
      ctx.restore();

      if (transition >= 1) {
        pacenoteHintState.previousNotes = notes;
      }
    }

    function shouldShowCornerActionBanner(hint) {
      const turnNumber = Number(hint.turnNumber) || activeAnchorIndex + 1;
      if (cornerActionHintComplete || turnNumber > 2 || activeAnchorIndex > 1) {
        cornerActionHintComplete = true;
        return false;
      }
      return true;
    }

    function getCornerActionStage(hint) {
      const meters = Math.max(0, Math.round(hint.distance / 10));
      if (car.attached) {
        return {
          label: selectedLanguage === "zh" ? "松开刹车" : "RELEASE BRAKE",
          detail: selectedLanguage === "zh" ? "车头对准出弯线就松开" : "Release when lined up",
          color: "#4ee083"
        };
      }

      if (hint.distance <= rope.maxReach * 0.82) {
        return {
          label: selectedLanguage === "zh" ? "按住刹车" : "HOLD BRAKE",
          detail: selectedLanguage === "zh" ? "连接弯心锚点" : "Hook the corner anchor",
          color: "#ffd84d"
        };
      }

      return {
        label: selectedLanguage === "zh" ? "准备入弯" : "GET READY",
        detail: selectedLanguage === "zh" ? `${meters}m 后按住刹车` : `Brake in ${meters}m`,
        color: "#5db7ff"
      };
    }

    function drawCornerActionBanner(cx, y, w, h, hint, scale) {
      const stage = getCornerActionStage(hint);
      const x = cx - w / 2;
      const pulse = 1 + Math.sin(performance.now() * 0.011) * 0.025;

      ctx.save();
      ctx.translate(cx, y + h / 2);
      ctx.scale(pulse, pulse);
      ctx.translate(-cx, -(y + h / 2));
      ctx.fillStyle = "rgba(10, 16, 22, 0.88)";
      ctx.strokeStyle = stage.color;
      ctx.lineWidth = 3 * scale;
      roundRect(x, y, w, h, 8 * scale);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = stage.color;
      ctx.font = `900 ${Math.round(20 * scale)}px Arial, "Microsoft YaHei", sans-serif`;
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(stage.label, x + 18 * scale, y + h / 2);

      ctx.fillStyle = "rgba(248, 251, 255, 0.88)";
      ctx.font = `900 ${Math.round(13 * scale)}px Arial, "Microsoft YaHei", sans-serif`;
      ctx.textAlign = "right";
      ctx.fillText(stage.detail, x + w - 18 * scale, y + h / 2);
      ctx.restore();
    }

    function drawExpoFeedbackOverlay() {
      if (!gameStarted || gameOverEl.classList.contains("visible")) {
        tutorialOverlayEl.classList.remove("visible");
        return;
      }

      if (expo.tutorialActive) {
        const w = Math.min(560, window.innerWidth - 36);
        const h = 74;
        let x = window.innerWidth / 2 - w / 2;
        const fullMapTop = selectedMap === "fixed" ? window.innerHeight - 10 - 178 : window.innerHeight - 116;
        let y = selectedMap === "fixed"
          ? fullMapTop + (178 - h) / 2
          : window.innerHeight - 116;
        const carScreen = worldToScreen(car.x, car.y);
        const overlapsCar = (rectX, rectY) => (
          carScreen.x > rectX - 92 &&
          carScreen.x < rectX + w + 92 &&
          carScreen.y > rectY - 76 &&
          carScreen.y < rectY + h + 76
        );
        if (overlapsCar(x, y)) {
          y = clamp(fullMapTop - h - 14, 150, window.innerHeight - h - 24);
        }
        if (overlapsCar(x, y)) {
          x = carScreen.x < window.innerWidth / 2 ? window.innerWidth - w - 18 : 18;
          y = clamp(window.innerHeight - 116, 150, window.innerHeight - h - 24);
        }
        tutorialTitleEl.textContent = selectedLanguage === "zh" ? "新手引导：入弯前按住刹车，出弯时松开" : "Tutorial: hold brake before the corner, release on exit";
        tutorialSubtitleEl.textContent = "";
        tutorialOverlayEl.style.left = `${x}px`;
        tutorialOverlayEl.style.top = `${y}px`;
        tutorialOverlayEl.style.width = `${w}px`;
        tutorialOverlayEl.classList.add("visible");
      } else {
        tutorialOverlayEl.classList.remove("visible");
      }

      if (expo.feedbackTimer <= 0 || !expo.feedbackText) return;
      const alpha = Math.min(1, expo.feedbackTimer / 0.35);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#ffd84d";
      ctx.strokeStyle = "rgba(16, 24, 32, 0.92)";
      ctx.lineWidth = 7;
      ctx.font = "900 42px Arial, Microsoft YaHei, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.strokeText(expo.feedbackText, window.innerWidth / 2, window.innerHeight * 0.38);
      ctx.fillText(expo.feedbackText, window.innerWidth / 2, window.innerHeight * 0.38);
      ctx.restore();
    }

    function buildPacenoteSlots(x, y, count, bigW, bigH, smallW, smallH, gap) {
      const slots = [];
      for (let index = 0; index < count; index += 1) {
        const w = index === 0 ? bigW : smallW;
        const h = index === 0 ? bigH : smallH;
        slots.push({
          x: index === 0 ? x : x + bigW + gap + (index - 1) * (smallW + gap),
          y: y + (bigH - h),
          w,
          h,
        });
      }
      return slots;
    }

    function interpolatePacenoteSlot(from, to, amount) {
      return {
        x: from.x + (to.x - from.x) * amount,
        y: from.y + (to.y - from.y) * amount,
        w: from.w + (to.w - from.w) * amount,
        h: from.h + (to.h - from.h) * amount,
      };
    }

    function getUpcomingTurnHints(currentHint, count) {
      const currentIndex = Math.max(0, anchors.indexOf(currentHint.anchor));
      const total = anchors.length;
      if (!total) return [];

      const notes = [];
      for (let offset = 0; offset < count; offset += 1) {
        const rawIndex = currentIndex + offset;
        if (rawIndex >= total) break;
        const anchor = anchors[rawIndex];
        if (!anchor) continue;

        const turnAbs = anchor.turnAbs || Math.PI / 2;
        const side = offset === 0 ? currentHint.side : getAnchorApproachSide(anchor);
        const degrees = Math.round(turnAbs * 180 / Math.PI);
        const distance = offset === 0 ? currentHint.distance : getForwardAnchorDistance(anchor, currentHint.anchor);
        const distanceMeters = Math.max(0, Math.round(distance / 10));
        notes.push({
          anchor,
          side,
          degrees,
          distance,
          distanceMeters,
          progress: anchor.progress ?? getTrackProgressAtPoint(anchor.x, anchor.y),
          turnNumber: anchor.turnNumber || rawIndex + 1,
          distanceLabel: offset === 0 && distance <= rope.maxReach ? "NOW" : `${distanceMeters}m`,
        });
      }

      return notes;
    }

    function getAnchorApproachSide(anchor) {
      const progress = anchor.progress ?? getTrackProgressAtPoint(anchor.x, anchor.y);
      const before = getTrackPointAtProgress(progress - 36);
      const after = getTrackPointAtProgress(progress + 36);
      const vx = after.x - before.x;
      const vy = after.y - before.y;
      const side = vx * (anchor.y - before.y) - vy * (anchor.x - before.x);
      if (Math.abs(side) > 0.01) return side;
      return anchor.turnDir >= 0 ? 1 : -1;
    }

    function getForwardAnchorDistance(anchor, fromAnchor) {
      const fromProgress = fromAnchor.progress ?? getTrackProgressAtPoint(fromAnchor.x, fromAnchor.y);
      const toProgress = anchor.progress ?? getTrackProgressAtPoint(anchor.x, anchor.y);
      const total = buildTrackMetrics().total || 0;
      if (!total) return Math.max(0, toProgress - fromProgress);
      return (toProgress - fromProgress + total) % total;
    }

    function formatPacenoteDistance(distance) {
      return String(Math.max(10, Math.round((distance / 10) / 10) * 10));
    }

    function drawWrcWarningSign(x, y, w, h, scale) {
      const cx = x + w / 2;
      const top = y + 3 * scale;
      const bottom = y + h - 3 * scale;

      ctx.save();
      ctx.fillStyle = "#d62b2b";
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 3 * scale;
      ctx.beginPath();
      ctx.moveTo(cx, top);
      ctx.lineTo(x + w - 3 * scale, bottom);
      ctx.lineTo(x + 3 * scale, bottom);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.strokeStyle = "#ffffff";
      ctx.lineCap = "round";
      ctx.lineWidth = 3 * scale;
      ctx.beginPath();
      ctx.moveTo(cx - 8 * scale, y + h * 0.62);
      ctx.quadraticCurveTo(cx - 2 * scale, y + h * 0.42, cx + 8 * scale, y + h * 0.55);
      ctx.stroke();
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(cx, y + h * 0.74, 2.4 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawWrcTurnCard(x, y, w, h, side, scale, note, index, opacity = 1) {
      ctx.save();
      ctx.globalAlpha *= opacity;
      const radius = 5 * scale;
      roundRect(x, y, w, h, radius);
      const colors = ["#f3c735", "#5f6f42", "#51442d"];
      ctx.fillStyle = colors[index] || "#96783b";
      ctx.fill();
      ctx.strokeStyle = index === 0 ? "rgba(255, 255, 255, 0.92)" : "rgba(255, 255, 255, 0.24)";
      ctx.lineWidth = index === 0 ? 3 * scale : 1.5 * scale;
      ctx.stroke();

      drawPacenoteTrackPreview(note, x, y, w, h, scale, index);

      if (index === 0) {
        ctx.fillStyle = "rgba(16, 24, 30, 0.92)";
        roundRect(x + 8 * scale, y + 8 * scale, 50 * scale, 34 * scale, 4 * scale);
        ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.font = `900 ${Math.round(30 * scale)}px Arial, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(side >= 0 ? "→" : "←", x + 33 * scale, y + 25 * scale);

        ctx.fillStyle = "#101820";
        ctx.font = `900 ${Math.round(16 * scale)}px Arial, sans-serif`;
        ctx.textAlign = "right";
        ctx.fillText(note.distanceLabel, x + w - 10 * scale, y + 24 * scale);
      }

      ctx.fillStyle = index === 0 ? "#101820" : "#f9f7e8";
      ctx.font = `900 ${Math.round((index === 0 ? 22 : 13) * scale)}px Arial, sans-serif`;
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.fillText(String(note.turnNumber), x + w - 7 * scale, y + h - (index === 0 ? 10 : 8) * scale);
      ctx.restore();
    }

    function drawPacenoteTrackPreview(note, x, y, w, h, scale, index) {
      const span = note.degrees >= 150 ? 720 : note.degrees >= 100 ? 560 : 430;
      const points = getTurnPreviewPoints(note.progress, span);
      if (points.length < 2) return;

      const bounds = getPointBounds(points);
      const reserveBottom = (index === 0 ? 22 : 18) * scale;
      const padX = (index === 0 ? 18 : 14) * scale;
      const padTop = (index === 0 ? 16 : 13) * scale;
      const innerW = Math.max(1, w - padX * 2);
      const innerH = Math.max(1, h - padTop - reserveBottom);
      const scaleToFit = Math.min(
        innerW / Math.max(1, bounds.maxX - bounds.minX),
        innerH / Math.max(1, bounds.maxY - bounds.minY)
      );
      const offsetX = x + (w - (bounds.maxX - bounds.minX) * scaleToFit) / 2;
      const offsetY = y + padTop + (innerH - (bounds.maxY - bounds.minY) * scaleToFit) / 2;
      const mapPoint = (point) => ({
        x: offsetX + (point.x - bounds.minX) * scaleToFit,
        y: offsetY + (point.y - bounds.minY) * scaleToFit
      });

      ctx.save();
      roundRect(x + 9 * scale, y + 9 * scale, w - 18 * scale, h - reserveBottom - 2 * scale, 4 * scale);
      ctx.clip();
      drawPacenotePreviewPath(points, mapPoint, "#ffffff", (index === 0 ? 5 : 4) * scale);
      drawPacenoteEndArrow(points, mapPoint, scale, index);
      ctx.restore();
    }

    function drawPacenotePreviewPath(points, mapPoint, color, lineWidth) {
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      points.forEach((point, index) => {
        const mapped = mapPoint(point);
        if (index === 0) ctx.moveTo(mapped.x, mapped.y);
        else ctx.lineTo(mapped.x, mapped.y);
      });
      ctx.stroke();
    }

    function drawPacenoteEndArrow(points, mapPoint, scale, index) {
      if (points.length < 2) return;

      const end = mapPoint(points[points.length - 1]);
      let previous = null;
      for (let i = points.length - 2; i >= 0; i -= 1) {
        const candidate = mapPoint(points[i]);
        if (Math.hypot(end.x - candidate.x, end.y - candidate.y) > 4 * scale) {
          previous = candidate;
          break;
        }
      }
      if (!previous) return;

      const angle = Math.atan2(end.y - previous.y, end.x - previous.x);
      const size = (index === 0 ? 9 : 7) * scale;

      ctx.save();
      ctx.translate(end.x, end.y);
      ctx.rotate(angle);
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.moveTo(size, 0);
      ctx.lineTo(-size * 0.55, -size * 0.55);
      ctx.lineTo(-size * 0.25, 0);
      ctx.lineTo(-size * 0.55, size * 0.55);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawWrcInfoCard(x, y, w, h, color, text, scale) {
      ctx.save();
      roundRect(x, y, w, h, 4 * scale);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.fillStyle = "#f9f7e8";
      ctx.font = `900 ${Math.round(15 * scale)}px Arial, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, x + w / 2, y + h / 2 + scale);
      ctx.restore();
    }

    function drawWrcDistanceTag(x, y, text, scale) {
      ctx.save();
      const w = Math.max(28 * scale, String(text).length * 8 * scale + 10 * scale);
      const h = 13 * scale;
      ctx.fillStyle = "#ffffff";
      roundRect(x - w / 2, y, w, h, 2 * scale);
      ctx.fill();
      ctx.fillStyle = "#2b332f";
      ctx.font = `900 ${Math.round(8 * scale)}px Arial, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, x, y + h / 2 + 0.5 * scale);
      ctx.restore();
    }

    function getTurnHintInfo() {
      if (!gameStarted || car.crashed || gameOverEl.classList.contains("visible")) return null;

      const anchor = car.attached && car.anchor ? car.anchor : anchors[activeAnchorIndex];
      if (!anchor) return null;

      const dx = anchor.x - car.x;
      const dy = anchor.y - car.y;
      const distance = Math.hypot(dx, dy);
      const anchorScreen = worldToScreen(anchor.x, anchor.y);

      const turnAbs = anchor.turnAbs || Math.PI / 2;
      const vx = Math.abs(car.vx) + Math.abs(car.vy) > 12 ? car.vx : Math.cos(car.angle);
      const vy = Math.abs(car.vx) + Math.abs(car.vy) > 12 ? car.vy : Math.sin(car.angle);
      const side = vx * dy - vy * dx;
      const turnDegrees = Math.round(turnAbs * 180 / Math.PI);
      const turnName = getTurnHintName(turnDegrees);
      const direction = side >= 0 ? t("right") : t("left");

      return {
        anchor,
        anchorScreen,
        distance,
        anchorOnScreen: true,
        side,
        direction,
        degrees: turnDegrees,
        progress: anchor.progress ?? getTrackProgressAtPoint(anchor.x, anchor.y),
        turnNumber: anchor.turnNumber || activeAnchorIndex + 1,
        detail: turnName
      };
    }

    function drawTurnHintArrowIcon(side, x, y) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(side, 1);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#ffd84d";
      ctx.fillStyle = "#ffd84d";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(-24, 14);
      ctx.quadraticCurveTo(-25, -18, 13, -18);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(13, -18);
      ctx.lineTo(1, -30);
      ctx.lineTo(31, -18);
      ctx.lineTo(1, -6);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawTurnHintTrackIcon(hint, x, y) {
      const points = getTurnPreviewPoints(hint.progress, 460);
      if (points.length < 2) {
        drawTurnHintArrowIcon(hint.side >= 0 ? 1 : -1, x, y);
        return;
      }

      const bounds = getPointBounds(points);
      const scale = Math.min(58 / Math.max(1, bounds.maxX - bounds.minX), 42 / Math.max(1, bounds.maxY - bounds.minY));
      const centerX = (bounds.minX + bounds.maxX) / 2;
      const centerY = (bounds.minY + bounds.maxY) / 2;

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "rgba(245, 248, 248, 0.74)";
      ctx.lineWidth = 20;
      drawTurnPreviewPath(points, x, y, centerX, centerY, scale);
      ctx.strokeStyle = "#3a444a";
      ctx.lineWidth = 14;
      drawTurnPreviewPath(points, x, y, centerX, centerY, scale);
      ctx.strokeStyle = "#ffd84d";
      ctx.lineWidth = 4;
      drawTurnPreviewPath(points, x, y, centerX, centerY, scale);
      ctx.restore();
    }

    function drawTurnPreviewPath(points, x, y, centerX, centerY, scale) {
      ctx.beginPath();
      points.forEach((point, index) => {
        const px = x + (point.x - centerX) * scale;
        const py = y + (point.y - centerY) * scale;
        if (index === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.stroke();
    }

    function getTurnPreviewPoints(progress, span) {
      const metrics = buildTrackMetrics();
      if (!metrics.total) return [];

      const points = [];
      const steps = 24;
      const start = progress - span * 0.46;
      for (let i = 0; i <= steps; i += 1) {
        points.push(getTrackPointAtProgress(start + (span * i) / steps));
      }
      return points;
    }

    function getTurnHintName(degrees) {
      if (degrees >= 120) return t("hairpinTurn");
      if (degrees >= 105) return t("sharpTurn");
      if (degrees >= 70) return t("mediumTurn");
      return t("softTurn");
    }

    function drawBoostPads() {
      for (const pad of boostPads) {
        const p = worldToScreen(pad.x, pad.y);
        if (p.x < -160 || p.x > window.innerWidth + 160 || p.y < -160 || p.y > window.innerHeight + 160) continue;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(pad.angle + Math.PI / 2);
        ctx.scale(view.zoom, view.zoom);
        ctx.globalAlpha = pad.used ? 0.35 : 1;
        ctx.fillStyle = "rgba(28, 37, 42, 0.32)";
        roundRect(-46, -42, 92, 84, 8);
        ctx.fill();
        ctx.fillStyle = "#ffd84d";
        ctx.beginPath();
        ctx.moveTo(0, -38);
        ctx.lineTo(38, 4);
        ctx.lineTo(16, 4);
        ctx.lineTo(16, 34);
        ctx.lineTo(-16, 34);
        ctx.lineTo(-16, 4);
        ctx.lineTo(-38, 4);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    function drawRope() {
      if (!car.attached || !car.anchor) return;

      const a = worldToScreen(car.anchor.x, car.anchor.y);
      const c = worldToScreen(car.x, car.y);
      ctx.strokeStyle = "#ffd84d";
      ctx.lineWidth = scaled(5);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(c.x, c.y);
      ctx.stroke();
    }

    function addSkidMark() {
      if (skidMarks.length > 0) {
        const last = skidMarks[skidMarks.length - 1];
        if (Math.hypot(last.x - car.x, last.y - car.y) < 18) return;
      }

      skidMarks.push({
        x: car.x,
        y: car.y,
        angle: car.visualAngle,
        life: 0.9
      });

      if (skidMarks.length > 80) skidMarks.shift();
    }

    function updateSkidMarks(dt) {
      for (const mark of skidMarks) {
        mark.life -= dt;
      }

      while (skidMarks.length && skidMarks[0].life <= 0) {
        skidMarks.shift();
      }
    }

    function drawSkidMarks() {
      for (const mark of skidMarks) {
        const p = worldToScreen(mark.x, mark.y);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(mark.angle + Math.PI / 2);
        ctx.scale(view.zoom, view.zoom);
        ctx.globalAlpha = Math.max(0, mark.life / 0.9) * 0.42;
        ctx.strokeStyle = "#151a1d";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-11, 10);
        ctx.lineTo(-11, 34);
        ctx.moveTo(11, 10);
        ctx.lineTo(11, 34);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawAiOpponents() {
      for (const opponent of aiOpponents) {
        const p = worldToScreen(opponent.x, opponent.y);
        if (p.x < -80 || p.x > window.innerWidth + 80 || p.y < -80 || p.y > window.innerHeight + 80) continue;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(opponent.angle + Math.PI / 2);
        ctx.scale(0.88 * view.zoom, 0.88 * view.zoom);

        drawBikeSprite(opponent.spriteIndex, 94);
        ctx.restore();
      }
    }

    function drawCar() {
      const p = worldToScreen(car.x, car.y);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(car.visualAngle + Math.PI / 2);
      ctx.scale(view.zoom, view.zoom);

      drawJetFlame();
      drawBikeSprite(0, 98);

      if (car.detachedFlash > 0) {
        ctx.save();
        ctx.globalAlpha = car.detachedFlash / 0.22;
        ctx.strokeStyle = "#ffd84d";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-24, 36);
        ctx.lineTo(0, 66);
        ctx.lineTo(24, 36);
        ctx.stroke();
        ctx.restore();
      }

      ctx.restore();
    }

    function drawBikeSprite(spriteIndex, targetHeight) {
      const sprite = bikeSprites[spriteIndex] || bikeSprites[0];
      if (!bikeSpriteSheet.complete || !bikeSpriteSheet.naturalWidth) {
        drawVehicleBody(spriteIndex === 0 ? "#e74b3f" : "#f2c12f", "#20272b", "#f4f8fb");
        return;
      }

      const targetWidth = targetHeight * (sprite.w / sprite.h);
      ctx.drawImage(
        bikeSpriteSheet,
        sprite.x,
        sprite.y,
        sprite.w,
        sprite.h,
        -targetWidth / 2,
        -targetHeight / 2,
        targetWidth,
        targetHeight
      );
    }

    function drawVehicleBody(bodyColor, cockpitColor, tailColor) {
      ctx.fillStyle = "rgba(0,0,0,0.24)";
      ctx.beginPath();
      ctx.ellipse(0, 18, 22, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = bodyColor;
      roundRect(-15, -28, 30, 56, 9);
      ctx.fill();

      ctx.fillStyle = cockpitColor;
      roundRect(-11, -18, 22, 16, 5);
      ctx.fill();

      ctx.fillStyle = tailColor;
      roundRect(-13, 8, 26, 16, 5);
      ctx.fill();
    }

    function drawJetFlame() {
      const speedRatio = Math.min(1, Math.max(0, (car.speed - 320) / 240));
      const boostRatio = car.boostTimer > 0 ? 1 : 0;
      const intensity = Math.max(speedRatio * 0.65, boostRatio);
      if (intensity <= 0.04) return;

      const flicker = 0.82 + Math.sin(performance.now() * 0.04) * 0.18;
      const length = (34 + 34 * intensity) * flicker;
      const width = 13 + 10 * intensity;

      ctx.save();
      ctx.globalAlpha = 0.88 * intensity;
      ctx.fillStyle = "#ff7a1a";
      ctx.beginPath();
      ctx.moveTo(0, 34 + length);
      ctx.quadraticCurveTo(width, 40, 8, 25);
      ctx.lineTo(-8, 25);
      ctx.quadraticCurveTo(-width, 40, 0, 34 + length);
      ctx.fill();

      ctx.globalAlpha = 0.95 * intensity;
      ctx.fillStyle = "#ffe46b";
      ctx.beginPath();
      ctx.moveTo(0, 30 + length * 0.62);
      ctx.quadraticCurveTo(width * 0.48, 38, 4, 27);
      ctx.lineTo(-4, 27);
      ctx.quadraticCurveTo(-width * 0.48, 38, 0, 30 + length * 0.62);
      ctx.fill();
      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function shortAngle(angle) {
      return Math.atan2(Math.sin(angle), Math.cos(angle));
    }

    function normalizeAngle(angle) {
      const full = Math.PI * 2;
      return ((angle % full) + full) % full;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function normalizeVector(x, y) {
      const length = Math.hypot(x, y) || 1;
      return {
        x: x / length,
        y: y / length
      };
    }

    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      updateGamepadBrakeInput();
      if (gameStarted && !isPaused) update(dt);
      draw();
      updateSpeedometer();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        if (isPaused) return;
        setBrakeInputSource("keyboard", true);
      }
      if (event.code === "KeyR") {
        if (gameOverEl.classList.contains("visible")) restartRace();
        else reset();
      }
      if (event.code === "KeyP") {
        event.preventDefault();
        togglePause();
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.code === "Space") {
        setBrakeInputSource("keyboard", false);
      }
    });

    playerSpeedEl.addEventListener("input", updatePlayerSpeedDisplay);
    centeringStrengthEl.addEventListener("input", () => setCenteringStrength(centeringStrengthEl.value));
    aiSpeedSliders.forEach((slider) => {
      slider.addEventListener("input", () => setAiSpeedForDifficulty(slider.dataset.aiSpeed, slider.value));
    });
    autopilotSpeedEl.addEventListener("input", updateAutopilotDisplay);
    autopilotCollapseButtonEl.addEventListener("click", () => {
      autopilotCollapsed = !autopilotCollapsed;
      updateAutopilotDisplay();
    });
    pauseButtonEl.addEventListener("click", (event) => {
      event.preventDefault();
      togglePause();
    });
    pauseResumeButtonEl.addEventListener("click", () => setPaused(false));
    pauseRestartButtonEl.addEventListener("click", () => restartRace());
    pauseHomeButtonEl.addEventListener("click", () => returnHome());
    autopilotButtonEl.addEventListener("click", () => {
      autopilot.enabled = !autopilot.enabled;
      clearBrakeInput();
      if (car.attached) {
        car.attached = false;
        car.anchor = null;
      }
      updateAutopilotDisplay();
    });
    controllerScanButtonEl.addEventListener("click", () => detectBrakeController({ request: true }));
    startButtonEl.addEventListener("click", () => startGame("endless"));
    raceButtonEl.addEventListener("click", () => startGame("race"));
    settingsButtonEl.addEventListener("click", showSettingsMenu);
    backToMainButtonEl.addEventListener("click", showMainMenu);
    restartButtonEl.addEventListener("click", restartRace);
    homeButtonEl.addEventListener("click", returnHome);
    document.querySelectorAll("[data-difficulty]").forEach((button) => {
      button.addEventListener("click", () => selectDifficulty(button.dataset.difficulty));
    });
    document.querySelectorAll("[data-map]").forEach((button) => {
      button.addEventListener("click", () => selectMap(button.dataset.map));
    });
    document.querySelectorAll("[data-language]").forEach((button) => {
      button.addEventListener("click", () => setLanguage(button.dataset.language));
    });

    window.addEventListener("gamepadconnected", () => detectBrakeController());
    window.addEventListener("gamepaddisconnected", () => detectBrakeController());
    if (navigator.hid) {
      navigator.hid.addEventListener("connect", () => detectBrakeController());
      navigator.hid.addEventListener("disconnect", () => detectBrakeController());
    }

    window.addEventListener("pageshow", () => {
      loadAiSpeedSettings();
      loadCenteringStrengthSetting();
      selectDifficulty(selectedDifficulty);
      selectMap(selectedMap);
      applyLanguage();
      updatePlayerSpeedDisplay();
      updateCenteringStrengthDisplay();
      updateAiSpeedSettingsDisplay();
      updateAutopilotDisplay();
      detectBrakeController();
    });

    function isUiControl(target) {
      return target instanceof Element && (target.closest(".start-screen") || target.closest(".game-over") || target.closest(".autopilot-panel") || target.closest(".pause-button") || target.closest(".pause-banner"));
    }

    window.addEventListener("pointerdown", (event) => {
      if (isUiControl(event.target)) return;
      if (isPaused) return;
      setBrakeInputSource("pointer", true);
    });

    window.addEventListener("pointerup", (event) => {
      if (isUiControl(event.target)) return;
      if (isPaused) return;
      setBrakeInputSource("pointer", false);
    });

    window.addEventListener("blur", () => {
      clearBrakeInput();
    });

    loadAiSpeedSettings();
    loadCenteringStrengthSetting();
    selectDifficulty("normal");
    selectMap("fixed");
    updatePlayerSpeedDisplay();
    updateCenteringStrengthDisplay();
    updateAiSpeedSettingsDisplay();
    updateAutopilotDisplay();
    reset();
    applyLanguage();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
