<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sling Drift Core Prototype</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #58b866;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #58b866;
    }

    .hint {
      position: fixed;
      left: 24px;
      top: 22px;
      padding: 14px 16px;
      border-radius: 8px;
      background: rgba(15, 20, 24, 0.78);
      color: #fff;
      font-size: 15px;
      line-height: 1.6;
      pointer-events: none;
    }

    .hint strong {
      display: block;
      margin-bottom: 4px;
      color: #ffd84d;
      font-size: 20px;
    }

    .leaderboard {
      position: fixed;
      left: 24px;
      top: 168px;
      width: 238px;
      padding: 12px 14px;
      border-radius: 8px;
      background: rgba(15, 20, 24, 0.78);
      color: #fff;
      font-size: 14px;
      line-height: 1.45;
      pointer-events: none;
    }

    .leaderboard strong {
      display: block;
      margin-bottom: 6px;
      color: #ffd84d;
      font-size: 18px;
    }

    .leaderboard .player {
      color: #ffd84d;
      font-weight: 700;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 24px 1fr 42px 64px;
      align-items: center;
      min-height: 24px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .rank-position {
      color: rgba(255, 255, 255, 0.72);
      font-weight: 800;
    }

    .rank-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rank-change {
      text-align: right;
      font-size: 12px;
      font-weight: 900;
    }

    .rank-gap {
      text-align: right;
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .rank-gap.leader {
      color: #ffd84d;
      font-size: 10px;
    }

    .rank-up {
      background: rgba(70, 210, 108, 0.28);
      color: #8bd450;
      transform: translateX(6px);
      box-shadow: inset 4px 0 0 #8bd450;
    }

    .rank-down {
      background: rgba(255, 85, 74, 0.28);
      color: #ff786f;
      transform: translateX(-6px);
      box-shadow: inset 4px 0 0 #ff554a;
    }

    .rank-steady .rank-change {
      color: rgba(255, 255, 255, 0.34);
    }

    .speedometer {
      position: fixed;
      right: 24px;
      bottom: 22px;
      width: 150px;
      height: 150px;
      display: grid;
      place-items: center;
      border: 4px solid rgba(255, 216, 77, 0.9);
      border-radius: 50%;
      background: rgba(15, 20, 24, 0.86);
      background-image: none !important;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      color: #fff;
      overflow: hidden;
      pointer-events: none;
      z-index: 2;
    }

    .speedometer.hidden {
      display: none;
    }

    .speedometer::before,
    .speedometer::after,
    .speedometer *::before,
    .speedometer *::after,
    .speed-center,
    .speed-dot,
    .dial-center {
      display: none !important;
      content: none !important;
      width: 0 !important;
      height: 0 !important;
      opacity: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
    }

    .speed-readout {
      position: relative;
      text-align: center;
      transform: translateY(-3px);
      z-index: 1;
    }

    .speed-value {
      display: block;
      color: #ffd84d;
      font-size: 40px;
      font-weight: 800;
      line-height: 1;
    }

    .speed-unit {
      display: block;
      margin-top: 4px;
      color: rgba(255, 255, 255, 0.76);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 5vw, 64px);
      background:
        linear-gradient(135deg, rgba(20, 30, 34, 0.98), rgba(38, 48, 54, 0.96)),
        #1c252a;
      color: #fff;
      z-index: 5;
    }

    .start-screen.hidden {
      display: none;
    }

    .menu-panel {
      width: min(560px, 100%);
    }

    .menu-panel h1 {
      margin: 0 0 16px;
      color: #ffd84d;
      font-size: clamp(34px, 6vw, 58px);
      letter-spacing: 0;
    }

    .menu-panel p {
      margin: 0 0 24px;
      color: rgba(255, 255, 255, 0.76);
      font-size: 16px;
      line-height: 1.5;
    }

    .menu-view.hidden {
      display: none;
    }

    .menu-section {
      margin-top: 16px;
    }

    .menu-section strong {
      display: block;
      margin-bottom: 8px;
      color: #fff;
      font-size: 16px;
    }

    .difficulty-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .menu-button {
      min-height: 42px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font: 700 14px Arial, "Microsoft YaHei", sans-serif;
      cursor: pointer;
    }

    .menu-button.active,
    .menu-button.primary {
      border-color: #ffd84d;
      background: #ffd84d;
      color: #1c252a;
    }

    .menu-slider {
      width: 100%;
      accent-color: #ffd84d;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 14px;
    }

    .start-action {
      width: 100%;
      margin-top: 18px;
      min-height: 50px;
      font-size: 18px;
    }

    #startButton,
    #raceButton {
      min-height: 50px;
      font-size: 18px;
    }

    .menu-actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .game-over {
      position: fixed;
      left: 50%;
      top: 50%;
      display: none;
      min-width: 300px;
      padding: 24px 28px;
      border-radius: 10px;
      background: rgba(15, 20, 24, 0.9);
      color: #fff;
      text-align: center;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      z-index: 6;
      font-size: 0;
    }

    .game-over.visible {
      display: block;
    }

    .game-over strong {
      display: block;
      margin-bottom: 8px;
      color: #ff554a;
      font-size: 34px;
    }

    .game-over > strong:not(:first-child) {
      display: none;
    }

    .game-over div {
      font-size: 16px;
    }

    .game-over-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .respawn-banner {
      position: fixed;
      left: 50%;
      top: 86px;
      min-width: 220px;
      padding: 12px 18px;
      border: 3px solid rgba(255, 216, 77, 0.86);
      border-radius: 8px;
      background: rgba(15, 20, 24, 0.86);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 3;
    }

    .respawn-banner.hidden {
      display: none;
    }

    .respawn-time {
      color: #ffd84d;
      font-size: 22px;
    }

    .race-timer {
      position: fixed;
      left: 50%;
      top: 22px;
      min-width: 150px;
      padding: 10px 16px;
      border-radius: 8px;
      background: rgba(15, 20, 24, 0.8);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 2;
    }

    .race-timer.hidden {
      display: none;
    }

    .race-timer span {
      color: #ffd84d;
      font-size: 24px;
    }

    .race-notice {
      position: fixed;
      left: 50%;
      top: 82px;
      min-width: 300px;
      padding: 16px 26px;
      border: 4px solid #fff;
      border-radius: 8px;
      background: #ff3b30;
      color: #fff;
      font-size: 32px;
      font-weight: 900;
      text-align: center;
      transform: translateX(-50%);
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.32), 0 0 0 6px rgba(255, 216, 77, 0.55);
      pointer-events: none;
      z-index: 4;
      animation: raceNoticePulse 0.48s ease-in-out infinite alternate;
    }

    .race-notice.hidden {
      display: none;
    }

    @keyframes raceNoticePulse {
      from {
        transform: translateX(-50%) scale(1);
      }

      to {
        transform: translateX(-50%) scale(1.08);
      }
    }

    .track-preview {
      position: fixed;
      right: 24px;
      top: 22px;
      width: 176px;
      height: 176px;
      border: 5px solid rgba(255, 216, 77, 0.94);
      border-radius: 50%;
      background: rgba(15, 20, 24, 0.82);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      pointer-events: none;
      z-index: 2;
    }

    .track-preview.hidden {
      display: none;
    }

    .result-list {
      margin-top: 14px;
      text-align: left;
    }

    .result-row {
      display: grid;
      grid-template-columns: 42px 1fr 64px;
      gap: 10px;
      padding: 5px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 14px;
      font-weight: 700;
    }

    .result-row.player {
      color: #ffd84d;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <canvas class="track-preview hidden" id="trackPreview"></canvas>
  <div class="hint">
    <strong>Sling Drift 核心机制</strong>
    按住 Space：连接最近锚点绕弯<br />
    松开 Space：离开锚点沿切线前进<br />
    R：重置
  </div>

  <div class="leaderboard" id="leaderboard">
    <strong>排名</strong>
  </div>

  <div class="speedometer hidden" id="speedometer">
    <div class="speed-readout">
      <span class="speed-value" id="speedValue">0</span>
      <span class="speed-unit">KM/H</span>
    </div>
  </div>

  <div class="respawn-banner hidden" id="respawnBanner">
    Respawning <span class="respawn-time" id="respawnTime">0.5</span>s
  </div>

  <div class="race-timer hidden" id="raceTimer">
    Remaining <span id="raceTime">--</span>m
  </div>

  <div class="race-notice hidden" id="raceNotice">1000m remaining</div>

  <div class="start-screen" id="startScreen">
    <div class="menu-panel">
      <div class="menu-view" id="mainMenu">
      <h1>Brake Drift Race</h1>
      <p>Hold Space to hook the corner anchor, release to sling out of the turn.</p>

      <div class="menu-section">
        <strong>难度选择</strong>
        <div class="difficulty-buttons">
          <button class="menu-button" type="button" data-difficulty="easy">Easy</button>
          <button class="menu-button active" type="button" data-difficulty="normal">Normal</button>
          <button class="menu-button" type="button" data-difficulty="hard">Hard</button>
        </div>
      </div>

      <div class="menu-actions">
        <button class="menu-button primary start-action" id="startButton" type="button">Practice Mode</button>
        <button class="menu-button primary" id="raceButton" type="button">Race Mode</button>
        <button class="menu-button" id="settingsButton" type="button">Settings</button>
      </div>
      </div>

      <div class="menu-view hidden" id="settingsMenu">
      <h1>Settings</h1>
      <div class="menu-section">
        <strong>设置</strong>
        <div class="setting-row">
          <span>小车速度</span>
          <span id="playerSpeedValue">100%</span>
        </div>
        <input class="menu-slider" id="playerSpeed" type="range" min="0.8" max="1.3" step="0.05" value="1" />
      </div>

      <div class="menu-actions">
        <button class="menu-button primary" id="backToMainButton" type="button">Back</button>
      </div>
      </div>
    </div>
  </div>

  <div class="game-over" id="gameOver">
    <strong id="resultTitle">Crashed</strong>
    <div id="resultBody">You hit the track edge.</div>
    <div class="game-over-actions">
      <button class="menu-button primary" id="restartButton" type="button">Restart</button>
      <button class="menu-button" id="homeButton" type="button">Home</button>
    </div>
    <strong>撞到赛道边缘</strong>
    按 R 重置
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const trackPreviewEl = document.getElementById("trackPreview");
    const previewCtx = trackPreviewEl.getContext("2d");
    const gameOverEl = document.getElementById("gameOver");
    const leaderboardEl = document.getElementById("leaderboard");
    const speedometerEl = document.getElementById("speedometer");
    const speedValueEl = document.getElementById("speedValue");
    const respawnBannerEl = document.getElementById("respawnBanner");
    const respawnTimeEl = document.getElementById("respawnTime");
    const raceTimerEl = document.getElementById("raceTimer");
    const raceTimeEl = document.getElementById("raceTime");
    const raceNoticeEl = document.getElementById("raceNotice");
    const startScreenEl = document.getElementById("startScreen");
    const mainMenuEl = document.getElementById("mainMenu");
    const settingsMenuEl = document.getElementById("settingsMenu");
    const startButtonEl = document.getElementById("startButton");
    const raceButtonEl = document.getElementById("raceButton");
    const settingsButtonEl = document.getElementById("settingsButton");
    const backToMainButtonEl = document.getElementById("backToMainButton");
    const restartButtonEl = document.getElementById("restartButton");
    const homeButtonEl = document.getElementById("homeButton");
    const resultTitleEl = document.getElementById("resultTitle");
    const resultBodyEl = document.getElementById("resultBody");
    const playerSpeedEl = document.getElementById("playerSpeed");
    const playerSpeedValueEl = document.getElementById("playerSpeedValue");

    const input = {
      space: false
    };

    const camera = {
      x: 0,
      y: 0
    };

    const view = {
      zoom: 1.2
    };

    const road = {
      width: 260
    };

    const rope = {
      maxReach: 560,
      pullStrength: 620,
      distancePull: 1.15,
      radialDamping: 2.2
    };

    let trackSegments = [];
    let anchors = [];
    let boostPads = [];
    let aiOpponents = [];
    let aiStrength = 0.88;
    let gameStarted = false;
    let selectedDifficulty = "normal";
    let playerSpeedScale = Number(playerSpeedEl.value);
    let displayedSpeed = 0;
    let lastRankPositions = new Map();
    let rankChangeEffects = new Map();
    let currentMode = "endless";

    const race = {
      duration: 60,
      finishLeadTime: 5,
      finishAheadDistance: 1500,
      elapsed: 0,
      finishProgress: null,
      finished: false,
      noticeTimer: 0,
      shownMilestones: new Set()
    };

    const difficultySettings = {
      easy: { aiStrength: 0.70, label: "Easy" },
      normal: { aiStrength: 0.88, label: "Normal" },
      hard: { aiStrength: 1.08, label: "Hard" }
    };

    const generator = {
      point: { x: 0, y: 420 },
      heading: -Math.PI / 2,
      section: 0,
      nextHairpinSection: 3
    };

    const car = {
      x: 0,
      y: 260,
      vx: 0,
      vy: -280,
      angle: -Math.PI / 2,
      visualAngle: -Math.PI / 2,
      speed: 300,
      maxFreeSpeed: 370,
      attached: false,
      anchor: null,
      orbitRadius: 0,
      orbitAngle: 0,
      orbitDir: 1,
      detachedFlash: 0,
      slideTimer: 0,
      boostTimer: 0,
      runTime: 0,
      difficulty: 1,
      crashed: false,
      respawnTimer: 0,
      respawnTarget: null
    };

    const skidMarks = [];
    let cachedWorldTrackPoints = null;
    let cachedTrackMetrics = null;
    let lastTime = performance.now();
    let activeAnchorIndex = 0;

    function reset() {
      resetGeneratedTrack();
      const grid = getStartGridSlot(0);
      const startSpeed = getPlayerBaseSpeed() * 1.116;
      car.x = grid.x;
      car.y = grid.y;
      car.vx = grid.tangent.x * startSpeed;
      car.vy = grid.tangent.y * startSpeed;
      car.angle = grid.angle;
      car.visualAngle = grid.angle;
      car.speed = getPlayerBaseSpeed();
      car.maxFreeSpeed = getPlayerMaxSpeed();
      car.attached = false;
      car.anchor = null;
      car.detachedFlash = 0;
      car.slideTimer = 0;
      car.boostTimer = 0;
      car.runTime = 0;
      car.difficulty = 1;
      car.crashed = false;
      car.respawnTimer = 0;
      car.respawnTarget = null;
      skidMarks.length = 0;
      activeAnchorIndex = 0;
      lastRankPositions = new Map();
      rankChangeEffects = new Map();
      race.elapsed = 0;
      race.finishProgress = null;
      race.finished = false;
      race.noticeTimer = 0;
      race.shownMilestones = new Set();
      resetAiOpponents();
      gameOverEl.classList.remove("visible");
      updateRespawnBanner();
      updateRaceTimer();
      updateRaceNotice(0);
      camera.x = car.x;
      camera.y = car.y;
      updateLeaderboardPanelF1();
    }

    function resetGeneratedTrack() {
      trackSegments = [];
      anchors = [];
      boostPads = [];
      cachedWorldTrackPoints = null;
      cachedTrackMetrics = null;
      generator.point = { x: 0, y: 420 };
      generator.heading = -Math.PI / 2;
      generator.section = 0;
      generator.nextHairpinSection = 3 + Math.floor(Math.random() * 3);

      for (let i = 0; i < 8; i += 1) {
        generateNextTrackSection();
      }
    }

    function getPlayerBaseSpeed() {
      return 300 * playerSpeedScale;
    }

    function getPlayerMaxSpeed() {
      return 370 * playerSpeedScale;
    }

    function resetAiOpponents() {
      const names = ["Blaze", "Raven", "Viper", "Nova"];
      const colors = ["#41b6e6", "#8bd450", "#b56cff", "#ff8b35"];
      aiOpponents = colors.map((color, index) => ({
        name: names[index],
        color,
        progress: getStartGridProgress(index + 1),
        speed: 325 + index * 12,
        targetSpeed: 338 + index * 15,
        baseLaneOffset: getStartGridLaneOffset(index + 1),
        lanePhase: Math.random() * Math.PI * 2,
        x: getStartGridSlot(index + 1).x,
        y: getStartGridSlot(index + 1).y,
        angle: getStartGridSlot(index + 1).angle
      }));
    }

    function getStartGridProgress(slotIndex) {
      return 188 - slotIndex * 44;
    }

    function getStartGridLaneOffset(slotIndex) {
      return slotIndex % 2 === 0 ? -42 : 42;
    }

    function getStartGridSlot(slotIndex) {
      const progress = getStartGridProgress(slotIndex);
      const laneOffset = getStartGridLaneOffset(slotIndex);
      const point = getTrackPointAtProgress(progress);
      return {
        progress,
        laneOffset,
        x: point.x + point.normal.x * laneOffset,
        y: point.y + point.normal.y * laneOffset,
        angle: Math.atan2(point.tangent.y, point.tangent.x),
        tangent: point.tangent,
        normal: point.normal
      };
    }

    function generateNextTrackSection() {
      const straightLength = generator.section === 0 ? 780 : 620 + (generator.section % 3) * 110;
      const from = { ...generator.point };
      const to = {
        x: from.x + Math.cos(generator.heading) * straightLength,
        y: from.y + Math.sin(generator.heading) * straightLength
      };

      trackSegments.push({ type: "line", from, to, long: straightLength >= 620 });
      addBoostPadsOnStraight(from, to, generator.heading, straightLength);
      generator.point = to;

      const turnAbs = chooseTurnAngle(generator.heading, generator.section);
      const turnDir = chooseTurnDirection(generator.heading, generator.section, turnAbs);
      const radius = 160;
      const leftX = -Math.sin(generator.heading);
      const leftY = Math.cos(generator.heading);
      const center = {
        x: generator.point.x + leftX * radius * turnDir,
        y: generator.point.y + leftY * radius * turnDir
      };
      const start = Math.atan2(generator.point.y - center.y, generator.point.x - center.x);
      const end = start + turnDir * turnAbs;
      const exit = {
        x: center.x + Math.cos(end) * radius,
        y: center.y + Math.sin(end) * radius
      };

      trackSegments.push({ type: "arc", center, radius, start, end, dir: turnDir, turnAbs });
      anchors.push({ x: center.x, y: center.y, r: radius });
      generator.point = exit;
      generator.heading += turnDir * turnAbs;
      generator.section += 1;
      cachedWorldTrackPoints = null;
      cachedTrackMetrics = null;
    }

    function chooseTurnAngle(heading, section) {
      const normalized = normalizeAngle(heading);
      const horizontal = Math.abs(Math.sin(normalized)) < 0.2;
      const canHairpin = horizontal && section > 1;
      if (canHairpin && section >= generator.nextHairpinSection) {
        generator.nextHairpinSection = section + 3 + Math.floor(Math.random() * 4);
        return Math.PI;
      }
      return Math.PI / 2;
    }

    function chooseTurnDirection(heading, section, turnAbs) {
      const normalized = normalizeAngle(heading);
      const horizontal = Math.abs(Math.sin(normalized)) < 0.2;
      if (horizontal) {
        return Math.cos(normalized) > 0 ? -1 : 1;
      }

      const candidate = section % 2 === 0 ? 1 : -1;
      const nextHeading = heading + candidate * turnAbs;
      const driftX = generator.point.x + Math.cos(nextHeading) * 800;
      if (driftX > 760) return -1;
      if (driftX < -760) return 1;
      return candidate;
    }

    function addBoostPadsOnStraight(from, to, heading, length) {
      if (length < 620) return;

      const count = length > 760 ? 2 : 1;
      for (let i = 0; i < count; i += 1) {
        const t = count === 1 ? 0.48 : 0.36 + i * 0.22;
        boostPads.push({
          x: from.x + (to.x - from.x) * t,
          y: from.y + (to.y - from.y) * t,
          angle: heading,
          used: false
        });
      }
    }

    function ensureTrackAhead() {
      while (anchors.length - activeAnchorIndex < 5) {
        generateNextTrackSection();
      }
    }

    function ensureTrackToProgress(progress) {
      let metrics = buildTrackMetrics();
      while (metrics.total < progress) {
        generateNextTrackSection();
        metrics = buildTrackMetrics();
      }
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const width = Math.floor(window.innerWidth * dpr);
      const height = Math.floor(window.innerHeight * dpr);
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function worldToScreen(x, y) {
      return {
        x: (x - camera.x) * view.zoom + window.innerWidth / 2,
        y: (y - camera.y) * view.zoom + window.innerHeight * 0.68
      };
    }

    function screenToWorld(x, y) {
      return {
        x: (x - window.innerWidth / 2) / view.zoom + camera.x,
        y: (y - window.innerHeight * 0.68) / view.zoom + camera.y
      };
    }

    function scaled(value) {
      return value * view.zoom;
    }

    function getNearestAnchor() {
      syncActiveAnchorToCar();
      const anchor = anchors[activeAnchorIndex];
      if (!anchor) return null;

      const dx = anchor.x - car.x;
      const dy = anchor.y - car.y;
      const distance = Math.hypot(dx, dy);
      if (distance <= rope.maxReach) return anchor;
      return null;
    }

    function attachToAnchor(anchor) {
      car.attached = true;
      car.anchor = anchor;
      car.speed = Math.max(getPlayerBaseSpeed(), Math.hypot(car.vx, car.vy));
      car.visualAngle = car.angle;
    }

    function detachFromAnchor() {
      if (!car.attached) return;

      const currentSpeed = Math.max(1, Math.hypot(car.vx, car.vy));
      const releaseSpeed = Math.min(car.maxFreeSpeed, currentSpeed * 1.04);
      car.vx = (car.vx / currentSpeed) * releaseSpeed;
      car.vy = (car.vy / currentSpeed) * releaseSpeed;
      car.speed = releaseSpeed;
      const heading = Math.atan2(car.vy, car.vx);
      car.angle = Math.atan2(car.vy, car.vx);
      car.visualAngle = heading - shortAngle(heading - car.visualAngle) * 0.34;
      car.attached = false;
      car.anchor = null;
      car.detachedFlash = 0.22;
      car.slideTimer = 0.78;
    }

    function update(dt) {
      if (car.crashed) {
        ensureTrackAhead();
        updateDifficulty(dt);
        updateRespawnPenalty(dt);
        updateSkidMarks(dt);
        updateAiOpponents(dt);
        updateRaceState(dt);
        camera.x += (car.x - camera.x) * Math.min(1, dt * 5);
        camera.y += (car.y - camera.y) * Math.min(1, dt * 5);
        updateLeaderboardPanelF1();
        return;
      }

      ensureTrackAhead();
      updateDifficulty(dt);
      syncActiveAnchorToCar();

      if (input.space && !car.attached) {
        const anchor = getNearestAnchor();
        if (anchor) attachToAnchor(anchor);
      }

      if (!input.space && car.attached) {
        detachFromAnchor();
      }

      if (car.attached && car.anchor) {
        applyRopePull(dt);
      } else {
        applyStraightCentering(dt);
      }

      applyEngineAssist(dt);

      car.x += car.vx * dt;
      car.y += car.vy * dt;
      applyBoostPads();
      car.vx *= car.attached ? 0.998 : 0.999;
      car.vy *= car.attached ? 0.998 : 0.999;
      car.speed = Math.hypot(car.vx, car.vy);
      car.angle = Math.atan2(car.vy, car.vx);

      if (car.attached) {
        car.visualAngle += shortAngle(car.angle - car.visualAngle) * Math.min(1, dt * 7);
      } else if (car.slideTimer > 0) {
        car.visualAngle += shortAngle(car.angle - car.visualAngle) * dt * 2.4;
        addSkidMark();
      } else {
        car.visualAngle += shortAngle(car.angle - car.visualAngle) * Math.min(1, dt * 10);
      }

      car.detachedFlash = Math.max(0, car.detachedFlash - dt);
      car.slideTimer = Math.max(0, car.slideTimer - dt);
      car.boostTimer = Math.max(0, car.boostTimer - dt);
      updateSkidMarks(dt);
      updateAiOpponents(dt);
      updateRaceState(dt);
      if (race.finished) return;
      advanceActiveAnchor();

      if (isOutsideRoad()) {
        startRespawnPenalty();
      }

      camera.x += (car.x - camera.x) * Math.min(1, dt * 5);
      camera.y += (car.y - camera.y) * Math.min(1, dt * 5);
      updateLeaderboardPanelF1();
    }

    function updateRespawnPenalty(dt) {
      car.respawnTimer = Math.max(0, car.respawnTimer - dt);
      updateRespawnBanner();

      if (car.respawnTimer > 0) return;
      finishRespawn();
    }

    function updateRaceState(dt) {
      if (currentMode !== "race" || race.finished) {
        updateRaceTimer();
        updateRaceNotice(dt);
        return;
      }

      race.elapsed += dt;
      const playerProgress = getTrackProgressAt(car.x, car.y);

      if (race.finishProgress === null && race.elapsed >= race.duration - race.finishLeadTime) {
        race.finishProgress = playerProgress + race.finishAheadDistance;
        ensureTrackToProgress(race.finishProgress + 900);
      }

      if (race.finishProgress !== null) {
        ensureTrackToProgress(race.finishProgress + 900);
        if (!car.crashed && playerProgress >= race.finishProgress) {
          finishRace();
        }
      }

      updateRaceTimer();
      updateRaceNotice(dt);
    }

    function updateRaceTimer() {
      const visible = gameStarted && currentMode === "race" && !gameOverEl.classList.contains("visible");
      raceTimerEl.classList.toggle("hidden", !visible);
      const playerProgress = gameStarted ? getTrackProgressAt(car.x, car.y) : 0;
      const remainingMeters = getRaceRemainingMeters(playerProgress);
      raceTimeEl.textContent = String(remainingMeters);
    }

    function getRaceRemainingMeters(playerProgress = getTrackProgressAt(car.x, car.y)) {
      const estimatedFinish = race.finishProgress ?? playerProgress + race.finishAheadDistance + Math.max(0, race.duration - race.finishLeadTime - race.elapsed) * 310;
      return Math.max(0, Math.round((estimatedFinish - playerProgress) / 10));
    }

    function updateRaceNotice(dt) {
      if (!gameStarted || currentMode !== "race" || race.finished || gameOverEl.classList.contains("visible")) {
        race.noticeTimer = 0;
        raceNoticeEl.classList.add("hidden");
        return;
      }

      race.noticeTimer = Math.max(0, race.noticeTimer - dt);

      const remainingMeters = getRaceRemainingMeters();
      [1000, 500, 100].forEach((milestone) => {
        if (remainingMeters <= milestone && !race.shownMilestones.has(milestone)) {
          race.shownMilestones.add(milestone);
          race.noticeTimer = 1.8;
          raceNoticeEl.textContent = `${milestone}m remaining`;
        }
      });

      raceNoticeEl.classList.toggle("hidden", race.noticeTimer <= 0);
    }

    function finishRace() {
      race.finished = true;
      gameStarted = false;
      car.attached = false;
      car.anchor = null;
      input.space = false;
      updateRaceTimer();
      updateRespawnBanner();
      updateRaceNotice(0);

      const entries = getRankingEntries();
      const playerIndex = entries.findIndex((entry) => entry.player);
      const playerPosition = playerIndex + 1;

      resultTitleEl.textContent = `P${playerPosition} Finish`;
      resultBodyEl.innerHTML = `
        <div>You finished ${formatOrdinal(playerPosition)} in ${race.elapsed.toFixed(1)}s</div>
        <div class="result-list">
          ${entries
            .map((entry, index) => {
              const gap = Math.max(0, (entries[0].progress - entry.progress) / 115);
              const gapText = index === 0 ? "WINNER" : `+${gap.toFixed(1)}s`;
              const playerClass = entry.player ? " player" : "";
              return `<div class="result-row${playerClass}">
                <span>P${index + 1}</span>
                <span>${entry.name}</span>
                <span>${gapText}</span>
              </div>`;
            })
            .join("")}
        </div>
      `;
      gameOverEl.classList.add("visible");
    }

    function getRankingEntries() {
      return [
        { id: "YOU", name: "YOU", progress: getTrackProgressAt(car.x, car.y), player: true },
        ...aiOpponents.map((opponent) => ({
          id: opponent.name,
          name: opponent.name,
          progress: opponent.progress,
          player: false
        }))
      ].sort((a, b) => b.progress - a.progress);
    }

    function formatOrdinal(position) {
      if (position === 1) return "1st";
      if (position === 2) return "2nd";
      if (position === 3) return "3rd";
      return `${position}th`;
    }

    function updateDifficulty(dt) {
      car.runTime += dt;
      car.difficulty = Math.min(2.35, 1 + car.runTime / 75);
      car.maxFreeSpeed = (370 + (car.difficulty - 1) * 190) * playerSpeedScale;
    }

    function applyEngineAssist(dt) {
      const speed = Math.max(1, Math.hypot(car.vx, car.vy));
      const targetSpeed = (car.boostTimer > 0 ? 455 : 300) * car.difficulty * playerSpeedScale;
      const accel = (car.boostTimer > 0 ? 260 : 58) * playerSpeedScale;
      if (speed >= targetSpeed) return;

      car.vx += (car.vx / speed) * accel * dt;
      car.vy += (car.vy / speed) * accel * dt;
    }

    function syncActiveAnchorToCar() {
      if (car.attached) return;

      while (activeAnchorIndex < anchors.length - 1) {
        const current = anchors[activeAnchorIndex];
        const next = anchors[activeAnchorIndex + 1];
        const currentDistance = Math.hypot(current.x - car.x, current.y - car.y);
        const nextDistance = Math.hypot(next.x - car.x, next.y - car.y);
        const nextIsCloser = nextDistance < currentDistance - 28;
        const nextIsReady = nextDistance < rope.maxReach * 0.72;
        const currentIsOutdated = currentDistance > rope.maxReach * 0.9 && nextDistance < rope.maxReach * 1.2;

        if (!nextIsReady && !nextIsCloser && !currentIsOutdated) break;
        activeAnchorIndex += 1;
        ensureTrackAhead();
      }
    }

    function advanceActiveAnchor() {
      if (car.attached || activeAnchorIndex >= anchors.length - 1) return;

      const current = anchors[activeAnchorIndex];
      const next = anchors[activeAnchorIndex + 1];
      const currentDistance = Math.hypot(current.x - car.x, current.y - car.y);
      const nextDistance = Math.hypot(next.x - car.x, next.y - car.y);

      if (currentDistance > rope.maxReach * 1.1 && nextDistance < rope.maxReach) {
        activeAnchorIndex += 1;
        ensureTrackAhead();
      }
    }

    function applyRopePull(dt) {
      const dx = car.anchor.x - car.x;
      const dy = car.anchor.y - car.y;
      const distance = Math.max(1, Math.hypot(dx, dy));
      const nx = dx / distance;
      const ny = dy / distance;
      const radialVelocity = car.vx * nx + car.vy * ny;
      const pull = rope.pullStrength + distance * rope.distancePull - radialVelocity * rope.radialDamping;
      const ax = nx * pull;
      const ay = ny * pull;

      car.vx += ax * dt;
      car.vy += ay * dt;

      const speed = Math.hypot(car.vx, car.vy);
      if (speed > car.maxFreeSpeed) {
        car.vx = (car.vx / speed) * car.maxFreeSpeed;
        car.vy = (car.vy / speed) * car.maxFreeSpeed;
      }
    }

    function applyStraightCentering(dt) {
      const info = nearestLongStraightInfo(car.x, car.y);
      if (!info || info.distance > road.width * 0.42 || car.slideTimer > 0) return;

      const toCenterX = info.closest.x - car.x;
      const toCenterY = info.closest.y - car.y;
      const lateralVelocity = car.vx * info.normal.x + car.vy * info.normal.y;
      car.vx += (toCenterX * 3.2 - info.normal.x * lateralVelocity * 3.6) * dt;
      car.vy += (toCenterY * 3.2 - info.normal.y * lateralVelocity * 3.6) * dt;
    }

    function nearestLongStraightInfo(x, y) {
      let best = null;

      for (const segment of trackSegments) {
        if (segment.type !== "line" || !segment.long) continue;
        const info = projectPointToSegment(x, y, segment.from, segment.to);
        if (info.t < 0.08 || info.t > 0.92) continue;

        if (!best || info.distance < best.distance) {
          best = info;
        }
      }

      return best;
    }

    function applyBoostPads() {
      for (const pad of boostPads) {
        if (pad.used || Math.abs(pad.y - car.y) > 900 || Math.abs(pad.x - car.x) > 900) continue;
        const dx = car.x - pad.x;
        const dy = car.y - pad.y;
        const forwardX = Math.cos(pad.angle);
        const forwardY = Math.sin(pad.angle);
        const sideX = -forwardY;
        const sideY = forwardX;
        const along = dx * forwardX + dy * forwardY;
        const lateral = dx * sideX + dy * sideY;

        if (Math.abs(along) < 54 && Math.abs(lateral) < road.width * 0.3) {
          pad.used = true;
          car.boostTimer = 1.05;
          const currentSpeed = Math.max(1, Math.hypot(car.vx, car.vy));
          const boostSpeed = Math.min(car.maxFreeSpeed * 1.12, Math.max(470, currentSpeed * 1.22));
          car.vx = (car.vx / currentSpeed) * boostSpeed;
          car.vy = (car.vy / currentSpeed) * boostSpeed;
        }
      }
    }

    function updateAiOpponents(dt) {
      const playerProgress = getTrackProgressAt(car.x, car.y);

      for (const opponent of aiOpponents) {
        while (opponent.progress > buildTrackMetrics().total - 1200) {
          generateNextTrackSection();
        }

        const difficultyBonus = (car.difficulty - 1) * 170;
        const rubberBand = opponent.progress < playerProgress - 520 ? 120 : opponent.progress > playerProgress + 640 ? -18 : 0;
        const cornerBoost = Math.abs(Math.sin(opponent.progress * 0.004)) * 18;
        const targetSpeed = (opponent.targetSpeed + difficultyBonus + rubberBand + cornerBoost) * aiStrength + Math.sin(car.runTime * 0.8 + opponent.lanePhase) * 14;
        opponent.speed += (targetSpeed - opponent.speed) * Math.min(1, dt * 2.5);
        opponent.progress += opponent.speed * dt;

        const trackPoint = getTrackPointAtProgress(opponent.progress);
        const laneWander = Math.sin(opponent.progress * 0.008 + opponent.lanePhase) * 8;
        const offset = opponent.baseLaneOffset + laneWander;
        opponent.x = trackPoint.x + trackPoint.normal.x * offset;
        opponent.y = trackPoint.y + trackPoint.normal.y * offset;
        opponent.angle = Math.atan2(trackPoint.tangent.y, trackPoint.tangent.x);
      }
    }

    function updateLeaderboard() {
      const entries = [
        { name: "你", progress: getTrackProgressAt(car.x, car.y), player: true },
        ...aiOpponents.map((opponent) => ({
          name: opponent.name,
          progress: opponent.progress,
          player: false
        }))
      ].sort((a, b) => b.progress - a.progress);

      leaderboardEl.innerHTML = `<strong>排名</strong>${entries
        .map((entry, index) => {
          const className = entry.player ? " class=\"player\"" : "";
          return `<div${className}>${index + 1}. ${entry.name}</div>`;
        })
        .join("")}`;
    }

    function updateLeaderboardPanel() {
      const entries = [
        { id: "YOU", name: "YOU", progress: getTrackProgressAt(car.x, car.y), player: true },
        ...aiOpponents.map((opponent) => ({
          id: opponent.name,
          name: opponent.name,
          progress: opponent.progress,
          player: false
        }))
      ].sort((a, b) => b.progress - a.progress);
      const now = performance.now();

      entries.forEach((entry, index) => {
        const position = index + 1;
        const previous = lastRankPositions.get(entry.id);
        const delta = previous ? previous - position : 0;
        if (delta !== 0) {
          rankChangeEffects.set(entry.id, {
            delta,
            until: now + 1400
          });
        }
      });

      leaderboardEl.innerHTML = `<strong>Rank</strong>${entries
        .map((entry, index) => {
          const position = index + 1;
          const effect = rankChangeEffects.get(entry.id);
          const delta = effect && effect.until > now ? effect.delta : 0;
          const movementClass = delta > 0 ? "rank-up" : delta < 0 ? "rank-down" : "rank-steady";
          const playerClass = entry.player ? " player" : "";
          const changeText = delta > 0 ? `▲ +${delta}` : delta < 0 ? `▼ ${delta}` : "–";

          return `<div class="rank-row ${movementClass}${playerClass}">
            <span class="rank-position">${position}</span>
            <span class="rank-name">${entry.name}</span>
            <span class="rank-change">${changeText}</span>
          </div>`;
        })
        .join("")}`;

      lastRankPositions = new Map(entries.map((entry, index) => [entry.id, index + 1]));
      rankChangeEffects.forEach((effect, id) => {
        if (effect.until <= now) rankChangeEffects.delete(id);
      });
    }

    function updateLeaderboardPanelF1() {
      const entries = [
        { id: "YOU", name: "YOU", progress: getTrackProgressAt(car.x, car.y), player: true },
        ...aiOpponents.map((opponent) => ({
          id: opponent.name,
          name: opponent.name,
          progress: opponent.progress,
          player: false
        }))
      ].sort((a, b) => b.progress - a.progress);
      const now = performance.now();
      const leaderProgress = entries[0]?.progress || 0;

      entries.forEach((entry, index) => {
        const position = index + 1;
        const previous = lastRankPositions.get(entry.id);
        const delta = previous ? previous - position : 0;
        if (delta !== 0) {
          rankChangeEffects.set(entry.id, {
            delta,
            until: now + 1400
          });
        }
      });

      leaderboardEl.innerHTML = `<strong>Rank</strong>${entries
        .map((entry, index) => {
          const position = index + 1;
          const effect = rankChangeEffects.get(entry.id);
          const delta = effect && effect.until > now ? effect.delta : 0;
          const movementClass = delta > 0 ? "rank-up" : delta < 0 ? "rank-down" : "rank-steady";
          const playerClass = entry.player ? " player" : "";
          const changeText = delta > 0 ? `UP +${delta}` : delta < 0 ? `DN ${delta}` : "-";
          const gapSeconds = Math.max(0, (leaderProgress - entry.progress) / 115);
          const gapText = index === 0 ? "INTERVAL" : `+${gapSeconds.toFixed(1)}s`;
          const gapClass = index === 0 ? "rank-gap leader" : "rank-gap";

          return `<div class="rank-row ${movementClass}${playerClass}">
            <span class="rank-position">${position}</span>
            <span class="rank-name">${entry.name}</span>
            <span class="rank-change">${changeText}</span>
            <span class="${gapClass}">${gapText}</span>
          </div>`;
        })
        .join("")}`;

      lastRankPositions = new Map(entries.map((entry, index) => [entry.id, index + 1]));
      rankChangeEffects.forEach((effect, id) => {
        if (effect.until <= now) rankChangeEffects.delete(id);
      });
    }

    function updatePlayerSpeedDisplay() {
      playerSpeedScale = Number(playerSpeedEl.value);
      playerSpeedValueEl.textContent = `${Math.round(playerSpeedScale * 100)}%`;
    }

    function updateSpeedometer() {
      const visible = gameStarted && !gameOverEl.classList.contains("visible");
      speedometerEl.classList.toggle("hidden", !visible);

      const targetSpeed = Math.max(0, car.speed * 0.38);
      displayedSpeed += (targetSpeed - displayedSpeed) * 0.08;
      speedValueEl.textContent = String(Math.round(displayedSpeed));
    }

    function selectDifficulty(difficulty) {
      selectedDifficulty = difficulty;
      const setting = difficultySettings[selectedDifficulty];
      aiStrength = setting.aiStrength;

      document.querySelectorAll("[data-difficulty]").forEach((button) => {
        button.classList.toggle("active", button.dataset.difficulty === selectedDifficulty);
      });
    }

    function showMainMenu() {
      mainMenuEl.classList.remove("hidden");
      settingsMenuEl.classList.add("hidden");
      startScreenEl.classList.remove("hidden");
    }

    function showSettingsMenu() {
      mainMenuEl.classList.add("hidden");
      settingsMenuEl.classList.remove("hidden");
      updatePlayerSpeedDisplay();
    }

    function startGame(mode = "endless") {
      currentMode = mode;
      updatePlayerSpeedDisplay();
      selectDifficulty(selectedDifficulty);
      reset();
      gameStarted = true;
      startScreenEl.classList.add("hidden");
      input.space = false;
      lastTime = performance.now();
    }

    function startRespawnPenalty() {
      const target = nearestTrackCenterInfo(car.x, car.y);
      car.crashed = true;
      car.respawnTimer = 0.5;
      car.respawnTarget = target;
      car.attached = false;
      car.anchor = null;
      car.vx = 0;
      car.vy = 0;
      car.speed = 0;
      car.boostTimer = 0;
      car.slideTimer = 0;
      input.space = false;
      gameOverEl.classList.remove("visible");
      resultTitleEl.textContent = "Crashed";
      resultBodyEl.textContent = "You hit the track edge.";
      updateRespawnBanner();
    }

    function finishRespawn() {
      const target = car.respawnTarget || nearestTrackCenterInfo(car.x, car.y);
      const speed = getPlayerBaseSpeed() * 0.92;
      car.x = target.closest.x;
      car.y = target.closest.y;
      car.vx = target.tangent.x * speed;
      car.vy = target.tangent.y * speed;
      car.angle = Math.atan2(car.vy, car.vx);
      car.visualAngle = car.angle;
      car.speed = speed;
      car.attached = false;
      car.anchor = null;
      car.detachedFlash = 0;
      car.boostTimer = 0;
      car.slideTimer = 0.18;
      car.crashed = false;
      car.respawnTimer = 0;
      car.respawnTarget = null;
      input.space = false;
      syncActiveAnchorToCar();
      updateRespawnBanner();
    }

    function updateRespawnBanner() {
      if (!car.crashed || car.respawnTimer <= 0) {
        respawnBannerEl.classList.add("hidden");
        return;
      }

      respawnBannerEl.classList.remove("hidden");
      respawnTimeEl.textContent = car.respawnTimer.toFixed(1);
    }

    function restartRace() {
      gameOverEl.classList.remove("visible");
      startGame(currentMode);
    }

    function returnHome() {
      gameStarted = false;
      input.space = false;
      gameOverEl.classList.remove("visible");
      updateRespawnBanner();
      updateRaceTimer();
      reset();
      showMainMenu();
    }

    function draw() {
      resize();
      const width = window.innerWidth;
      const height = window.innerHeight;

      ctx.clearRect(0, 0, width, height);
      drawGrass(width, height);
      drawTrack();
      drawStartGrid();
      drawFinishLine();
      drawBoostPads();
      drawSkidMarks();
      drawAnchors();
      drawRope();
      drawAiOpponents();
      drawCar();
      drawTrackPreview();
    }

    function drawGrass(width, height) {
      ctx.fillStyle = "#58b866";
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.strokeStyle = "#84d37f";
      ctx.lineWidth = 2;
      for (let i = 0; i < 80; i += 1) {
        const p = screenToWorld((i * 97) % width, (i * 61) % height);
        const s = worldToScreen(p.x + Math.sin(i) * 20, p.y + (camera.y * 0.18) % 120);
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x + 80, s.y + 24);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawTrack() {
      const points = buildTrackPoints();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      ctx.strokeStyle = "#263036";
      ctx.lineWidth = scaled(road.width);
      drawPolyline(points);

      ctx.strokeStyle = "#3a444a";
      ctx.lineWidth = scaled(road.width - 24);
      drawPolyline(points);

      drawCurbs();

      ctx.strokeStyle = "rgba(255,255,255,0.82)";
      ctx.lineWidth = scaled(4);
      drawOffsetPolyline(points, scaled(-road.width / 2 + 10));
      drawOffsetPolyline(points, scaled(road.width / 2 - 10));
    }

    function drawTrackPreview() {
      const visible = gameStarted && !gameOverEl.classList.contains("visible");
      trackPreviewEl.classList.toggle("hidden", !visible);
      if (!visible) return;

      const cssSize = 176;
      const dpr = window.devicePixelRatio || 1;
      const pixelSize = Math.floor(cssSize * dpr);
      if (trackPreviewEl.width !== pixelSize || trackPreviewEl.height !== pixelSize) {
        trackPreviewEl.width = pixelSize;
        trackPreviewEl.height = pixelSize;
      }

      previewCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      previewCtx.clearRect(0, 0, cssSize, cssSize);
      previewCtx.save();
      previewCtx.beginPath();
      previewCtx.arc(cssSize / 2, cssSize / 2, cssSize / 2 - 5, 0, Math.PI * 2);
      previewCtx.clip();

      previewCtx.fillStyle = "rgba(28, 37, 42, 0.92)";
      previewCtx.fillRect(0, 0, cssSize, cssSize);

      const mapPoint = (worldPoint) => {
        const screen = worldToScreen(worldPoint.x, worldPoint.y);
        return {
          x: (screen.x / window.innerWidth) * cssSize,
          y: (screen.y / window.innerHeight) * cssSize
        };
      };

      const visiblePoints = buildVisibleWorldTrackPoints();
      if (visiblePoints.length > 1) {
        previewCtx.lineCap = "round";
        previewCtx.lineJoin = "round";
        previewCtx.strokeStyle = "rgba(238, 243, 244, 0.95)";
        previewCtx.lineWidth = 14;
        previewCtx.beginPath();
        visiblePoints.forEach((point, index) => {
          const mapped = mapPoint(point);
          if (index === 0) previewCtx.moveTo(mapped.x, mapped.y);
          else previewCtx.lineTo(mapped.x, mapped.y);
        });
        previewCtx.stroke();

        previewCtx.strokeStyle = "rgba(58, 68, 74, 0.95)";
        previewCtx.lineWidth = 9;
        previewCtx.stroke();
      }

      drawPreviewDot(car.x, car.y, "#f2c12f", 5.8);
      aiOpponents.forEach((opponent) => {
        drawPreviewDot(opponent.x, opponent.y, opponent.color, 4.7);
      });

      previewCtx.restore();
    }

    function drawPreviewDot(x, y, color, radius) {
      const screen = worldToScreen(x, y);
      if (screen.x < -40 || screen.x > window.innerWidth + 40 || screen.y < -40 || screen.y > window.innerHeight + 40) return;

      const size = 176;
      const px = (screen.x / window.innerWidth) * size;
      const py = (screen.y / window.innerHeight) * size;
      previewCtx.save();
      previewCtx.fillStyle = color;
      previewCtx.strokeStyle = "#11181b";
      previewCtx.lineWidth = 2;
      previewCtx.beginPath();
      previewCtx.arc(px, py, radius, 0, Math.PI * 2);
      previewCtx.fill();
      previewCtx.stroke();
      previewCtx.restore();
    }

    function drawStartGrid() {
      for (let i = 0; i < 5; i += 1) {
        const slot = getStartGridSlot(i);
        const p = worldToScreen(slot.x, slot.y);
        if (p.x < -120 || p.x > window.innerWidth + 120 || p.y < -120 || p.y > window.innerHeight + 120) continue;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(slot.angle + Math.PI / 2);
        ctx.fillStyle = i === 0 ? "rgba(255, 216, 77, 0.16)" : "rgba(255, 255, 255, 0.12)";
        ctx.strokeStyle = i === 0 ? "rgba(255, 216, 77, 0.82)" : "rgba(255, 255, 255, 0.58)";
        ctx.lineWidth = scaled(3);
        roundRect(scaled(-24), scaled(-34), scaled(48), scaled(68), scaled(6));
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawFinishLine() {
      if (currentMode !== "race" || race.finishProgress === null) return;

      const point = getTrackPointAtProgress(race.finishProgress);
      const p = worldToScreen(point.x, point.y);
      if (p.x < -220 || p.x > window.innerWidth + 220 || p.y < -220 || p.y > window.innerHeight + 220) return;

      const angle = Math.atan2(point.tangent.y, point.tangent.x);
      const depth = 70;
      const width = road.width - 36;
      const rows = 3;
      const cols = 8;
      const cellW = depth / rows;
      const cellH = width / cols;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      ctx.scale(view.zoom, view.zoom);

      ctx.fillStyle = "rgba(15, 20, 24, 0.22)";
      ctx.fillRect(-depth / 2 - 6, -width / 2 - 6, depth + 12, width + 12);

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          ctx.fillStyle = (row + col) % 2 === 0 ? "#f4f4f0" : "#171b1e";
          ctx.fillRect(-depth / 2 + row * cellW, -width / 2 + col * cellH, cellW + 0.5, cellH + 0.5);
        }
      }

      ctx.strokeStyle = "#ffd84d";
      ctx.lineWidth = 4;
      ctx.strokeRect(-depth / 2, -width / 2, depth, width);
      ctx.restore();
    }

    function buildTrackPoints() {
      return buildVisibleWorldTrackPoints().map((p) => worldToScreen(p.x, p.y));
    }

    function buildVisibleWorldTrackPoints() {
      const points = buildWorldTrackPoints();
      const margin = 260;
      let first = -1;
      let last = -1;

      for (let i = 0; i < points.length; i += 1) {
        const p = points[i];
        const s = worldToScreen(p.x, p.y);
        const onScreen =
          s.x >= -margin &&
          s.x <= window.innerWidth + margin &&
          s.y >= -margin &&
          s.y <= window.innerHeight + margin;

        if (onScreen) {
          if (first === -1) first = i;
          last = i;
        }
      }

      if (first === -1) return points;
      return points.slice(Math.max(0, first - 1), Math.min(points.length, last + 2));
    }

    function buildWorldTrackPoints() {
      if (cachedWorldTrackPoints) return cachedWorldTrackPoints;

      const points = [];

      for (const segment of trackSegments) {
        if (segment.type === "line") {
          addLinePoints(points, segment.from, segment.to, 28);
        } else {
          const arcSteps = segment.turnAbs > Math.PI / 2 ? 72 : 36;
          addArcPoints(points, segment.center, segment.radius, segment.start, segment.end, segment.dir, arcSteps);
        }
      }

      cachedWorldTrackPoints = points;
      return points;
    }

    function buildTrackMetrics() {
      if (cachedTrackMetrics) return cachedTrackMetrics;

      const points = buildWorldTrackPoints();
      const cumulative = [0];
      for (let i = 0; i < points.length - 1; i += 1) {
        cumulative.push(cumulative[i] + Math.hypot(points[i + 1].x - points[i].x, points[i + 1].y - points[i].y));
      }

      cachedTrackMetrics = {
        points,
        cumulative,
        total: cumulative[cumulative.length - 1] || 0
      };
      return cachedTrackMetrics;
    }

    function getTrackPointAtProgress(progress) {
      let metrics = buildTrackMetrics();
      while (progress > metrics.total - 1200) {
        generateNextTrackSection();
        metrics = buildTrackMetrics();
      }

      const points = metrics.points;
      const cumulative = metrics.cumulative;
      const target = Math.max(0, Math.min(progress, metrics.total));
      let low = 0;
      let high = cumulative.length - 1;

      while (low < high) {
        const mid = Math.floor((low + high) / 2);
        if (cumulative[mid] < target) low = mid + 1;
        else high = mid;
      }

      const index = Math.max(0, low - 1);
      const a = points[index];
      const b = points[Math.min(points.length - 1, index + 1)];
      const segmentLength = Math.max(1, cumulative[index + 1] - cumulative[index]);
      const t = Math.max(0, Math.min(1, (target - cumulative[index]) / segmentLength));
      const x = a.x + (b.x - a.x) * t;
      const y = a.y + (b.y - a.y) * t;
      const angle = Math.atan2(b.y - a.y, b.x - a.x);

      return {
        x,
        y,
        tangent: { x: Math.cos(angle), y: Math.sin(angle) },
        normal: { x: Math.cos(angle + Math.PI / 2), y: Math.sin(angle + Math.PI / 2) }
      };
    }

    function addLinePoints(points, from, to, steps) {
      for (let i = points.length ? 1 : 0; i <= steps; i += 1) {
        const t = i / steps;
        points.push({
          x: from.x + (to.x - from.x) * t,
          y: from.y + (to.y - from.y) * t
        });
      }
    }

    function addArcPoints(points, center, radius, start, end, dir, steps) {
      let total = end - start;
      if (dir > 0 && total < 0) total += Math.PI * 2;
      if (dir < 0 && total > 0) total -= Math.PI * 2;

      for (let i = points.length ? 1 : 0; i <= steps; i += 1) {
        const t = i / steps;
        const angle = start + total * t;
        points.push({
          x: center.x + Math.cos(angle) * radius,
          y: center.y + Math.sin(angle) * radius
        });
      }
    }

    function isOutsideRoad() {
      const nearest = distanceToTrackCenter(car.x, car.y);
      const carRadius = 18;
      return nearest > road.width / 2 - carRadius;
    }

    function distanceToTrackCenter(x, y) {
      return nearestTrackCenterInfo(x, y).distance;
    }

    function nearestTrackCenterInfo(x, y) {
      const points = buildWorldTrackPoints();
      let bestInfo = null;
      let bestProgress = 0;
      let progress = 0;

      for (let i = 0; i < points.length - 1; i += 1) {
        const a = points[i];
        const b = points[i + 1];
        const segmentLength = Math.hypot(b.x - a.x, b.y - a.y);
        const info = projectPointToSegment(x, y, a, b);

        if (!bestInfo || info.distance < bestInfo.distance) {
          bestInfo = info;
          bestProgress = progress + info.t * segmentLength;
        }

        progress += segmentLength;
      }

      if (bestInfo) {
        return {
          ...bestInfo,
          progress: bestProgress
        };
      }

      return {
        t: 0,
        closest: { x: car.x, y: car.y },
        distance: 0,
        tangent: { x: Math.cos(car.angle), y: Math.sin(car.angle) },
        normal: { x: -Math.sin(car.angle), y: Math.cos(car.angle) },
        progress: 0
      };
    }

    function getTrackProgressAt(x, y) {
      const metrics = buildTrackMetrics();
      const points = metrics.points;
      let bestDistance = Infinity;
      let bestProgress = 0;

      for (let i = 0; i < points.length - 1; i += 1) {
        const info = projectPointToSegment(x, y, points[i], points[i + 1]);
        if (info.distance < bestDistance) {
          bestDistance = info.distance;
          bestProgress = metrics.cumulative[i] + info.t * Math.hypot(points[i + 1].x - points[i].x, points[i + 1].y - points[i].y);
        }
      }

      return bestProgress;
    }

    function distanceToSegment(x, y, a, b) {
      return projectPointToSegment(x, y, a, b).distance;
    }

    function projectPointToSegment(x, y, a, b) {
      const abx = b.x - a.x;
      const aby = b.y - a.y;
      const apx = x - a.x;
      const apy = y - a.y;
      const lengthSq = abx * abx + aby * aby || 1;
      const t = Math.max(0, Math.min(1, (apx * abx + apy * aby) / lengthSq));
      const px = a.x + abx * t;
      const py = a.y + aby * t;
      const length = Math.sqrt(lengthSq);
      return {
        t,
        closest: { x: px, y: py },
        distance: Math.hypot(x - px, y - py),
        tangent: { x: abx / length, y: aby / length },
        normal: { x: -aby / length, y: abx / length }
      };
    }

    function drawPolyline(points) {
      ctx.beginPath();
      points.forEach((point, index) => {
        if (index === 0) ctx.moveTo(point.x, point.y);
        else ctx.lineTo(point.x, point.y);
      });
      ctx.stroke();
    }

    function drawOffsetPolyline(points, offset) {
      ctx.beginPath();
      points.forEach((point, index) => {
        const prev = points[Math.max(0, index - 1)];
        const next = points[Math.min(points.length - 1, index + 1)];
        const angle = Math.atan2(next.y - prev.y, next.x - prev.x) + Math.PI / 2;
        const x = point.x + Math.cos(angle) * offset;
        const y = point.y + Math.sin(angle) * offset;
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
    }

    function drawCurbs() {
      const worldPoints = buildWorldTrackPoints();
      const edgeOffset = road.width / 2 - 14;
      const curbWidth = 18;

      ctx.save();
      ctx.lineCap = "butt";
      ctx.lineJoin = "round";
      ctx.lineWidth = scaled(curbWidth);

      drawStripedCurb(buildOffsetTrackPoints(worldPoints, edgeOffset));
      drawStripedCurb(buildOffsetTrackPoints(worldPoints, -edgeOffset));

      ctx.restore();
    }

    function buildOffsetTrackPoints(points, offset) {
      return points.map((point, index) => {
        const prev = points[Math.max(0, index - 1)];
        const next = points[Math.min(points.length - 1, index + 1)];
        const angle = Math.atan2(next.y - prev.y, next.x - prev.x) + Math.PI / 2;
        return {
          x: point.x + Math.cos(angle) * offset,
          y: point.y + Math.sin(angle) * offset
        };
      });
    }

    function drawStripedCurb(points) {
      const stripeLength = 38;
      let traveled = 0;

      for (let i = 0; i < points.length - 1; i += 1) {
        const a = points[i];
        const b = points[i + 1];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const length = Math.hypot(dx, dy);
        if (length < 1) continue;

        const tangentX = dx / length;
        const tangentY = dy / length;
        const segmentStart = traveled;
        const segmentEnd = traveled + length;
        let stripeStart = Math.floor(segmentStart / stripeLength) * stripeLength;

        while (stripeStart < segmentEnd) {
          const stripeEnd = stripeStart + stripeLength;
          const start = Math.max(segmentStart, stripeStart);
          const end = Math.min(segmentEnd, stripeEnd);
          const stripeIndex = Math.floor(stripeStart / stripeLength);
          const color = stripeIndex % 2 === 0 ? "#f5f0e8" : "#d94132";
          const localStart = start - segmentStart;
          const localEnd = end - segmentStart;

          drawCurbStripe(
            a.x + tangentX * localStart,
            a.y + tangentY * localStart,
            a.x + tangentX * localEnd,
            a.y + tangentY * localEnd,
            color
          );

          stripeStart += stripeLength;
        }

        traveled = segmentEnd;
      }
    }

    function drawCurbStripe(ax, ay, bx, by, color) {
      const start = worldToScreen(ax, ay);
      const end = worldToScreen(bx, by);
      const margin = 80;
      const offscreen =
        (start.x < -margin && end.x < -margin) ||
        (start.x > window.innerWidth + margin && end.x > window.innerWidth + margin) ||
        (start.y < -margin && end.y < -margin) ||
        (start.y > window.innerHeight + margin && end.y > window.innerHeight + margin);

      if (offscreen) return;

      ctx.strokeStyle = color;
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();
    }

    function drawAnchors() {
      const anchor = anchors[activeAnchorIndex];
      if (!anchor || car.crashed) return;

      const p = worldToScreen(anchor.x, anchor.y);
      if (p.y < -80 || p.y > window.innerHeight + 80) return;

      const active = car.anchor === anchor;
      const distance = Math.hypot(anchor.x - car.x, anchor.y - car.y);
      const nearRatio = Math.max(0, Math.min(1, 1 - distance / rope.maxReach));
      const pulse = (Math.sin(performance.now() * 0.012) + 1) * 0.5;
      const radius = scaled(active ? 15 : 11 + nearRatio * (5 + pulse * 5));
      const ringRadius = radius + scaled(9 + nearRatio * pulse * 10);

      ctx.save();
      if (nearRatio > 0) {
        ctx.globalAlpha = 0.18 + nearRatio * 0.34;
        ctx.strokeStyle = "#ffdd48";
        ctx.lineWidth = scaled(4 + nearRatio * 3);
        ctx.beginPath();
        ctx.arc(p.x, p.y, ringRadius, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
      ctx.fillStyle = active || nearRatio > 0.25 ? "#ffdd48" : "#ffffff";
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.globalAlpha = 0.65 + nearRatio * 0.25;
      ctx.beginPath();
      ctx.arc(p.x - radius * 0.28, p.y - radius * 0.28, Math.max(3, radius * 0.28), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawBoostPads() {
      for (const pad of boostPads) {
        const p = worldToScreen(pad.x, pad.y);
        if (p.x < -160 || p.x > window.innerWidth + 160 || p.y < -160 || p.y > window.innerHeight + 160) continue;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(pad.angle + Math.PI / 2);
        ctx.scale(view.zoom, view.zoom);
        ctx.globalAlpha = pad.used ? 0.35 : 1;
        ctx.fillStyle = "rgba(28, 37, 42, 0.32)";
        roundRect(-46, -42, 92, 84, 8);
        ctx.fill();
        ctx.fillStyle = "#ffd84d";
        ctx.beginPath();
        ctx.moveTo(0, -38);
        ctx.lineTo(38, 4);
        ctx.lineTo(16, 4);
        ctx.lineTo(16, 34);
        ctx.lineTo(-16, 34);
        ctx.lineTo(-16, 4);
        ctx.lineTo(-38, 4);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    function drawRope() {
      if (!car.attached || !car.anchor) return;

      const a = worldToScreen(car.anchor.x, car.anchor.y);
      const c = worldToScreen(car.x, car.y);
      ctx.strokeStyle = "#ffd84d";
      ctx.lineWidth = scaled(5);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(c.x, c.y);
      ctx.stroke();
    }

    function addSkidMark() {
      if (skidMarks.length > 0) {
        const last = skidMarks[skidMarks.length - 1];
        if (Math.hypot(last.x - car.x, last.y - car.y) < 18) return;
      }

      skidMarks.push({
        x: car.x,
        y: car.y,
        angle: car.visualAngle,
        life: 0.9
      });

      if (skidMarks.length > 80) skidMarks.shift();
    }

    function updateSkidMarks(dt) {
      for (const mark of skidMarks) {
        mark.life -= dt;
      }

      while (skidMarks.length && skidMarks[0].life <= 0) {
        skidMarks.shift();
      }
    }

    function drawSkidMarks() {
      for (const mark of skidMarks) {
        const p = worldToScreen(mark.x, mark.y);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(mark.angle + Math.PI / 2);
        ctx.scale(view.zoom, view.zoom);
        ctx.globalAlpha = Math.max(0, mark.life / 0.9) * 0.42;
        ctx.strokeStyle = "#151a1d";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-11, 10);
        ctx.lineTo(-11, 34);
        ctx.moveTo(11, 10);
        ctx.lineTo(11, 34);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawAiOpponents() {
      for (const opponent of aiOpponents) {
        const p = worldToScreen(opponent.x, opponent.y);
        if (p.x < -80 || p.x > window.innerWidth + 80 || p.y < -80 || p.y > window.innerHeight + 80) continue;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(opponent.angle + Math.PI / 2);
        ctx.scale(0.88 * view.zoom, 0.88 * view.zoom);

        drawVehicleBody(opponent.color, "#20272b", "#f4f8fb");

        ctx.fillStyle = "rgba(15,20,24,0.72)";
        ctx.font = "700 13px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(opponent.name[0], 0, 4);
        ctx.restore();
      }
    }

    function drawCar() {
      const p = worldToScreen(car.x, car.y);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(car.visualAngle + Math.PI / 2);
      ctx.scale(view.zoom, view.zoom);

      drawJetFlame();
      drawVehicleBody("#f2c12f", "#20272b", "#e74b3f");

      if (car.detachedFlash > 0) {
        ctx.save();
        ctx.globalAlpha = car.detachedFlash / 0.22;
        ctx.strokeStyle = "#ffd84d";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-24, 36);
        ctx.lineTo(0, 66);
        ctx.lineTo(24, 36);
        ctx.stroke();
        ctx.restore();
      }

      ctx.restore();
    }

    function drawVehicleBody(bodyColor, cockpitColor, tailColor) {
      ctx.fillStyle = "rgba(0,0,0,0.24)";
      ctx.beginPath();
      ctx.ellipse(0, 18, 22, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = bodyColor;
      roundRect(-15, -28, 30, 56, 9);
      ctx.fill();

      ctx.fillStyle = cockpitColor;
      roundRect(-11, -18, 22, 16, 5);
      ctx.fill();

      ctx.fillStyle = tailColor;
      roundRect(-13, 8, 26, 16, 5);
      ctx.fill();
    }

    function drawJetFlame() {
      const speedRatio = Math.min(1, Math.max(0, (car.speed - 320) / 240));
      const boostRatio = car.boostTimer > 0 ? 1 : 0;
      const intensity = Math.max(speedRatio * 0.65, boostRatio);
      if (intensity <= 0.04) return;

      const flicker = 0.82 + Math.sin(performance.now() * 0.04) * 0.18;
      const length = (34 + 34 * intensity) * flicker;
      const width = 13 + 10 * intensity;

      ctx.save();
      ctx.globalAlpha = 0.88 * intensity;
      ctx.fillStyle = "#ff7a1a";
      ctx.beginPath();
      ctx.moveTo(0, 34 + length);
      ctx.quadraticCurveTo(width, 40, 8, 25);
      ctx.lineTo(-8, 25);
      ctx.quadraticCurveTo(-width, 40, 0, 34 + length);
      ctx.fill();

      ctx.globalAlpha = 0.95 * intensity;
      ctx.fillStyle = "#ffe46b";
      ctx.beginPath();
      ctx.moveTo(0, 30 + length * 0.62);
      ctx.quadraticCurveTo(width * 0.48, 38, 4, 27);
      ctx.lineTo(-4, 27);
      ctx.quadraticCurveTo(-width * 0.48, 38, 0, 30 + length * 0.62);
      ctx.fill();
      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function shortAngle(angle) {
      return Math.atan2(Math.sin(angle), Math.cos(angle));
    }

    function normalizeAngle(angle) {
      const full = Math.PI * 2;
      return ((angle % full) + full) % full;
    }

    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      if (gameStarted) update(dt);
      draw();
      updateSpeedometer();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        input.space = true;
      }
      if (event.code === "KeyR") {
        if (gameOverEl.classList.contains("visible")) restartRace();
        else reset();
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.code === "Space") {
        input.space = false;
      }
    });

    playerSpeedEl.addEventListener("input", updatePlayerSpeedDisplay);
    startButtonEl.addEventListener("click", () => startGame("endless"));
    raceButtonEl.addEventListener("click", () => startGame("race"));
    settingsButtonEl.addEventListener("click", showSettingsMenu);
    backToMainButtonEl.addEventListener("click", showMainMenu);
    restartButtonEl.addEventListener("click", restartRace);
    homeButtonEl.addEventListener("click", returnHome);
    document.querySelectorAll("[data-difficulty]").forEach((button) => {
      button.addEventListener("click", () => selectDifficulty(button.dataset.difficulty));
    });

    window.addEventListener("pageshow", () => {
      selectDifficulty(selectedDifficulty);
      updatePlayerSpeedDisplay();
    });

    function isUiControl(target) {
      return target instanceof Element && (target.closest(".start-screen") || target.closest(".game-over"));
    }

    window.addEventListener("pointerdown", (event) => {
      if (isUiControl(event.target)) return;
      input.space = true;
    });

    window.addEventListener("pointerup", (event) => {
      if (isUiControl(event.target)) return;
      input.space = false;
    });

    window.addEventListener("blur", () => {
      input.space = false;
    });

    selectDifficulty("normal");
    updatePlayerSpeedDisplay();
    reset();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
