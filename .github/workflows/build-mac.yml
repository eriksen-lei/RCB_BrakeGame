name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "RacingGameRCB/prototype-trackbeta.html"
      - "RacingGameRCB/Resources/**"
      - "RacingGameRCB/electron/**"
      - "RacingGameRCB/package.json"
      - "RacingGameRCB/package-lock.json"
      - ".github/workflows/build-mac.yml"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: RacingGameRCB

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: RacingGameRCB/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned Apple Silicon macOS app
        run: npm run app:builder:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: RCB-Brake-Racing-macOS-Apple-Silicon
          path: RacingGameRCB/dist-app/*.zip
          if-no-files-found: error

      - name: Publish downloadable release
        run: |
          ZIP_FILE="$(ls dist-app/*.zip | head -n 1)"
          gh release delete macos-apple-silicon-latest --yes || true
          git tag -f macos-apple-silicon-latest
          git push origin -f macos-apple-silicon-latest
          gh release create macos-apple-silicon-latest "$ZIP_FILE" \
            --title "RCB Brake Racing macOS Apple Silicon" \
            --notes "Unsigned Apple Silicon build generated from commit ${GITHUB_SHA}."
        env:
          GH_TOKEN: ${{ github.token }}
